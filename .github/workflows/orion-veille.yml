name: Orion — ronde de veille

on:
  workflow_dispatch: {}          # bouton « Run workflow » (et le bouton ▶ du cockpit)
  schedule:
    - cron: '0 6 * * 1'          # chaque lundi 06:00 UTC — bilan de veille hebdo

permissions:
  contents: write                # pour committer le rapport mis à jour

concurrency:
  group: orion-veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - name: Garde-fou — token d'abonnement présent ?
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::Secret CLAUDE_CODE_OAUTH_TOKEN manquant. Génère-le avec « claude setup-token » puis ajoute-le dans Settings → Secrets and variables → Actions. (Orion puise dans ton forfait Claude, pas dans ta clé API.)"
            exit 1
          fi

      - name: Récupérer le cockpit (Strategy)
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Orion fait sa ronde de veille
        env:
          # Token d'abonnement (claude setup-token) → facturé sur le FORFAIT Claude, pas sur la clé API.
          # ANTHROPIC_API_KEY est volontairement absent : s'il était présent, il aurait la priorité.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code@latest -p "$(cat .github/orion-veille-prompt.md)" \
            --model claude-opus-4-8 \
            --allowedTools "Read,Grep,Glob,Bash,Write,Edit,WebSearch,WebFetch" \
            --dangerously-skip-permissions

      - name: Publier le rapport s'il a changé
        run: |
          if ! git diff --quiet -- agents/orion.json; then
            git config user.name "orion-bot"
            git config user.email "bot@cpts-pilot.local"
            git add agents/orion.json
            git commit -m "Orion — ronde de veille $(date -u +%Y-%m-%d) [skip ci]"
            git push
            echo "Rapport publié."
          else
            echo "Rapport inchangé, rien à publier."
          fi
