name: Magnus — ronde produit

on:
  workflow_dispatch: {}          # À LA DEMANDE uniquement : bouton ▶ du cockpit (ou onglet Actions).
  # Pas de « schedule » : Magnus ne tourne JAMAIS tout seul. Et il s'authentifie au token
  # d'abonnement (voir plus bas) → ça puise dans le FORFAIT Claude, pas dans la clé API.
  # L'auto hebdo sur clé API reste réservé à Orion (orion-veille.yml).

permissions:
  contents: write                # pour committer le rapport mis à jour

concurrency:
  group: magnus-ronde
  cancel-in-progress: false

jobs:
  ronde:
    runs-on: ubuntu-latest
    steps:
      - name: Garde-fou — token d'abonnement présent ?
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::Secret CLAUDE_CODE_OAUTH_TOKEN manquant. Génère-le avec « claude setup-token » puis ajoute-le dans Settings → Secrets and variables → Actions. (Magnus puise dans ton forfait Claude, pas dans ta clé API.)"
            exit 1
          fi

      - name: Récupérer le cockpit (Strategy)
        uses: actions/checkout@v4

      - name: Cloner la plateforme (le code que Magnus analyse)
        run: |
          if [ -n "${{ secrets.PLATEFORME_TOKEN }}" ]; then
            git clone --depth 30 "https://x-access-token:${{ secrets.PLATEFORME_TOKEN }}@github.com/Evalita03/Plateforme-CPTS.git" Plateforme-CPTS
            echo "Plateforme clonée."
          else
            echo "::warning::Pas de secret PLATEFORME_TOKEN — Magnus tournera sans relire le code de la plateforme."
          fi

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Magnus fait sa ronde
        env:
          # Token d'abonnement (claude setup-token) → facturé sur le FORFAIT Claude, pas sur la clé API.
          # ANTHROPIC_API_KEY est volontairement absent : s'il était présent, il aurait la priorité.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code@latest -p "$(cat .github/magnus-ronde-prompt.md)" \
            --model claude-opus-4-8 \
            --allowedTools "Read,Grep,Glob,Bash,Write,Edit" \
            --dangerously-skip-permissions

      - name: Publier le rapport s'il a changé
        run: |
          if git diff --quiet -- agents/chef-produit.json; then
            echo "Rapport inchangé, rien à publier."; exit 0
          fi
          git config user.name "magnus-bot"
          git config user.email "bot@cpts-pilot.local"
          git add agents/chef-produit.json
          git commit -m "Magnus — ronde auto $(date -u +%Y-%m-%d) [skip ci]"
          # Plusieurs sessions poussent en parallèle : on rebase + on réessaie avant d'abandonner
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Rapport publié (tentative $i)."; exit 0
            fi
            echo "Push concurrent détecté, nouvelle tentative ($i)…"; sleep 4
          done
          echo "::error::Publication échouée après 5 tentatives."; exit 1
