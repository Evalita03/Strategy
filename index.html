<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPTS Pilot — Cockpit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,800;1,9..144,500;1,9..144,700&display=swap');
:root {
  --font-display: 'Fraunces', Georgia, serif;
  --blue-900: #1E3A8A;
  --blue-700: #1D4ED8;
  --blue-600: #2563EB;
  --blue-500: #3B82F6;
  --blue-100: #DBEAFE;
  --blue-50: #EFF6FF;
  --teal-700: #0F766E;
  --teal-600: #0D9488;
  --teal-100: #CCFBF1;
  --slate-900: #0F172A;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748B;
  --slate-400: #94A3B8;
  --slate-300: #CBD5E1;
  --slate-200: #E2E8F0;
  --slate-100: #F1F5F9;
  --slate-50: #F8FAFC;
  --orange-600: #EA580C;
  --orange-100: #FFEDD5;
  --red-600: #DC2626;
  --white: #FFFFFF;
  --tech: #2563EB;
  --commercial: #0D9488;
  --strategie: #7C3AED;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--slate-50);
  color: var(--slate-900);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--slate-900);
  color: var(--white);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.logo {
  padding: 20px 20px 16px;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.025em;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo .dot { color: var(--blue-500); }
.logo .sub { display:block; font-size: 11px; font-weight: 500; color: var(--slate-400); letter-spacing: 0.04em; margin-top: 4px; text-transform: uppercase;}
.nav { flex: 1; padding: 12px 0; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--slate-300);
  border-left: 3px solid transparent; transition: all .15s;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.nav-item.active { background: rgba(59,130,246,0.12); border-left-color: var(--blue-500); color: var(--white); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

/* Nav à 2 niveaux */
.nav { overflow-y: auto; }
.nav-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 10px 20px; }
.nav-group-header {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px; cursor: pointer; user-select: none;
  font-size: 14px; font-weight: 500; color: var(--slate-300);
  transition: color .15s;
}
.nav-group-header:hover { color: var(--white); }
.nav-group-header svg.grp-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.85; }
.nav-group-header .chevron {
  margin-left: auto; width: 13px; height: 13px; opacity: 0.5;
  transition: transform .2s ease;
}
.nav-group.collapsed .nav-group-header .chevron { transform: rotate(-90deg); }
.nav-group-items { max-height: 360px; overflow: hidden; transition: max-height .25s ease; }
.nav-group.collapsed .nav-group-items { max-height: 0; }
.nav-subitem {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 20px 9px 35px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--slate-300);
  border-left: 3px solid transparent; transition: all .15s;
}
.nav-subitem:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.nav-subitem.active { background: rgba(59,130,246,0.12); border-left-color: var(--blue-500); color: var(--white); }
.nav-subitem .sub-bullet { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.45; flex-shrink: 0; }
.nav-subitem.active .sub-bullet { opacity: 1; background: var(--blue-500); }

.nav-footer { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.footer-settings {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 9px 11px; border-radius: 8px; text-align: left;
  border: 1px solid rgba(255,255,255,0.12); background: transparent;
  color: var(--slate-300); font-family: inherit; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.footer-settings:hover { background: rgba(255,255,255,0.06); color: var(--white); border-color: rgba(255,255,255,0.2); }
.footer-settings .backup-status { flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--slate-400); }
.footer-settings:hover .backup-status { color: inherit; }
.footer-settings .backup-status .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.footer-settings .backup-status .bs-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.footer-settings .gear { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 60px; background: var(--white); border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0;
}
.topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.topbar .actions { display: flex; gap: 10px; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--blue-700); color: var(--white); }
.btn-primary:hover { background: var(--blue-600); }
.btn-ghost { background: var(--slate-100); color: var(--slate-700); }
.btn-ghost:hover { background: var(--slate-200); }
.content { flex: 1; overflow: auto; position: relative; }

/* Graph view */
#graph-canvas { width: 100%; height: 100%; display: block; cursor: grab; background:
  radial-gradient(circle at 1px 1px, var(--slate-200) 1px, transparent 0); background-size: 24px 24px; }
#graph-canvas:active { cursor: grabbing; }
.graph-legend {
  position: absolute; bottom: 20px; left: 20px; background: var(--white);
  border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.08); font-size: 12px;
}
.graph-legend h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); margin-bottom: 10px; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: var(--slate-700); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Panels (notes, tasks, etc) */
.panel { padding: 24px; max-width: 1100px; margin: 0 auto; }
.panel-grid { display: grid; gap: 16px; }
.card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px;
  padding: 18px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); transition: all .15s;
}
.card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.08); }
.card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 13px; color: var(--slate-600); line-height: 1.6; }
.card .meta { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.tag {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.tag-tech { background: var(--blue-100); color: var(--blue-700); }
.tag-commercial { background: var(--teal-100); color: var(--teal-700); }
.tag-strategie { background: #EDE9FE; color: #7C3AED; }

/* Tasks */
.task-col { display: flex; flex-direction: column; gap: 10px; }
.task-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.task-column { background: var(--slate-100); border-radius: 12px; padding: 14px; }
.task-column h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--slate-500); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.task-count { background: var(--slate-300); color: var(--slate-700); border-radius: 20px; padding: 1px 8px; font-size: 11px; }
.task-card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 8px;
  padding: 12px; font-size: 13px; cursor: pointer; box-shadow: 0 1px 2px rgba(15,23,42,0.04);
}
.task-card:hover { border-color: var(--blue-500); cursor: grab; }
.task-card { user-select: none; transition: opacity .15s, transform .1s, border-color .15s; }
.task-card:active { cursor: grabbing; }
.task-card.dragging { opacity: 0.4; transform: scale(0.97); cursor: grabbing; }
.task-column { transition: background-color .15s, outline .15s; }
.task-column.drop-target { background: var(--blue-50); outline: 2px dashed var(--blue-500); outline-offset: -4px; }
.task-card .task-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.dot-status { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.task-note-snippet { margin-top: 6px; font-size: 11.5px; color: var(--slate-500); line-height: 1.4; }

/* Écran To do (Idées + kanban) */
.todo-section { margin-bottom: 30px; }
.todo-section:last-child { margin-bottom: 0; }
.todo-section-title {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--slate-700); margin-bottom: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.todo-section-title svg { width: 16px; height: 16px; color: var(--slate-400); flex-shrink: 0; }
.todo-section-title .count-pill { font-size: 11px; font-weight: 700; color: var(--slate-600); background: var(--slate-100); border-radius: 20px; padding: 2px 9px; }
.idea-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.idea-card {
  position: relative; background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 12px; padding: 16px; cursor: pointer;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04); transition: all .15s;
}
.idea-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.08); border-color: var(--slate-300); }
.idea-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; padding-right: 104px; color: var(--slate-900); line-height: 1.35; }
.idea-card p { font-size: 12.5px; color: var(--slate-600); line-height: 1.5; }
.idea-card .meta { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.idea-card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }

/* ===== Vivier d'idées (idees.json, lecture seule depuis Plateforme-CPTS) ===== */
.vivier-desc { font-size: 13px; color: var(--slate-600); line-height: 1.55; margin: 2px 0 18px; max-width: 760px; }
.vivier-updated { font-size: 11px; font-weight: 600; color: var(--slate-400); }
.vivier-note { font-size: 13px; color: var(--slate-600); background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 10px; padding: 14px 16px; }
.vivier-filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 22px; }
.vivier-filter { display: flex; flex-direction: column; gap: 4px; font-size: 11px; font-weight: 700; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.03em; }
.vivier-filter select { font-family: inherit; font-size: 13px; font-weight: 500; color: var(--slate-700); background: var(--white); border: 1px solid var(--slate-300); border-radius: 8px; padding: 7px 10px; cursor: pointer; }
.vivier-famille { margin-bottom: 30px; padding: 18px 18px 6px; border-radius: 14px; border: 1px solid var(--slate-200); background: var(--slate-50); }
.vivier-fam-produit-strategie { border-top: 3px solid var(--blue-500); }
.vivier-fam-technique { border-top: 3px solid var(--slate-400); }
.vivier-fam-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
.vivier-fam-head h4 { font-size: 17px; font-weight: 800; color: var(--slate-900); }
.vivier-fam-sub { font-size: 12px; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.04em; }
.vivier-nature { margin-bottom: 18px; }
.vivier-nat-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; font-weight: 700; color: var(--slate-700); }
.vivier-nat-icon { width: 20px; height: 20px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }
.vivier-nat-count { font-size: 11px; font-weight: 700; color: var(--slate-500); background: var(--slate-100); border-radius: 20px; padding: 1px 8px; }
.vivier-nat-hint { font-size: 11.5px; font-weight: 500; color: var(--slate-400); font-style: italic; }
.vivier-nat-etincelle .vivier-nat-icon { background: #FEF3C7; color: #B45309; }
.vivier-nat-decision .vivier-nat-icon { background: #FEE2E2; color: var(--red-600); }
.vivier-nat-cap-mur .vivier-nat-icon { background: var(--teal-100); color: var(--teal-700); }
.vivier-card { cursor: default; padding-top: 14px; }
.vivier-card:hover { box-shadow: 0 1px 2px rgba(15,23,42,0.04); border-color: var(--slate-200); }
.vivier-card h4 { padding-right: 0; margin-top: 8px; }
.vivier-nat-decision .vivier-card { border-left: 3px solid var(--red-600); }
.vivier-nat-cap-mur .vivier-card { border-left: 3px solid var(--teal-600); }
.vivier-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.vivier-id { font-size: 10.5px; font-weight: 800; letter-spacing: 0.06em; color: var(--slate-400); }
.vivier-statut { font-size: 10.5px; font-weight: 700; border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
.vivier-statut-en-suspens { background: var(--slate-100); color: var(--slate-600); }
.vivier-statut-reportee { background: var(--orange-100); color: var(--orange-600); }
.vivier-statut-en-reflexion { background: var(--blue-100); color: var(--blue-700); }
.vivier-statut-deja-en-strategie { background: var(--teal-100); color: var(--teal-700); }
.vivier-theme { margin-top: 2px; align-self: flex-start; }
.vivier-citation { font-style: italic; color: var(--slate-500); border-left: 2px solid var(--slate-200); padding-left: 10px; margin: 10px 0 0; }
.vivier-note-txt { margin-top: 10px; }
.vivier-promo-link { margin-top: 12px; font-size: 12px; font-weight: 700; color: var(--teal-700); }
.vivier-promo-flag { margin-top: 12px; font-size: 11.5px; font-weight: 600; color: var(--teal-600); }
.vivier-promoted { opacity: 0.62; }
.vivier-promoted:hover { opacity: 1; }

/* ===== Vivier — liste qui se déplie (v2) ===== */
.v-toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:4px 0 8px; }
.v-sel { font-family:inherit; font-size:13px; font-weight:600; color:var(--slate-700); background:#fff; border:1px solid var(--slate-300); border-radius:9px; padding:8px 11px; cursor:pointer; }
.v-spacer { margin-left:auto; }
.v-filterrow { display:none; gap:10px; align-items:flex-end; flex-wrap:wrap; margin:2px 0 6px; padding:12px 14px; background:var(--slate-50); border:1px solid var(--slate-200); border-radius:10px; }
.v-filterrow.open { display:flex; }
.v-legend { display:flex; gap:16px; flex-wrap:wrap; margin:10px 0 14px; font-size:11.5px; color:var(--slate-500); }
.v-legend span { display:inline-flex; align-items:center; gap:6px; }
.v-dot { width:16px; height:16px; border-radius:5px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
.v-dot.etincelle { background:#FEF3C7; color:#B45309; }
.v-dot.decision { background:#FEE2E2; color:var(--red-600); }
.v-dot.cap-mur { background:var(--teal-100); color:var(--teal-700); }
.v-list { background:#fff; border:1px solid var(--slate-200); border-radius:14px; overflow:hidden; }
.v-hint { font-size:11.5px; color:var(--slate-400); padding:10px 16px; border-bottom:1px solid var(--slate-100); background:var(--slate-50); }
.v-row { border-bottom:1px solid var(--slate-100); }
.v-row:last-child { border-bottom:none; }
.v-rowhead { display:flex; align-items:center; gap:12px; padding:13px 16px; cursor:pointer; transition:background .12s; }
.v-rowhead:hover { background:var(--slate-50); }
.v-row.decision .v-rowhead { box-shadow:inset 3px 0 0 var(--red-600); }
.v-row.cap-mur .v-rowhead { box-shadow:inset 3px 0 0 var(--teal-600); }
.v-main { flex:1; min-width:0; }
.v-title { font-size:14.5px; font-weight:700; color:var(--slate-900); }
.v-meta { font-size:11.5px; color:var(--slate-400); margin-top:2px; }
.v-chev { color:var(--slate-300); transition:transform .2s; flex-shrink:0; }
.v-row.open .v-chev { transform:rotate(90deg); color:var(--slate-500); }
.v-row.archived { opacity:.55; }
.v-row.selected { background:var(--blue-50); border-color:var(--blue-100); }
.v-row.promoted .v-title { color:var(--slate-500); }
.v-body { display:none; padding:2px 16px 18px 44px; }
.v-row.open .v-body { display:block; }
.v-cit { font-style:italic; color:var(--slate-500); border-left:2px solid var(--slate-200); padding-left:12px; margin:4px 0 0; font-size:13px; line-height:1.55; }
.v-note { font-size:13px; color:var(--slate-600); line-height:1.6; margin-top:12px; white-space:pre-wrap; }
.v-fields { display:flex; gap:18px; flex-wrap:wrap; margin-top:12px; font-size:12px; color:var(--slate-500); }
.v-fields b { color:var(--slate-700); font-weight:700; }
.v-flag { margin-top:12px; font-size:12px; font-weight:700; color:var(--teal-700); }
.v-flag.road { color:var(--blue-700); }
.v-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.v-act { font-family:inherit; font-size:12px; font-weight:700; border-radius:8px; padding:7px 12px; cursor:pointer; border:1px solid var(--slate-200); background:#fff; color:var(--slate-600); transition:.15s; }
.v-act:hover { border-color:var(--slate-400); color:var(--slate-900); }
.v-act.strat:hover { border-color:var(--teal-600); color:var(--teal-700); background:var(--teal-100); }
.v-act.road:hover { border-color:var(--blue-500); color:var(--blue-700); background:var(--blue-50); }
.v-act.danger:hover { border-color:var(--red-600); color:var(--red-600); background:#FEE2E2; }
.v-act[disabled] { opacity:.5; cursor:not-allowed; }
.v-empty { padding:30px 16px; text-align:center; color:var(--slate-400); font-style:italic; }
.v-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--slate-900); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600; opacity:0; transition:.25s; pointer-events:none; z-index:9999; box-shadow:0 8px 24px rgba(0,0,0,.25); }
.v-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Carte mentale : légende couleurs + cases volets de promotion */
.mm-legend { margin: 6px 0 14px; }
.mm-dot { width:12px; height:12px; border-radius:50%; display:inline-block; flex-shrink:0; }
.promo-axes { display:flex; flex-direction:column; gap:10px; }
.promo-axe-row { display:flex; align-items:center; gap:10px; }
.promo-axe-check { display:flex; align-items:center; gap:8px; min-width:160px; font-size:14px; font-weight:600; color:var(--slate-700); cursor:pointer; }
.promo-axe-check input { width:16px; height:16px; cursor:pointer; }
.promo-group { flex:1; font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--slate-300); border-radius:8px; background:#fff; }
.promo-group:disabled { background:var(--slate-100); color:var(--slate-400); cursor:not-allowed; }
.promo-group-new { flex:1; font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--blue-500); border-radius:8px; background:#fff; }
.promo-group-new:disabled { background:var(--slate-100); color:var(--slate-400); cursor:not-allowed; }
.idea-act {
  font-family: inherit; font-size: 11px; font-weight: 600;
  border-radius: 7px; padding: 4px 8px; cursor: pointer; transition: all .15s;
  border: 1px solid; display: inline-flex; align-items: center; gap: 4px;
}
.idea-classify { color: var(--teal-700); background: var(--teal-100); border-color: var(--teal-100); }
.idea-classify:hover { background: var(--teal-600); color: var(--white); border-color: var(--teal-600); }
.idea-promote { color: var(--blue-700); background: var(--blue-50); border-color: var(--blue-100); }
.idea-promote:hover { background: var(--blue-700); color: var(--white); border-color: var(--blue-700); }
.ai-reason {
  font-size: 13px; color: var(--slate-700); line-height: 1.5;
  padding: 10px 12px; background: var(--blue-50); border: 1px solid var(--blue-100);

}

/* Stratégie globale — Hub d'encarts (mosaïque) */
.hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; grid-auto-flow: dense; align-items: start; }
.encart {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 14px;

  transition: all .15s; display: flex; flex-direction: column; min-height: 128px;
}

.encart-lg { grid-column: span 2; }
.encart-title { font-size: 15px; font-weight: 700; color: var(--slate-900); margin-bottom: 8px; letter-spacing: -0.01em; }
.encart-lg .encart-title { font-size: 19px; font-weight: 800; letter-spacing: -0.018em; line-height: 1.2; margin-bottom: 10px; }
.modal-wide-head h2 { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.015em; }
.encart .encart-text { font-size: 13px; color: var(--slate-600); line-height: 1.55; white-space: pre-wrap; flex: 1; }
.encart-empty { font-size: 12.5px; color: var(--slate-400); font-style: italic; flex: 1; }
.encart-badge { margin-top: 12px; align-self: flex-start; font-size: 11px; font-weight: 700; color: var(--blue-700); background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 20px; padding: 2px 10px; }
/* Modale d'édition d'un encart */
.encart-modal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.encart-name { flex: 1; font-family: inherit; font-size: 18px; font-weight: 700; color: var(--slate-900); border: none; background: transparent; padding: 4px 6px; border-radius: 6px; letter-spacing: -0.01em; }
.encart-name:hover { background: var(--slate-50); }
.encart-name:focus { outline: none; background: var(--slate-50); box-shadow: 0 0 0 2px var(--blue-100); }
.encart-size-btn { border: 1px solid var(--slate-200); background: var(--white); border-radius: 7px; font-family: inherit; font-size: 11px; font-weight: 600; color: var(--slate-600); cursor: pointer; padding: 5px 10px; white-space: nowrap; flex-shrink: 0; }
.encart-size-btn:hover { border-color: var(--blue-500); color: var(--blue-700); }
.encart-text-edit { width: 100%; min-height: 160px; resize: vertical; border: 1px solid var(--slate-200); border-radius: 8px; padding: 12px; font-family: inherit; font-size: 13.5px; line-height: 1.6; color: var(--slate-700); }
.encart-text-edit:focus { outline: none; border-color: var(--blue-500); }
.encart-apports { margin-top: 16px; }

/* Organigramme — équipe d'agents */
.org-intro { max-width: 760px; font-size: 13.5px; color: var(--slate-600); line-height: 1.6; margin-bottom: 26px; padding: 14px 16px; background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 12px; }
.org-pole { margin-bottom: 30px; }
.org-pole-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--slate-200); }
.org-pole-name { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--blue-700); }
.org-pole-tag { font-size: 12.5px; color: var(--slate-500); font-style: italic; flex: 1; }
.org-pole-count { font-size: 11px; font-weight: 700; color: var(--slate-400); white-space: nowrap; }
.org-agents { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.org-agent { background: var(--white); border: 1px solid var(--slate-200); border-radius: 14px; padding: 18px 20px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); transition: all .15s; display: flex; flex-direction: column; cursor: pointer; }
.org-agent:hover { box-shadow: 0 8px 22px rgba(15,23,42,0.09); border-color: var(--slate-300); transform: translateY(-2px); }
.org-agent-next { border-color: var(--blue-500); box-shadow: 0 0 0 1px var(--blue-500); }
.org-agent-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
.org-agent-name { font-size: 16px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.01em; }
.org-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; border-radius: 20px; padding: 3px 10px; white-space: nowrap; flex-shrink: 0; }
.org-badge-next { color: var(--blue-700); background: var(--blue-50); border: 1px solid var(--blue-100); }
.org-badge-todo { color: var(--slate-500); background: var(--slate-50); border: 1px solid var(--slate-200); }
.org-badge-active { color: var(--teal-700); background: var(--teal-100); border: 1px solid var(--teal-100); }
.org-agent-role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--blue-700); margin: 2px 0 10px; }
.org-agent-mission { font-size: 13px; color: var(--slate-600); line-height: 1.55; flex: 1; }
.org-agent-quand { margin-top: 12px; font-size: 12.5px; color: var(--slate-500); font-style: italic; border-top: 1px dashed var(--slate-200); padding-top: 10px; }
/* Modale agent — fiche mission + dernier rapport */
.agent-fiche { background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 12px; padding: 16px 18px; margin-bottom: 18px; }
.agent-fiche-role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--blue-700); margin-bottom: 10px; }
.agent-fiche-line { font-size: 13.5px; color: var(--slate-700); line-height: 1.55; margin: 6px 0; }

.agent-report { border-top: 1px solid var(--slate-200); padding-top: 16px; }
.agent-report-loading, .agent-report-empty { font-size: 13px; color: var(--slate-400); font-style: italic; }
.agent-report-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.agent-report-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--slate-900); }
.agent-report-when { font-size: 11px; color: var(--slate-400); white-space: nowrap; }
.agent-report-block { margin-bottom: 14px; }
.arb-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--blue-700); margin-bottom: 5px; }
.arb-text { font-size: 13.5px; color: var(--slate-700); line-height: 1.55; }
.arb-list { margin: 0; padding-left: 18px; }
.arb-list li { font-size: 13.5px; color: var(--slate-700); line-height: 1.6; margin: 3px 0; }
.agent-report-note { margin-top: 14px; font-size: 12.5px; color: var(--slate-500); font-style: italic; border-top: 1px dashed var(--slate-200); padding-top: 10px; }
/* L'Observatoire (veille d'Orion) */
.observatoire { display: flex; flex-direction: column; gap: 8px; }
.obs-hero { background: linear-gradient(135deg, var(--slate-900), var(--blue-900)); color: var(--white); border-radius: 14px; padding: 18px 20px; margin-bottom: 6px; }

.obs-synthese { font-size: 14.5px; line-height: 1.6; color: #F8FAFC; }
.obs-nav { display: flex; flex-wrap: wrap; gap: 7px; position: sticky; top: 0; background: var(--slate-50); padding: 10px 0; z-index: 2; margin-bottom: 4px; }
.obs-nav-chip { font-family: inherit; font-size: 12px; font-weight: 600; color: var(--slate-700); background: var(--white); border: 1px solid var(--slate-200); border-radius: 20px; padding: 5px 12px; cursor: pointer; transition: all .15s; }
.obs-nav-chip:hover { background: var(--blue-50); border-color: var(--blue-100); color: var(--blue-700); }
.obs-section { scroll-margin-top: 56px; margin-top: 16px; }
.obs-sec-head { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
.obs-sec-icon { font-size: 17px; }
.obs-sec-head h3 { font-size: 14.5px; font-weight: 800; color: var(--slate-900); letter-spacing: -0.01em; margin: 0; }
.obs-sec-count { font-size: 11px; font-weight: 700; color: var(--slate-500); background: var(--slate-100); border-radius: 10px; padding: 1px 8px; }
.obs-sec-body { display: flex; flex-direction: column; gap: 10px; }
.obs-card { background: var(--white); border: 1px solid var(--slate-200); border-left: 3px solid var(--blue-500); border-radius: 12px; padding: 14px 16px; }
.obs-card-pred { border-left-color: #8B5CF6; }
.obs-card-coup { border-left-color: var(--teal-600, #0D9488); background: #F0FDFA; }
.obs-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
.obs-card-titre { font-size: 14px; font-weight: 700; color: var(--slate-900); line-height: 1.35; }
.obs-card-detail { font-size: 13px; color: var(--slate-600); line-height: 1.55; margin-bottom: 8px; }
.obs-lecture { font-size: 12.5px; color: var(--slate-700); line-height: 1.5; background: var(--blue-50); border-radius: 8px; padding: 8px 11px; }

.obs-card-foot { display: flex; align-items: center; gap: 12px; margin-top: 9px; }
.obs-date { font-size: 11px; color: var(--slate-400); }
.obs-src { font-size: 11.5px; font-weight: 600; color: var(--blue-700); text-decoration: none; }
.obs-src:hover { text-decoration: underline; }
.obs-badge { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
.obs-imp-fort { background: #FEE2E2; color: #B91C1C; }
.obs-imp-moyen { background: #FEF3C7; color: #B45309; }
.obs-imp-faible { background: var(--slate-100); color: var(--slate-500); }
.obs-horizon { background: #EDE9FE; color: #6D28D9; }
.obs-conf { font-size: 11px; font-weight: 600; color: var(--slate-500); }
.obs-signal { background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px; padding: 12px 14px; }
.obs-signal-txt { font-size: 13.5px; font-weight: 600; color: var(--slate-800); margin-bottom: 6px; }
.obs-sources { margin: 0; padding-left: 18px; }
.obs-sources li { font-size: 12.5px; line-height: 1.7; color: var(--slate-600); }
/* Journal d'Orion (historique dépliable) */
.obs-journal { display: flex; flex-direction: column; gap: 10px; }
.obs-journal-intro { font-size: 12.5px; color: var(--slate-500); margin-bottom: 2px; }
.obs-jcard { border: 1px solid var(--slate-200); border-radius: 12px; background: var(--white); overflow: hidden; }
.obs-jcard.is-open { border-color: var(--blue-100); box-shadow: 0 2px 10px rgba(15,23,42,0.05); }
.obs-jhead { width: 100%; display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; background: none; border: none; text-align: left; padding: 14px 16px; cursor: pointer; font-family: inherit; }
.obs-jhead:hover { background: var(--slate-50); }
.obs-jhead-main { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.obs-jdate { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--blue-700); }
.obs-jsynth { font-size: 13px; color: var(--slate-700); line-height: 1.5; }
.obs-jmeta { font-size: 11px; color: var(--slate-400); }
.obs-jtoggle { font-size: 12px; font-weight: 700; color: var(--blue-700); white-space: nowrap; flex-shrink: 0; }
.obs-jbody { padding: 4px 16px 16px; border-top: 1px solid var(--slate-100); }
.obs-jbody .obs-section:first-child { margin-top: 10px; }
/* Onglet « Mon 64 » (veille territoriale) */
.obs-local-hero { background: linear-gradient(135deg, #0F766E, #115E59); color: var(--white); border-radius: 14px; padding: 18px 20px; margin-bottom: 6px; }
.obs-local-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #99F6E4; margin-bottom: 10px; }
.obs-local-hero .obs-synthese { color: #F0FDFA; }
/* Onglet « 🎯 Financements » */
.obs-fin-hero { background: linear-gradient(135deg, #B45309, #92400E); color: var(--white); border-radius: 14px; padding: 18px 20px; margin-bottom: 6px; }
.obs-fin-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #FDE68A; margin-bottom: 10px; }
.obs-fin-hero .obs-synthese { color: #FFFBEB; }
.obs-nav-chip.is-active { background: var(--blue-700); border-color: var(--blue-700); color: var(--white); }
.obs-fin-desc { font-size: 12px; color: var(--slate-500); margin: -4px 0 10px; }
.obs-card-fin { border-left-color: #D97706; }
.obs-fin-org { font-size: 12px; font-weight: 600; color: var(--slate-500); margin-bottom: 8px; }
.obs-fin-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }

/* Barre « Délai pour répondre » */
.obs-fin-delai { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; border-radius: 9px; padding: 8px 12px; margin-bottom: 10px; border: 1px solid transparent; }
.obs-delai-k { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.85; }
.obs-delai-v { font-size: 13px; font-weight: 700; }
.obs-delai-urgent { background: #FEE2E2; border-color: #FECACA; color: #B91C1C; }
.obs-delai-soon { background: #FEF3C7; border-color: #FDE68A; color: #B45309; }
.obs-delai-ok { background: #DCFCE7; border-color: #BBF7D0; color: #15803D; }
.obs-delai-open { background: var(--slate-100); border-color: var(--slate-200); color: var(--slate-600); }
.obs-delai-watch { background: var(--slate-100); border-color: var(--slate-200); color: var(--slate-500); }
.obs-delai-closed { background: var(--slate-100); border-color: var(--slate-200); color: var(--slate-400); }
/* Bloc « Comment Orion cherche » */
.obs-method { margin-top: 18px; border: 1px solid var(--slate-200); border-radius: 12px; background: var(--slate-50); }
.obs-method summary { cursor: pointer; padding: 13px 16px; font-size: 13px; font-weight: 700; color: var(--slate-700); list-style: none; }

.obs-method-body { padding: 0 18px 16px; font-size: 12.5px; color: var(--slate-600); line-height: 1.6; }

.obs-method-body li { margin: 3px 0; }

/* Mako — tableau de bord concurrentiel */

.mako-hero .obs-synthese { color: #F1F5F9; }
.mako-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-top: 16px; }
.mako-card { background: var(--white); border: 1px solid var(--slate-200); border-radius: 16px; padding: 18px; display: flex; flex-direction: column; gap: 13px; box-shadow: 0 1px 3px rgba(15,23,42,0.04); transition: transform .15s, box-shadow .15s, border-color .15s; }
.mako-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(15,23,42,0.10); border-color: var(--slate-300); }
.mako-card-head { display: flex; align-items: flex-start; gap: 12px; }

.mako-menace-indirecte { background: #FEF3C7; color: #B45309; }

.mako-cat { font-size: 10px; font-weight: 700; color: var(--slate-500); background: var(--slate-100); border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
.mako-keyrow { display: flex; gap: 10px; }

/* Console d'agent (Espace Magnus) */
.agent-console-head { margin-bottom: 16px; }

.cap-new { color: var(--teal-700); background: var(--teal-100); border: 1px solid var(--teal-100); font-size: 10.5px; font-weight: 800; border-radius: 20px; padding: 1px 8px; }
.ronde-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--slate-900); color: var(--white); font-size: 13px; font-weight: 600; padding: 12px 18px; border-radius: 12px; box-shadow: 0 8px 30px rgba(15,23,42,0.28); opacity: 0; pointer-events: none; transition: all .3s ease; z-index: 9999; max-width: 90vw; }
.ronde-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* Cap commercialisation */
.cap-verdict { background: var(--blue-50); border: 1px solid var(--blue-100); border-left: 3px solid var(--blue-500); border-radius: 12px; padding: 16px 18px; margin-bottom: 18px; }
.cap-verdict-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--blue-700); margin-bottom: 6px; }
.cap-verdict-text { font-size: 15px; font-weight: 600; color: var(--slate-900); line-height: 1.5; }
.cap-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
@media (max-width: 680px) { .cap-cols { grid-template-columns: 1fr; } }
.cap-col { border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px; background: var(--white); }
.cap-col-head { font-size: 12px; font-weight: 800; color: var(--slate-900); margin-bottom: 10px; }

.cap-path-list { margin: 8px 0 0; padding-left: 20px; }

/* Tendance + relais + propositions roadmap */
.report-evolution { font-size: 13px; color: var(--slate-700); line-height: 1.55; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
.relais-list { display: flex; flex-direction: column; gap: 8px; }
.relais-item { display: flex; gap: 10px; align-items: baseline; font-size: 13px; }
.relais-agent { font-weight: 700; color: var(--blue-700); white-space: nowrap; }
.relais-sujet { color: var(--slate-700); }
.prop-list { display: flex; flex-direction: column; gap: 10px; }
.prop-item { display: flex; gap: 12px; align-items: flex-start; justify-content: space-between; border: 1px solid var(--blue-100); border-radius: 12px; padding: 12px 14px; background: var(--blue-50); }
.prop-main { flex: 1; min-width: 0; }

/* Chips atelier + Carnet de décisions */
.ac-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.ac-chip { font-family: inherit; font-size: 12px; font-weight: 600; color: var(--blue-700); background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 20px; padding: 5px 12px; cursor: pointer; }
.ac-chip:hover { background: var(--blue-100); }
.carnet-add { display: flex; flex-direction: column; gap: 8px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; }
.carnet-input { font-family: inherit; font-size: 13.5px; border: 1px solid var(--slate-200); border-radius: 8px; padding: 9px 11px; resize: vertical; }
.carnet-input:focus { outline: none; border-color: var(--blue-500); }
.carnet-add .btn { align-self: flex-start; }
.carnet-list { display: flex; flex-direction: column; gap: 10px; }
.carnet-item { border: 1px solid var(--slate-200); border-radius: 12px; padding: 12px 15px; background: var(--white); }
.carnet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.carnet-date { font-size: 11px; font-weight: 700; color: var(--blue-700); }
.carnet-del { font-family: inherit; font-size: 11px; color: var(--slate-400); background: none; border: none; cursor: pointer; }

.carnet-titre { font-size: 14px; font-weight: 700; color: var(--slate-900); line-height: 1.45; }
.carnet-pourquoi { font-size: 13px; color: var(--slate-600); line-height: 1.55; margin-top: 5px; }
.agent-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--slate-200); margin-bottom: 20px; flex-wrap: wrap; }
.agent-tab { font-family: inherit; font-size: 13px; font-weight: 600; color: var(--slate-500); background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 14px; cursor: pointer; margin-bottom: -1px; }
.agent-tab:hover { color: var(--slate-900); }
.agent-tab.is-active { color: var(--blue-700); border-bottom-color: var(--blue-500); }
.agent-tab-body { min-height: 220px; }
.ac-journal { display: flex; flex-direction: column; gap: 12px; }
.ac-jentry { border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px; background: var(--white); }
.ac-jdate { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--blue-700); margin-bottom: 8px; }
.ac-jtext { font-size: 13px; color: var(--slate-600); line-height: 1.55; }
.ac-jchantier { font-size: 12.5px; font-weight: 600; color: var(--slate-700); margin-top: 8px; }
.ac-fiche { display: flex; flex-direction: column; gap: 14px; max-width: 640px; }
.ac-fiche-row { display: flex; gap: 12px; font-size: 13.5px; color: var(--slate-700); }
.ac-fiche-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--blue-700); min-width: 120px; }
.ac-fiche-block .ac-fiche-label { margin-bottom: 5px; }
.ac-fiche-text { font-size: 13.5px; color: var(--slate-700); line-height: 1.55; }
.ac-fiche-note { font-size: 12px; color: var(--slate-500); background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 10px; padding: 12px 14px; }
.ac-fiche-note code { font-family: monospace; font-size: 11.5px; color: var(--blue-700); }
.ac-chat { display: flex; flex-direction: column; }
.ac-chat-msgs { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding: 4px; margin-bottom: 12px; }
.ac-chat-hint { font-size: 13px; color: var(--slate-400); font-style: italic; text-align: center; padding: 30px 10px; }
.ac-msg { font-size: 13.5px; line-height: 1.55; padding: 10px 14px; border-radius: 14px; max-width: 80%; white-space: pre-wrap; }
.ac-msg-user { align-self: flex-end; background: var(--blue-700); color: var(--white); border-bottom-right-radius: 4px; }
.ac-msg-assistant { align-self: flex-start; background: var(--slate-50); color: var(--slate-900); border: 1px solid var(--slate-200); border-bottom-left-radius: 4px; }
.ac-msg-pending { color: var(--slate-400); font-style: italic; }
.ac-chat-input { display: flex; gap: 10px; align-items: flex-end; }
.ac-chat-input textarea { flex: 1; font-family: inherit; font-size: 13.5px; border: 1px solid var(--slate-200); border-radius: 10px; padding: 10px 12px; resize: vertical; }
.ac-chat-input textarea:focus { outline: none; border-color: var(--blue-500); }
.ac-chat-note { font-size: 11.5px; color: var(--slate-400); margin-top: 10px; }
.ac-chat-setup { text-align: center; padding: 30px 16px; }
.ac-chat-setup p { font-size: 13.5px; color: var(--slate-600); line-height: 1.6; margin: 0 auto 14px; max-width: 460px; }
.ac-chat-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.ac-chat-ctx { font-size: 11px; color: var(--slate-400); }
.ac-chat-reset { font-family: inherit; font-size: 11.5px; font-weight: 600; color: var(--slate-500); background: none; border: none; cursor: pointer; padding: 0; }
.ac-chat-reset:hover { color: var(--blue-700); }
.ac-msg-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; max-width: 80%; align-self: flex-start; }
.ac-msg-wrap .ac-msg { max-width: 100%; }
.ac-msg-name { font-size: 11px; font-weight: 800; color: var(--blue-700); padding-left: 2px; }
.ac-msg-assistant { white-space: normal; }
.ac-msg-assistant code { font-family: monospace; font-size: 12px; background: var(--white); border: 1px solid var(--slate-200); border-radius: 4px; padding: 0 4px; }
.ac-msg-assistant ul { margin: 6px 0; padding-left: 18px; }

.ac-suivi { display: flex; flex-direction: column; gap: 10px; }
.suivi-row { display: flex; gap: 14px; align-items: flex-start; justify-content: space-between; border: 1px solid var(--slate-200); border-radius: 12px; padding: 12px 15px; background: var(--white); }

.suivi-row.is-ecartee { opacity: .55; }
.suivi-main { flex: 1; min-width: 0; }
.suivi-titre { font-size: 13.5px; font-weight: 600; color: var(--slate-900); line-height: 1.45; }
.suivi-row.is-faite .suivi-titre, .suivi-row.is-ecartee .suivi-titre { text-decoration: line-through; }
.suivi-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
.suivi-type, .suivi-flag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; border-radius: 20px; padding: 2px 9px; }
.suivi-type { color: var(--slate-500); background: var(--slate-50); border: 1px solid var(--slate-200); }
.suivi-flag { color: var(--blue-700); background: var(--blue-50); border: 1px solid var(--blue-100); }
.suivi-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.suivi-etat { font-size: 11px; font-weight: 700; white-space: nowrap; }
.suivi-etat.is-active { color: var(--blue-700); }
.suivi-etat.is-faite { color: var(--teal-700); }
.suivi-etat.is-ecartee { color: var(--slate-400); }
.suivi-actions { display: flex; gap: 6px; }
.suivi-btn { font-family: inherit; font-size: 11px; font-weight: 600; color: var(--white); background: var(--teal-600); border: none; border-radius: 7px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
.suivi-btn:hover { filter: brightness(1.05); }
.suivi-btn-ghost { color: var(--slate-600); background: var(--white); border: 1px solid var(--slate-200); }
.suivi-btn-ghost:hover { background: var(--slate-50); }

/* Bandeau hero en tête de section Stratégie */
.strat-hero {
  display: flex; align-items: center; gap: 22px;
  padding: 18px 4px 28px; margin-bottom: 6px;
  border-bottom: 1px solid var(--slate-200);
}
.strat-hero .mixer-mark { width: 56px; height: 56px; flex-shrink: 0; color: var(--slate-900); }
.strat-hero-text { flex: 1; min-width: 0; }
.strat-hero-title {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  letter-spacing: -0.02em; color: var(--slate-900); line-height: 1.1;
}
.strat-hero-title .accent {
  font-style: italic; font-weight: 500; color: var(--blue-700);
}
.strat-hero-tagline {
  margin-top: 8px; font-size: 14px; color: var(--slate-600);
  line-height: 1.55; font-style: italic; max-width: 720px;
}

/* Marque Mixer (4 curseurs, handle cobalt sur track 3) */
.mixer-mark { display: inline-block; vertical-align: middle; }
.mixer-mark .track { stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; opacity: 0.28; }
.mixer-mark .handle { fill: currentColor; }
.mixer-mark .handle-cobalt { fill: var(--blue-700); }

/* Group cards (aperçu de regroupement) */
.group-card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 14px;
  padding: 22px 24px; cursor: pointer; box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  transition: all .18s ease; display: flex; flex-direction: column; min-height: 184px;
  position: relative; overflow: hidden;
}
.group-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--blue-700); transform: scaleY(0); transform-origin: center;
  transition: transform .25s ease;
}
.group-card:hover { box-shadow: 0 12px 28px rgba(15,23,42,0.10); border-color: var(--slate-300); transform: translateY(-2px); }
.group-card:hover::before { transform: scaleY(1); }
.group-card-head {
  font-family: var(--font-display); font-weight: 500; font-style: italic;
  font-size: 19px; color: var(--slate-900); margin-bottom: 12px;
  letter-spacing: -0.01em; line-height: 1.2;
}
.group-card-lead { flex: 1; font-size: 13.5px; color: var(--slate-700); line-height: 1.6; }
.group-card-count {
  margin-top: 16px; align-self: flex-start;
  font-size: 11px; font-weight: 700; color: var(--slate-500);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.group-card:hover .group-card-count { color: var(--blue-700); }
.group-card.is-expanded {
  background: var(--blue-50);
  border-color: var(--blue-500);
  box-shadow: 0 6px 16px rgba(29,78,216,0.12);
}
.group-card.is-expanded::before { transform: scaleY(1); }
.group-card.is-expanded .group-card-count { color: var(--blue-700); }
.group-card.is-expanded .group-card-lead { color: var(--slate-800); }

/* Quand un groupe est ouvert, les autres se mettent en retrait pour focaliser */
.hub-grid.has-focus .group-card:not(.is-expanded) {
  opacity: 0.38;
  transition: opacity .25s ease;
}
.hub-grid.has-focus .group-card:not(.is-expanded):hover {
  opacity: 1;
}

.group-expansion {
  grid-column: 1 / -1;
  margin: -4px 0 10px;
  padding: 22px 24px 18px;
  background: var(--blue-50);
  border: 1px solid var(--blue-100);
  border-radius: 14px;
  animation: groupExp .22s ease;
}
@keyframes groupExp { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.group-expansion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  align-items: stretch;
}
.group-expansion-actions { margin-top: 18px; display: flex; gap: 10px; }
.group-expansion .encart { background: var(--white); min-height: 168px; }
/* Dans la zone dépliée : on neutralise la distinction large/normal pour un rendu harmonieux */
.group-expansion .encart-lg { grid-column: auto; }
.group-expansion .encart .encart-title,
.group-expansion .encart-lg .encart-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.012em;
  line-height: 1.3;
  margin-bottom: 10px;
}
.group-expansion .encart .encart-text { font-size: 13.5px; line-height: 1.55; }

/* Modale large (vue d'un groupe ouvert) */
.modal.modal-wide { width: min(960px, 92vw); }
.modal-wide .hub-grid { gap: 14px; }
.modal-wide-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; }
.modal-wide-head h2 { margin: 0; }
.modal-wide-head .meta { font-size: 12px; color: var(--slate-500); font-weight: 600; }
.contrib-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-400); font-weight: 700; margin-bottom: 8px; }
.contrib { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 8px; margin-bottom: 6px; }
.contrib-main { flex: 1; min-width: 0; }
.contrib-main .ct { font-size: 13px; font-weight: 600; color: var(--slate-900); }
.contrib-main .cb { font-size: 12.5px; color: var(--slate-600); line-height: 1.5; margin-top: 2px; white-space: pre-wrap; }
.contrib-main .cm { font-size: 10.5px; color: var(--slate-400); margin-top: 5px; }
.contrib-acts { display: flex; gap: 4px; flex-shrink: 0; }
.contrib-acts button {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 6px;
  font-family: inherit; font-size: 11px; font-weight: 600; color: var(--slate-600);
  cursor: pointer; padding: 3px 8px; transition: all .15s; white-space: nowrap;
}
.contrib-acts button:hover { border-color: var(--blue-500); color: var(--blue-700); }

/* Roadmap — frise chronologique */
.roadmap-frise { display: flex; gap: 0; overflow-x: auto; padding: 8px 4px 16px; min-height: 380px; }
.roadmap-col { flex: 0 0 170px; padding: 0 10px; border-right: 1px dashed var(--slate-200); }
.roadmap-col:last-child { border-right: none; }
.roadmap-col-head {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--slate-500); font-weight: 700; padding: 10px 0 12px;
  border-bottom: 2px solid var(--slate-200); margin-bottom: 14px; text-align: center;
}
.roadmap-col.is-current .roadmap-col-head { color: var(--blue-700); border-bottom-color: var(--blue-500); }
.roadmap-col.is-future .roadmap-col-head { color: var(--slate-400); border-bottom-style: dashed; }
.roadmap-items { display: flex; flex-direction: column; gap: 8px; }
.roadmap-item {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 8px;
  padding: 8px 10px; cursor: pointer; transition: all .15s;
  font-size: 12.5px; line-height: 1.35; color: var(--slate-700);
}
.roadmap-item:hover { border-color: var(--blue-500); box-shadow: 0 4px 12px rgba(15,23,42,0.08); transform: translateY(-1px); }
.roadmap-item.is-done { background: var(--teal-100); border-color: var(--teal-100); color: var(--teal-700); }
.roadmap-item.is-doing { background: var(--blue-50); border-color: var(--blue-100); color: var(--blue-700); font-weight: 600; }
.roadmap-item.is-planned { background: var(--white); border-style: dashed; color: var(--slate-500); }
.roadmap-item-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.roadmap-empty { padding: 60px 24px; text-align: center; color: var(--slate-400); font-size: 13px; line-height: 1.6; }
.rm-detail-head { display: flex; align-items: center; gap: 12px; }
.rm-detail-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 20px; }
.rm-detail-status.is-done { background: var(--teal-100); color: var(--teal-700); }
.rm-detail-status.is-doing { background: var(--blue-50); color: var(--blue-700); }
.rm-detail-status.is-planned { background: var(--slate-100); color: var(--slate-600); }
.rm-detail-month { font-size: 12px; color: var(--slate-500); font-weight: 600; letter-spacing: 0.02em; }
.rm-detail-body { font-size: 14px; color: var(--slate-700); line-height: 1.65; white-space: pre-wrap; margin: 12px 0 22px; padding: 14px 16px; background: var(--slate-50); border-left: 3px solid var(--blue-500); border-radius: 4px; }
.rm-detail-empty { font-size: 13px; color: var(--slate-400); font-style: italic; margin: 12px 0 22px; padding: 14px 16px; background: var(--slate-50); border: 1px dashed var(--slate-200); border-radius: 8px; text-align: center; }
.todo-empty-zone {
  font-size: 13px; color: var(--slate-500); padding: 22px 18px;

}
.todo-section-controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.lens-toggle { display: inline-flex; background: var(--slate-100); border-radius: 8px; padding: 3px; gap: 2px; }
.lens-toggle button { border: none; background: transparent; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--slate-500); padding: 5px 11px; border-radius: 6px; cursor: pointer; transition: all .15s; }
.lens-toggle button.active { background: var(--white); color: var(--blue-700); box-shadow: 0 1px 2px rgba(15,23,42,0.08); }
.btn-sm { padding: 6px 11px; font-size: 12px; }
#idea-link-btn.active { background: var(--teal-600); color: var(--white); }
.idea-canvas-wrap {
  position: relative; height: 480px; border: 1px solid var(--slate-200);
  border-radius: 12px; overflow: hidden; background-color: var(--white);
  background-image: radial-gradient(circle at 1px 1px, var(--slate-200) 1px, transparent 0);

}

.idea-canvas-hint {
  position: absolute; bottom: 10px; left: 12px; font-size: 11px; color: var(--slate-500);
  background: rgba(255,255,255,0.85); padding: 4px 9px; border-radius: 6px; pointer-events: none;
}
.idea-canvas-empty {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  text-align: center; color: var(--slate-400); font-size: 13px; padding: 24px; pointer-events: none;
}
/* Mosaïque d'idées (cartes lisibles regroupées + fil conducteur SVG) */
.mm-board { position: relative; padding: 4px 2px 8px; }
.mm-links-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 1; }
.mm-cat { position: relative; z-index: 2; margin: 0 0 26px; }
.mm-cat-head { display: flex; align-items: baseline; gap: 8px; font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slate-500); margin: 0 0 12px; }
.mm-cat-head .mm-cat-count { color: var(--slate-400); font-weight: 600; }
.mm-mosaic { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 13px; align-items: start; }
.mm-card {
  position: relative; background: var(--white); border: 1px solid var(--slate-200); border-left: 4px solid var(--slate-300);
  border-radius: 12px; padding: 12px 13px; cursor: pointer; overflow: hidden; max-height: 158px;
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, opacity .16s ease;
}

.mm-card-title { display: flex; gap: 7px; align-items: flex-start; font-weight: 700; font-size: 13.5px; color: var(--slate-800); line-height: 1.35; }
.mm-card-ic { flex-shrink: 0; font-size: 13px; line-height: 1.4; }
.mm-card-text { margin-top: 7px; font-size: 12.5px; color: var(--slate-600); line-height: 1.5; white-space: pre-wrap; }
.mm-card-cit { font-style: italic; color: var(--slate-500); }
.mm-card-meta { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.mm-chip { font-size: 10.5px; font-weight: 600; border-radius: 20px; padding: 2px 8px; background: var(--slate-100); color: var(--slate-500); }
.mm-chip.link { background: var(--blue-50); color: var(--blue-700); border: 1px solid var(--blue-100); }
.mm-card.archived { opacity: .58; }
.mm-card.dim { opacity: .16; }
.mm-card.linked { border-color: var(--blue-500); box-shadow: 0 0 0 2px var(--blue-100); }
.mm-card.linksrc { border-color: var(--blue-700); box-shadow: 0 0 0 2px var(--blue-200); }
.mm-empty-cat { color: var(--slate-400); font-size: 12.5px; }

/* Prospects table */
table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; border: 1px solid var(--slate-200); }
th { background: var(--blue-700); color: var(--white); text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; }
td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--slate-100); color: var(--slate-700); }
tr:hover td { background: var(--blue-50); }
.status-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.status-contact { background: var(--blue-100); color: var(--blue-700); }
.status-demo { background: var(--orange-100); color: var(--orange-600); }
.status-nego { background: #EDE9FE; color: #7C3AED; }
.status-client { background: var(--teal-100); color: var(--teal-700); }

/* ===== Suivi béta test ===== */
.beta-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
@media (max-width: 900px) { .beta-kpis { grid-template-columns: repeat(2, 1fr); } }
.beta-kpi { background: var(--white); border: 1px solid var(--slate-200); border-radius: 14px; padding: 16px 18px; }

.beta-kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); display: flex; align-items: center; gap: 6px; }

.beta-kpi-sub { font-size: 12px; color: var(--slate-500); }
.beta-block { background: var(--white); border: 1px solid var(--slate-200); border-radius: 14px; padding: 20px 22px; margin-bottom: 18px; }
.beta-block-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.beta-block-head h3 { font-size: 15px; font-weight: 700; color: var(--slate-900); display: flex; align-items: center; gap: 8px; }

.beta-empty { font-size: 13px; color: var(--slate-400); padding: 18px; text-align: center; background: var(--slate-50); border: 1px dashed var(--slate-200); border-radius: 10px; line-height: 1.6; }
.beta-await { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--blue-700); background: var(--blue-50); padding: 3px 9px; border-radius: 20px; }
.sla-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.sla-ok { background: var(--teal-100); color: var(--teal-700); }
.sla-bientot { background: var(--orange-100); color: var(--orange-600); }
.sla-depasse { background: #FEE2E2; color: var(--red-600); }
.sla-resolu { background: var(--slate-100); color: var(--slate-500); }
.sla-na { background: var(--slate-100); color: var(--slate-500); }
.prio-haute { background: #FEE2E2; color: var(--red-600); }
.prio-normale { background: var(--orange-100); color: var(--orange-600); }
.prio-basse { background: var(--slate-100); color: var(--slate-600); }
.beta-eng { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
@media (max-width: 760px) { .beta-eng { grid-template-columns: 1fr; } }
.beta-eng-card { border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px; }
.beta-eng-card h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--slate-500); margin-bottom: 10px; font-weight: 700; }
.beta-report-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--slate-100); font-size: 13px; }
.beta-report-row:first-of-type { border-top: none; }
.beta-journal-item { display: flex; gap: 10px; padding: 10px 0; border-top: 1px solid var(--slate-100); font-size: 13px; }

.beta-journal-ico { flex-shrink: 0; }
.beta-checklist { list-style: none; }
.beta-checklist li { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--slate-600); padding: 5px 0; line-height: 1.5; }

.report-doc { font-size: 13.5px; line-height: 1.65; color: var(--slate-700); }

.report-doc ul { margin: 0 0 4px 18px; }
.report-doc li { margin-bottom: 4px; }
@media print { body * { visibility: hidden; } #report-print, #report-print * { visibility: visible; } #report-print { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; } }
/* Jauge de satisfaction */
.satbar { height: 12px; border-radius: 7px; margin: 12px 0 6px; background: linear-gradient(90deg, #DC2626, #F59E0B, #16A34A); position: relative; opacity: 0.9; }
.satbar-needle { position: absolute; top: -3px; width: 4px; height: 18px; background: var(--slate-900); border-radius: 2px; transform: translateX(-50%); }
/* Zone « À traiter » */
.beta-action-list { display: flex; flex-direction: column; gap: 8px; }
.beta-action-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--slate-200); border-left-width: 4px; border-radius: 10px; background: var(--white); }
.beta-action-item.urg-depasse { border-left-color: var(--red-600); background: #FEF2F2; }
.beta-action-item.urg-bientot { border-left-color: var(--orange-600); }
.beta-action-item.urg-ok { border-left-color: var(--slate-300); }
.beta-action-ico { font-size: 20px; flex-shrink: 0; }
.beta-action-main { flex: 1; min-width: 0; }
.beta-action-titre { font-weight: 600; color: var(--slate-900); font-size: 14px; }
.beta-action-meta { font-size: 12px; color: var(--slate-500); margin-top: 2px; }
.beta-action-btns { display: flex; gap: 6px; flex-shrink: 0; }
.btn.beta-mini { padding: 6px 12px; font-size: 12px; }
.beta-block details > summary { list-style: none; }
.beta-block details > summary::-webkit-details-marker { display: none; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none;
  align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 16px; padding: 24px; width: 480px; max-width: 90vw;
  max-height: 85vh; overflow: auto; box-shadow: 0 24px 48px rgba(15,23,42,0.2);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--slate-600); margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--slate-200); border-radius: 8px;

}
.field textarea { resize: vertical; min-height: 80px; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue-500); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.settings-section { margin-bottom: 18px; }
.settings-section > h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); margin-bottom: 10px; font-weight: 700; }
.settings-row { display: flex; gap: 10px; }
.settings-row .btn { flex: 1; justify-content: center; }
.settings-status { font-size: 12px; padding: 10px 12px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.settings-status .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.empty { text-align: center; padding: 60px 20px; color: var(--slate-400); }
.empty svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); margin: 24px 0 12px; font-weight: 600; }
.node-detail { position: absolute; top: 20px; right: 20px; width: 300px; background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px; padding: 18px; box-shadow: 0 8px 24px rgba(15,23,42,0.12); display: none; }
.node-detail.open { display: block; }
.node-detail h3 { font-size: 16px; margin-bottom: 8px; }
.node-detail .close { position: absolute; top: 12px; right: 12px; cursor: pointer; color: var(--slate-400); border:none; background:none; font-size: 18px; }

/* Explorateur d'architecture (poupées russes) */
.arch-explorer {
  position: absolute; top: 16px; right: 16px; bottom: 16px; width: 440px; max-width: calc(100% - 32px);
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 16px;
  box-shadow: 0 12px 40px rgba(15,23,42,0.16); display: flex; flex-direction: column; overflow: hidden; z-index: 5;
}
.arch-exp-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--slate-100); }
.arch-exp-title { display: flex; align-items: center; justify-content: space-between; }
.arch-exp-title h3 { font-size: 15px; font-weight: 700; color: var(--slate-900); }
.arch-exp-title .close { cursor: pointer; color: var(--slate-400); border:none; background:none; font-size: 20px; line-height: 1; }
.arch-exp-title .close:hover { color: var(--slate-700); }
.arch-search { position: relative; margin-top: 12px; }
.arch-search input {
  width: 100%; padding: 9px 12px 9px 34px; border-radius: 9px; border: 1px solid var(--slate-200);
  background: var(--slate-50); font-family: inherit; font-size: 13px; color: var(--slate-900); outline: none;
}
.arch-search input:focus { background: var(--white); border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.arch-search .ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--slate-400); font-size: 13px; }
.arch-crumb { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; padding: 10px 18px; font-size: 12px; border-bottom: 1px solid var(--slate-100); background: var(--slate-50); }
.arch-crumb a { color: var(--blue-600); cursor: pointer; text-decoration: none; }
.arch-crumb a:hover { text-decoration: underline; }
.arch-crumb .sep { color: var(--slate-300); }
.arch-crumb .here { color: var(--slate-500); font-weight: 600; }
.arch-exp-body { flex: 1; overflow-y: auto; padding: 14px 18px 20px; }
.arch-note { background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 10px; padding: 10px 12px; font-size: 12px; color: var(--slate-600); line-height: 1.5; margin-bottom: 14px; }
.arch-note b { color: var(--blue-700); }
.arch-row {
  display: flex; align-items: center; gap: 11px; padding: 11px 12px; border: 1px solid var(--slate-200);
  border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all .12s; background: var(--white);
}
.arch-row:hover { border-color: var(--blue-500); box-shadow: 0 2px 10px rgba(15,23,42,0.06); transform: translateY(-1px); }
.arch-row.flat { cursor: default; }
.arch-row.flat:hover { border-color: var(--slate-200); box-shadow: none; transform: none; }
.arch-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
.arch-row .main { flex: 1; min-width: 0; }
.arch-row .name { font-size: 13px; font-weight: 600; color: var(--slate-900); word-break: break-word; }
.arch-row .name code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: var(--blue-700); font-weight: 600; }
.arch-row .sub { font-size: 11px; color: var(--slate-500); margin-top: 2px; word-break: break-word; }
.arch-row .count { font-size: 11px; font-weight: 700; color: var(--slate-500); background: var(--slate-100); border-radius: 20px; padding: 2px 9px; flex-shrink: 0; }
.arch-row .chev { color: var(--slate-300); flex-shrink: 0; font-size: 14px; }
.arch-cat { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--slate-400); font-weight: 600; margin: 16px 0 8px; }
.arch-cat:first-child { margin-top: 0; }
.arch-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 3px 9px; margin: 0 5px 5px 0; }
.arch-chip.method { background: var(--blue-50); color: var(--blue-700); }
.arch-chip.protec { background: var(--orange-100); color: var(--orange-600); }
.arch-detail-block { margin-bottom: 16px; }
.arch-detail-block .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--slate-400); font-weight: 600; margin-bottom: 6px; }
.arch-detail-block .val { font-size: 13px; color: var(--slate-700); line-height: 1.5; }
.arch-detail-block .val code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; background: var(--slate-100); padding: 2px 6px; border-radius: 5px; color: var(--slate-700); word-break: break-all; }
.arch-empty { color: var(--slate-400); font-size: 13px; text-align: center; padding: 30px 10px; }
.arch-drill-bar {
  position: absolute; top: 16px; left: 16px; display: flex; align-items: center; gap: 12px;
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px; padding: 8px 12px;
  box-shadow: 0 4px 16px rgba(15,23,42,0.10); z-index: 4; max-width: calc(100% - 480px);
}
.arch-back-btn {
  border: none; background: var(--slate-100); color: var(--slate-700); font-family: inherit;
  font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px; cursor: pointer; flex-shrink: 0;
}
.arch-back-btn:hover { background: var(--slate-200); }
.arch-drill-crumb { font-size: 12px; color: var(--slate-500); display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
.arch-drill-crumb a { color: var(--blue-600); cursor: pointer; }
.arch-drill-crumb a:hover { text-decoration: underline; }
.arch-drill-crumb .sep { color: var(--slate-300); }
.arch-drill-crumb .here { color: var(--slate-700); font-weight: 600; }
.fg-tip {
  position: fixed; z-index: 50; pointer-events: none; max-width: 280px;
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 10px; padding: 10px 12px;
  box-shadow: 0 8px 28px rgba(15,23,42,0.16); font-size: 12px;
}
.fg-tip .t { font-weight: 700; color: var(--slate-900); font-size: 13px; margin-bottom: 3px; }
.fg-tip .d { color: var(--slate-600); line-height: 1.45; margin-bottom: 5px; }
.fg-tip .m { color: var(--slate-500); margin-bottom: 4px; }
.fg-tip .m code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; color: var(--blue-700); word-break: break-all; }
.fg-tip .acc { font-weight: 600; margin-bottom: 5px; }
.fg-tip .h { color: var(--slate-400); font-size: 11px; border-top: 1px solid var(--slate-100); padding-top: 5px; }
/* Comprendre mon code — onglets + fiches + explique-moi */
.arch-modes { display: flex; gap: 6px; margin-top: 12px; }
.arch-mode { flex: 1; font-family: inherit; font-size: 12.5px; font-weight: 600; padding: 7px 10px; border-radius: 9px; border: 1px solid var(--slate-200); background: var(--slate-50); color: var(--slate-600); cursor: pointer; }
.arch-mode:hover { border-color: var(--slate-300); }
.arch-mode.on { background: var(--blue-700); color: var(--white); border-color: var(--blue-700); }
.arch-ask { width: 100%; font-family: inherit; font-size: 13px; font-weight: 600; padding: 10px 12px; border-radius: 10px; border: 1px dashed var(--blue-500); background: var(--blue-50); color: var(--blue-700); cursor: pointer; margin-bottom: 16px; }
.arch-ask:hover { background: var(--blue-100); }
.arch-caps { list-style: none; margin: 0; padding: 0; }
.arch-caps li { font-size: 13px; color: var(--slate-700); padding: 4px 0; border-bottom: 1px solid var(--slate-100); }
.arch-caps li:last-child { border-bottom: none; }
.arch-caps .vb { color: var(--slate-400); font-size: 11.5px; }
.arch-exp-body.explain { display: flex; flex-direction: column; }
.arch-explain-msgs { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 4px 2px 12px; }
.arch-explain-input { display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid var(--slate-100); padding-top: 12px; }
.arch-explain-input textarea { flex: 1; font-family: inherit; font-size: 13.5px; border: 1px solid var(--slate-200); border-radius: 10px; padding: 9px 11px; resize: none; }
.arch-explain-input textarea:focus { outline: none; border-color: var(--blue-500); }

/* Vue Aujourd'hui */
.today-header { padding: 12px 0 28px; }
.today-eyebrow {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--blue-700); margin-bottom: 10px;
  display: inline-flex; align-items: center; gap: 8px;
}
.today-eyebrow::before {
  content: ''; display: inline-block; width: 18px; height: 1px; background: var(--blue-500);
}
.today-greet { font-size: 34px; font-weight: 800; letter-spacing: -0.035em; margin-bottom: 6px; color: var(--slate-900); line-height: 1.1; }
.today-greet .dot { color: var(--blue-500); }
.today-date { font-size: 14px; color: var(--slate-500); margin-bottom: 24px; }
.today-date .day { color: var(--slate-700); font-weight: 600; }
.today-intention {
  position: relative;
  display: flex; align-items: center; gap: 16px;
  background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 14px; padding: 18px 22px 18px 26px;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  transition: border-color .2s, box-shadow .2s;
  overflow: hidden;
}
.today-intention::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--blue-500), var(--teal-600));
}
.today-intention:focus-within { border-color: var(--blue-500); box-shadow: 0 4px 16px rgba(29,78,216,0.08); }
.today-intention label { font-size: 11px; font-weight: 700; color: var(--blue-700); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
.today-intention input {
  flex: 1; border: none; outline: none;
  font-family: inherit; font-size: 15px; font-weight: 500; color: var(--slate-900);
  background: transparent;
}
.today-intention input::placeholder { color: var(--slate-400); font-style: italic; font-weight: 400; }

.today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 32px; }
.today-section h3 {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--slate-700); margin-bottom: 16px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.today-section h3 .count-pill {
  font-size: 11px; font-weight: 700; color: var(--slate-600);
  background: var(--slate-100); border-radius: 20px; padding: 2px 9px;
  letter-spacing: 0.02em;
}
.today-list { display: flex; flex-direction: column; gap: 6px; }
.today-item {
  position: relative; background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; color: var(--slate-700);
  cursor: pointer; transition: all .18s ease;
  display: flex; align-items: center; gap: 12px;
  overflow: hidden;
}
.today-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--blue-500); transform: scaleY(0); transform-origin: center;
  transition: transform .2s ease;
}
.today-item:hover {
  border-color: var(--blue-500); transform: translateX(3px);
  box-shadow: 0 4px 12px rgba(15,23,42,0.06);
}
.today-item:hover::before { transform: scaleY(1); }
.today-item:active { transform: translateX(3px) scale(0.99); }
.today-item .item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px currentColor; opacity: 1; }
.today-item .item-dot { box-shadow: none; }
.today-item .item-meta { margin-left: auto; font-size: 11px; color: var(--slate-400); white-space: nowrap; font-weight: 500; }
.today-item .item-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; color: var(--slate-900); }

.today-subgroup {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--slate-500); margin: 16px 0 8px; font-weight: 700;
  display: flex; align-items: center; gap: 9px;
}
.today-subgroup:first-child { margin-top: 0; }
.today-subgroup .sub-dot { width: 8px; height: 8px; border-radius: 50%; }
.today-subgroup .sub-count { color: var(--slate-400); font-weight: 600; }

.today-pulse {
  margin-top: 32px; background: var(--white);
  border: 1px solid var(--slate-200); border-radius: 14px;
  padding: 22px 28px;
  display: flex; gap: 0; flex-wrap: wrap; align-items: center;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
}
.pulse-item {
  display: flex; flex-direction: column; padding: 0 28px;
  border-left: 1px solid var(--slate-200);
}
.pulse-item:first-child { border-left: none; padding-left: 0; }
.pulse-value {
  font-size: 28px; font-weight: 800; color: var(--slate-900);
  letter-spacing: -0.03em; line-height: 1;
}
.pulse-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--slate-500); margin-top: 6px; font-weight: 700;
}
.today-pulse .scan-info {
  margin-left: auto; font-size: 11px; color: var(--slate-400);
  text-align: right; font-weight: 500; padding-left: 20px;
}
.today-empty-mini {
  font-size: 13px; color: var(--slate-500); padding: 24px 16px;
  background: var(--slate-50); border: 1px dashed var(--slate-200);
  border-radius: 10px; text-align: center; line-height: 1.6;
}
.today-empty-mini a { color: var(--blue-700); cursor: pointer; font-weight: 600; }
.today-empty-mini a:hover { text-decoration: underline; }

/* Recherche topbar */
.topbar { gap: 20px; }
.search-bar {
  position: relative; flex: 0 1 360px; max-width: 360px;
  display: none; align-items: center;
}
.search-bar.visible { display: flex; }
.search-bar input {
  width: 100%; padding: 9px 36px 9px 36px;
  border: 1px solid var(--slate-200); border-radius: 8px;
  background: var(--slate-50); font-family: inherit; font-size: 13px;
  color: var(--slate-900); outline: none;
  transition: all .15s;
}
.search-bar input::placeholder { color: var(--slate-400); }
.search-bar input:focus, .search-bar input:hover { background: var(--white); border-color: var(--slate-300); }
.search-bar input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.search-bar .search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--slate-400); pointer-events: none;
}
.search-bar .search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border: none; background: var(--slate-200);
  color: var(--slate-600); border-radius: 50%;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1; font-family: inherit; padding: 0;
}
.search-bar.has-value .search-clear { display: flex; }
.search-bar .search-clear:hover { background: var(--slate-300); color: var(--slate-900); }
.search-bar .search-kbd {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--slate-400); pointer-events: none;
  background: var(--white); border: 1px solid var(--slate-200);
  padding: 2px 6px; border-radius: 4px; font-weight: 600;
  letter-spacing: 0.02em;
}
.search-bar.has-value .search-kbd,
.search-bar:focus-within .search-kbd { display: none; }
.search-empty {
  text-align: center; padding: 40px 20px; color: var(--slate-400);
  font-size: 13px;
}
.search-empty strong { color: var(--slate-600); }

/* Capture rapide */

.modal.qc-mode { padding: 0; width: 560px; max-height: none; overflow: hidden; }

.qc-input {

}

</style>
</head>
