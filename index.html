<script>
// ============ ÉTAT & PERSISTANCE ============
const STORE_KEY = 'cpts_pilot_cockpit_v1';
let state = {
  nodes: [],      // {id, label, category, type, description, x, y}
  links: [],      // {source, target}
  notes: [],      // {id, title, body, category, links:[noteIds]}
  tasks: [],      // {id, title, category, status}
  strategie: [],  // {id, title, body}
  prospects: [],  // {id, nom, contact, statut, notes}
  today: { intention: '', date: '' },  // intention du jour + date à laquelle elle a été posée
  beta: null      // suivi béta test (voir ensureBeta) — coquille prête à brancher l'instance
};

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { console.warn('Pas de données sauvegardées'); }
  if (!state.nodes) state.nodes = [];
  if (!state.links) state.links = [];
  if (!state.notes) state.notes = [];
  if (!state.tasks) state.tasks = [];
  if (!state.strategie) state.strategie = [];
  if (!state.prospects) state.prospects = [];
  if (!state.today) state.today = { intention: '', date: '' };
  if (!Array.isArray(state.roadmap)) state.roadmap = [];
  if (!Array.isArray(state.precos)) state.precos = [];
  if (!state.agentChats || typeof state.agentChats !== 'object') state.agentChats = {};
  if (!state.agentConfig || typeof state.agentConfig !== 'object') state.agentConfig = {};
  if (!state.lastSeenReport || typeof state.lastSeenReport !== 'object') state.lastSeenReport = {};
  if (!state.handledPropositions || typeof state.handledPropositions !== 'object') state.handledPropositions = {};
  if (!Array.isArray(state.decisions)) state.decisions = [];
  ensureBeta();
  // Stratégie globale en piliers (par section)
  if (!state.strategiePillars) state.strategiePillars = {};
  ['vision','marche','pricing','dev'].forEach(s => { if (!Array.isArray(state.strategiePillars[s])) state.strategiePillars[s] = []; });
  if (!state.strategieSeeded) {
    const defaults = {
      vision: ['Notre cap', 'Pour qui', 'Pourquoi maintenant'],
      marche: ['Cibles prioritaires', 'Canaux', 'Arguments clés'],
      pricing: ['Modèle', 'Offres', 'Logique tarifaire'],
      dev: ['Architecture', 'Hébergement & infra', 'Sécurité']
    };
    Object.keys(defaults).forEach(s => {
      if (state.strategiePillars[s].length === 0)
        state.strategiePillars[s] = defaults[s].map(name => ({ id: uid(), name, text: '', contributions: [] }));
    });
    // Migration des anciens éléments plats vers le 1er pilier de leur section
    if (Array.isArray(state.strategie) && state.strategie.length) {
      state.strategie.forEach(it => {
        const sec = state.strategiePillars[it.section] ? it.section : 'vision';
        const p = state.strategiePillars[sec][0];
        if (p) p.contributions.push({ id: uid(), title: it.title, body: it.body || '', from: 'import', date: '' });
      });
      state.strategie = [];
    }
    state.strategieSeeded = true;
  }
}
function save() {
  reconcilePrecos();
  betaReconcile();
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e) { alert('Erreur de sauvegarde'); }
  scheduleAutoBackup();
}
// Une tâche liée passée à « Terminé » → la préconisation correspondante passe « Faite »
function reconcilePrecos() {
  if (!Array.isArray(state.precos) || !Array.isArray(state.tasks)) return;
  state.precos.forEach(p => {
    if (p.taskId && p.etat === 'active') {
      const t = state.tasks.find(x => x.id === p.taskId);
      if (t && t.status === 'done') p.etat = 'faite';
    }
  });
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ============ NAVIGATION ============
let currentView = 'today';
const titles = {
  today:'Aujourd\'hui',
  graph:'Architecture du code',
  roadmap:'Roadmap produit',
  monitoring:'Monitoring',

function updateSearch(value) {
  searchQuery = value;
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('has-value', !!value);
  render();
  const input = document.getElementById('search-input');
  if (input && document.activeElement !== input) {
    input.focus();
    input.setSelectionRange(value.length, value.length);
  }
}

function clearSearch() {
  searchQuery = '';
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  document.getElementById('search-bar').classList.remove('has-value');
  render();
}

// Raccourcis clavier : "/" pour focus la recherche, "N" pour capture rapide, "Esc" pour fermer/vider
document.addEventListener('keydown', e => {
  const isTyping = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  const modalOpen = document.getElementById('modal-overlay').classList.contains('open');
  if (e.key === '/' && !isTyping && searchPlaceholders[currentView]) {
    e.preventDefault();
    const input = document.getElementById('search-input');
    if (input) input.focus();
  } else if ((e.key === 'n' || e.key === 'N') && !isTyping && !modalOpen) {
    e.preventDefault();
    openQuickCapture();
  } else if (e.key === 'Escape') {
    if (modalOpen) { closeModal(); return; }
    const input = document.getElementById('search-input');
    if (document.activeElement === input) {
      if (searchQuery) clearSearch();
      else input.blur();
    }
  }
});

const catLabel = { tech:'Technique', commercial:'Commercial', strategie:'Stratégie' };
const catClass = { tech:'tag-tech', commercial:'tag-commercial', strategie:'tag-strategie' };

function render() {
  const content = document.getElementById('content');
  const actions = document.getElementById('view-actions');
  content.innerHTML = '';
  actions.innerHTML = '';

  // Sync la barre de recherche selon la vue
  const searchBar = document.getElementById('search-bar');
  const searchInput = document.getElementById('search-input');
  if (searchPlaceholders[currentView]) {
    searchBar.classList.add('visible');
    searchInput.placeholder = searchPlaceholders[currentView];
    if (searchInput.value !== searchQuery) searchInput.value = searchQuery;
    searchBar.classList.toggle('has-value', !!searchQuery);
  } else {
    searchBar.classList.remove('visible', 'has-value');
    searchInput.value = '';
  }

  if (currentView === 'today') renderToday(content, actions);
  else if (currentView === 'graph') renderGraph(content, actions);
  else if (currentView === 'roadmap') renderRoadmap(content, actions);
  else if (currentView === 'monitoring') renderPlaceholder(content, actions, 'monitoring');
  else if (currentView === 'todo') renderTodo(content, actions);
  else if (currentView === 'idees') renderIdees(content, actions);
  else if (currentView === 'strat-vision') renderStrategie(content, actions, 'vision');
  else if (currentView === 'strat-marche') renderStrategie(content, actions, 'marche');
  else if (currentView === 'strat-pricing') renderStrategie(content, actions, 'pricing');
  else if (currentView === 'strat-dev') renderStrategie(content, actions, 'dev');
  else if (currentView === 'strat-organigramme') renderOrganigramme(content, actions);
  else if (currentView === 'agent') renderAgentConsole(content, actions);
  else if (currentView === 'clients-valides') renderProspects(content, actions, 'clients');
  else if (currentView === 'clients-prospects') renderProspects(content, actions, 'prospects');
  else if (currentView === 'communication') renderPlaceholder(content, actions, 'communication');
  else if (currentView === 'beta') renderBeta(content, actions);
}

function goTo(view) {
  document.querySelectorAll('.nav-item, .nav-subitem').forEach(i => i.classList.toggle('active', i.dataset.view === view));
  // Déplie le groupe contenant la sous-vue active
  const active = document.querySelector('.nav-subitem.active');
  if (active) { const g = active.closest('.nav-group'); if (g) g.classList.remove('collapsed'); }
  currentView = view;
  searchQuery = '';  // reset à chaque changement de vue
  document.getElementById('view-title').textContent = titles[view] || '';
  render();
}

// Helper : filtre une liste sur plusieurs champs
function matchSearch(item, fields) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return fields.some(f => (f||'').toString().toLowerCase().includes(q));
}

let chefProduitReport = null;
// Notification « nouveau point » : un rapport est neuf tant qu'Eva n'a pas ouvert l'Espace de l'agent
function isReportNew(slug, updatedAt) { return !!updatedAt && (state.lastSeenReport || {})[slug] !== updatedAt; }
function markReportSeen(slug, updatedAt) {
  if (!updatedAt) return;
  if (!state.lastSeenReport) state.lastSeenReport = {};
  if (state.lastSeenReport[slug] !== updatedAt) { state.lastSeenReport[slug] = updatedAt; save(); }
}
// Auto-refresh après une ronde : on guette l'arrivée du nouveau rapport
let rondePollTimer = null;
function pollForNewReport(slug, baseline) {
  if (rondePollTimer) clearInterval(rondePollTimer);
  let tries = 0;
  rondePollTimer = setInterval(async () => {
    if (++tries > 16) { clearInterval(rondePollTimer); rondePollTimer = null; return; }   // ~8 min max
    try {
      const resp = await fetch('agents/' + slug + '.json?t=' + Date.now());
      if (!resp.ok) return;
      const data = await resp.json();
      const reps = (data && Array.isArray(data.journal)) ? data.journal : [data];
      if (reps.length > baseline) {
        clearInterval(rondePollTimer); rondePollTimer = null;
        if (slug === 'chef-produit') chefProduitReport = reps[reps.length - 1];
        if (currentView === 'agent' && currentAgentSlug === slug) { agentConsoleData = data; render(); }
        else render();
        const ag = (findAgentBySlug(slug) || { a: {} }).a;
        showRondeToast((ag.prenom || ag.name || 'L\'agent') + ' a fini sa ronde — son nouveau point est arrivé ✨');
      }
    } catch (e) { /* on réessaie au prochain tour */ }
  }, 30000);
}
function showRondeToast(msg) {
  let t = document.getElementById('ronde-toast');
  if (!t) { t = document.createElement('div'); t.id = 'ronde-toast'; t.className = 'ronde-toast'; document.body.appendChild(t); }
  t.textContent = '✅ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 9000);
}

// Registre de suivi des préconisations (proposée → en tâche/roadmap → faite/écartée)
function precoKey(text) { return (text || '').trim().toLowerCase().replace(/\s+/g, ' ').slice(0, 120); }
function upsertPreco(titre, type, fromDate, agentSlug) {
  const key = precoKey(titre); if (!key) return null;
  let p = (state.precos || []).find(x => x.key === key && x.agent === agentSlug);
  if (!p) { p = { id: uid(), key, titre: (titre || '').trim(), type, fromDate: fromDate || '', agent: agentSlug, enTache: false, enRoadmap: false, etat: 'active' }; state.precos.push(p); return { p, added: true }; }
  return { p, added: false };
}
function registerReportPrecos(r, agentSlug) {
  if (!r) return;
  const date = r.updated_at || ''; let added = false;
  if (r.prochain_chantier && r.prochain_chantier.titre) { const res = upsertPreco(r.prochain_chantier.titre, 'chantier', date, agentSlug); if (res && res.added) added = true; }
  if (Array.isArray(r.a_anticiper)) r.a_anticiper.forEach(x => { const res = upsertPreco(String(x), 'anticiper', date, agentSlug); if (res && res.added) added = true; });
  // Orion : ses « coups d'avance » se suivent comme des préconisations
  if (Array.isArray(r.coups_avance)) r.coups_avance.forEach(c => { if (c && c.titre) { const res = upsertPreco(c.titre, 'coup', date, agentSlug); if (res && res.added) added = true; } });
  // Magnus a observé dans le code que des chantiers/tâches sont réalisés → on les marque « Faite »
  if (Array.isArray(r.faits)) r.faits.forEach(titre => {
    const k = precoKey(String(titre));
    const p = (state.precos || []).find(x => x.key === k && x.agent === agentSlug);
    if (p && p.etat !== 'ecartee' && p.etat !== 'faite') {
      p.etat = 'faite'; added = true;
      if (p.taskId) { const t = (state.tasks || []).find(x => x.id === p.taskId); if (t) t.status = 'done'; }
    }
    // n'importe quelle tâche (même créée à la main) dont le titre correspond → Terminé
    const t2 = (state.tasks || []).find(x => precoKey(x.title) === k && x.status !== 'done');
    if (t2) { t2.status = 'done'; added = true; }
  });
  if (added) save();
}
function markPreco(id, etat) {
  const p = (state.precos || []).find(x => x.id === id); if (!p) return;
  p.etat = etat;
  if (p.taskId) {
    const t = (state.tasks || []).find(x => x.id === p.taskId);
    if (t) { if (etat === 'faite') t.status = 'done'; else if (etat === 'active' && t.status === 'done') t.status = 'todo'; }
  }
  save(); render();
}

function createTaskFromChantier(ev) {
  const btn = ev && ev.currentTarget;

  if (!r || !r.prochain_chantier || !r.prochain_chantier.titre) return;
  const titre = r.prochain_chantier.titre.trim();
  const dup = state.tasks.find(t => (t.title || '').trim().toLowerCase() === titre.toLowerCase() && t.status !== 'done');
  if (dup) {
    if (btn) { btn.textContent = 'Déjà dans ton To do'; btn.disabled = true; btn.classList.add('cap-task-btn-done'); }
    return;
  }
  const id = uid();
  state.tasks.push({
    id, title: titre, status: 'todo', category: 'tech',
    body: 'Préconisé par Magnus (Chef Produit).\n\n' + (r.prochain_chantier.pourquoi || '')
  });
  const pr = upsertPreco(titre, 'chantier', r.updated_at || '', 'chef-produit');
  if (pr && pr.p) { pr.p.enTache = true; pr.p.taskId = id; if (pr.p.etat === 'ecartee') pr.p.etat = 'active'; }
  save();
  if (btn) { btn.textContent = '✓ Ajouté à ton To do'; btn.disabled = true; btn.classList.add('cap-task-btn-done'); }
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function formatRelativeDate(iso) {
  const d = new Date(iso);
  const diffH = Math.floor((Date.now() - d.getTime()) / 3600000);
  if (diffH < 1) return 'il y a moins d\'1h';
  if (diffH < 24) return 'il y a ' + diffH + 'h';
  const diffD = Math.floor(diffH / 24);
  if (diffD < 7) return 'il y a ' + diffD + 'j';

}

function truncLabel(s, max) { s = String(s||''); return s.length > max ? s.slice(0, max-1) + '…' : s; }

// ===== Niveaux d'accès : on traduit les protections du code en langage clair =====
const ARCH_ACCESS = {
  public:   { label: 'Accès libre (public)', color: '#16A34A' },
  login:    { label: 'Connexion requise',     color: '#2563EB' },
  restrict: { label: 'Accès restreint',       color: '#D97706' },
  admin:    { label: 'Réservé aux admins',    color: '#7C3AED' }
};
function routeAccess(r) {
  const p = r.protections || [];
  if (p.includes('admin_required')) return 'admin';
  if (p.includes('bureau_required') || p.includes('module_access')) return 'restrict';
  if (p.length) return 'login';

}
// Libellés en français clair (au lieu des noms techniques)
function frFile(file) {
  let n = (file || '').split('/').pop().replace(/\.py$/, '').replace(/^routes?_/, '').replace(/_/g, ' ').trim();
  return n ? n.charAt(0).toUpperCase() + n.slice(1) : 'Fichier';
}
function frRoute(r) {
  const path = (r.path || ''), method = (r.methods || ['GET'])[0];
  const segs = path.split('/').filter(s => s && !s.startsWith('<'));
  const last = (segs[segs.length - 1] || '').toLowerCase();
  let verb;
  if (/ajouter|add|create|nouveau|new/.test(last)) verb = 'Ajouter';
  else if (/modifier|edit|update/.test(last)) verb = 'Modifier';
  else if (/supprimer|delete|remove/.test(last)) verb = 'Supprimer';
  else if (/liste|list/.test(last)) verb = 'Liste';
  else if (/export|telecharger|download/.test(last)) verb = 'Exporter';
  else if (/valider|valid|envoyer/.test(last)) verb = 'Valider';
  else if (/voir|view|detail|fiche|afficher/.test(last)) verb = 'Voir';
  else verb = ({ GET:'Voir', POST:'Enregistrer', PUT:'Modifier', PATCH:'Modifier', DELETE:'Supprimer' })[method] || 'Action';
  const subjSegs = segs.filter(s => !/(ajouter|add|create|nouveau|new|modifier|edit|update|supprimer|delete|remove|liste|list|voir|view|detail|fiche|afficher|export|telecharger|download|valider|valid|envoyer)/i.test(s));
  const subject = (subjSegs[subjSegs.length - 1] || segs[0] || last || 'élément').replace(/_/g, ' ');
  return verb + ' · ' + subject;
}

let fg = { nodes: [], links: [] };

function fgInit() {

function fgNode(id) { return fg.nodes.find(n => n.id === id); }
function fgChildren(id) { return fg.nodes.filter(n => n.parent === id); }
function fgWake() { fgTemp = 6; fgSettled = false; fgCalm = 0; }

function fgToggle(node) { if (node.expanded) fgCollapse(node); else fgExpand(node); }
function fgExpand(node) {
  const mod = getArchModule(node.mod); if (!mod) return;
  const created = [];
  if (node.kind === 'module') {
    archFilesOf(mod).forEach(f => {
      const id = 'file_' + node.mod + '::' + f.file;
      if (fgNode(id)) return;
      created.push({ id, kind: 'file', mod: node.mod, file: f.file, label: frFile(f.file),
        zoneColor: mod.color, parent: node.id, expanded: false, count: f.routes.length,

    });
  } else if (node.kind === 'file') {
    (mod.routes || []).filter(r => (r.file || 'fichier non identifié') === node.file).forEach(r => {
      const key = (r.function || '') + '|' + (r.path || '');
      const id = 'route_' + node.mod + '::' + node.file + '::' + key;
      if (fgNode(id)) return;
      created.push({ id, kind: 'route', mod: node.mod, file: node.file, routeKey: key,
        label: frRoute(r), rawPath: r.path, zoneColor: mod.color, access: routeAccess(r),
        parent: node.id, expanded: false, r: 9,
        x: node.x + (Math.random()-.5)*60, y: node.y + (Math.random()-.5)*60, vx: 0, vy: 0 });
    });
  }
  created.forEach(c => { fg.nodes.push(c); fg.links.push({ a: node.id, b: c.id }); });
  node.expanded = true; fgFitTarget = node; fgWake();
}
function fgCollapse(node) {
  const kill = new Set(), stack = [node.id];
  while (stack.length) { const cur = stack.pop(); fgChildren(cur).forEach(c => { kill.add(c.id); stack.push(c.id); }); }
  fg.nodes.forEach(nd => { if (kill.has(nd.id)) nd.expanded = false; });
  fg.nodes = fg.nodes.filter(nd => !kill.has(nd.id));
  fg.links = fg.links.filter(l => !kill.has(l.a) && !kill.has(l.b));
  node.expanded = false; fgWake();
}

// Liens effectifs = structure dépliée + liens manuels dont les 2 bouts sont visibles
function fgLinks() {
  const links = fg.links.slice();
  (state.links || []).forEach(l => { if (fgNode(l.source) && fgNode(l.target)) links.push({ a: l.source, b: l.target, manual: true }); });
  return links;
}

// --- Caméra ---
function w2s(x, y) { return { x: x * graphCam.scale + graphCam.offsetX, y: y * graphCam.scale + graphCam.offsetY }; }
function s2w(x, y) { return { x: (x - graphCam.offsetX) / graphCam.scale, y: (y - graphCam.offsetY) / graphCam.scale }; }
function fgFit() {
  if (!fgCanvas || !fg.nodes.length) return;
  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  fg.nodes.forEach(n => { minX = Math.min(minX, n.x-n.r); maxX = Math.max(maxX, n.x+n.r); minY = Math.min(minY, n.y-n.r); maxY = Math.max(maxY, n.y+n.r); });
  const W = fgCanvas.width, H = fgCanvas.height, pad = 90;
  const drawer = archExplorerOpen ? 456 : 0, availW = Math.max(200, W - drawer);
  let s = Math.min((availW-pad)/Math.max(1, maxX-minX), (H-pad)/Math.max(1, maxY-minY));
  s = Math.max(0.25, Math.min(1.6, s));
  graphCam.scale = s;
  graphCam.offsetX = availW/2 - ((minX+maxX)/2)*s;
  graphCam.offsetY = H/2 - ((minY+maxY)/2)*s;
}
// Boîte englobante d'un nœud + ses descendants + ses ancêtres (pour recadrer sur ce qu'on vient d'ouvrir)
function fgSubtreeBBox(node) {
  const ids = new Set([node.id]), stack = [node.id];
  while (stack.length) { const c = stack.pop(); fgChildren(c).forEach(k => { ids.add(k.id); stack.push(k.id); }); }
  let cur = node; while (cur && cur.parent) { const par = fgNode(cur.parent); if (!par) break; ids.add(par.id); cur = par; }
  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  fg.nodes.forEach(n => { if (!ids.has(n.id)) return; minX = Math.min(minX, n.x-n.r); maxX = Math.max(maxX, n.x+n.r); minY = Math.min(minY, n.y-n.r); maxY = Math.max(maxY, n.y+n.r); });
  return { minX, minY, maxX, maxY };
}
// Anime la caméra vers une boîte englobante (transition douce)
function fgAnimateToBox(box) {
  if (!fgCanvas || box.maxX < box.minX) return;
  const W = fgCanvas.width, H = fgCanvas.height, pad = 130;
  const drawer = archExplorerOpen ? 456 : 0, availW = Math.max(200, W - drawer);
  let s = Math.min((availW-pad)/Math.max(1, box.maxX-box.minX), (H-pad)/Math.max(1, box.maxY-box.minY));
  s = Math.max(0.12, Math.min(1.5, s));
  const tox = availW/2 - ((box.minX+box.maxX)/2)*s, toy = H/2 - ((box.minY+box.maxY)/2)*s;
  if (fgCamRAF) cancelAnimationFrame(fgCamRAF);
  const s0 = graphCam.scale, ox0 = graphCam.offsetX, oy0 = graphCam.offsetY, t0 = performance.now(), dur = 450;
  const ease = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
  function step(now) {
    const k = Math.min(1, (now-t0)/dur), e = ease(k);
    graphCam.scale = s0 + (s-s0)*e; graphCam.offsetX = ox0 + (tox-ox0)*e; graphCam.offsetY = oy0 + (toy-oy0)*e;
    fgCamRAF = k < 1 ? requestAnimationFrame(step) : null;
  }
  fgCamRAF = requestAnimationFrame(step);
}

// --- Simulation : carte stable (modules ancrés) + amas compacts locaux ---
function fgPhysics() {
  const nodes = fg.nodes, CUT2 = 320 * 320;
  for (let i = 0; i < nodes.length; i++) { nodes[i].fx = 0; nodes[i].fy = 0; }
  // Répulsion locale (au-delà d'une portée, on s'ignore → les amas restent groupés près de leur module)
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i+1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy;
      if (d2 > CUT2) continue;
      let d = Math.sqrt(d2);
      if (d < 0.01) { dx = Math.random()-.5; dy = Math.random()-.5; d = 0.5; d2 = 0.25; }
      // frères (même parent) : se repoussent fort pour s'étaler en éventail ; sinon répulsion douce
      const sameParent = a.parent && a.parent === b.parent;
      let f = (sameParent ? 9000 : 4200) / d2;
      if (f > 7) f = 7;
      const ux = dx/d, uy = dy/d;
      a.fx += ux*f; a.fy += uy*f; b.fx -= ux*f; b.fy -= uy*f;
    }
  }
  // Ressorts : enfant tenu court près de son parent ; liens manuels plus lâches
  fgLinks().forEach(l => {
    const a = fgNode(l.a), b = fgNode(l.b); if (!a || !b) return;
    let dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy) || 0.01;
    const rest = l.manual ? 130 : (a.r + b.r + 30);
    const k = l.manual ? 0.015 : 0.05;
    const f = (d - rest) * k, ux = dx/d, uy = dy/d;
    a.fx += ux*f; a.fy += uy*f; b.fx -= ux*f; b.fy -= uy*f;
  });
  nodes.forEach(n => {
    if (n.parent === null) {
      // Modules / nœuds manuels : ancrés à leur position d'origine → carte stable et reconnaissable
      n.fx += (n.hx - n.x) * 0.06; n.fy += (n.hy - n.y) * 0.06;
    } else {
      // Enfants : légère cohésion vers leur parent (l'amas reste compact)
      const p = fgNode(n.parent);
      if (p) { n.fx += (p.x - n.x) * 0.02; n.fy += (p.y - n.y) * 0.02; }
    }
  });
  // Déplacement borné par la température (refroidit pour se stabiliser)
  const T = fgTemp;
  let maxDisp = 0;
  nodes.forEach(n => {
    if (n === fgDrag) return;
    const m = Math.sqrt(n.fx*n.fx + n.fy*n.fy) || 0.0001;
    const dx = n.fx/m * Math.min(m, T), dy = n.fy/m * Math.min(m, T);
    n.x += dx; n.y += dy;
    const disp = Math.abs(dx) + Math.abs(dy);
    if (disp > maxDisp) maxDisp = disp;
  });
  fgTemp = Math.max(0.05, fgTemp * 0.95);
  return maxDisp;
}

function fgDraw() {
  const ctx = fgCtx, S = graphCam.scale;
  ctx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);
  let near = null;
  if (fgHover) { near = new Set([fgHover.id]); fgLinks().forEach(l => { if (l.a === fgHover.id) near.add(l.b); if (l.b === fgHover.id) near.add(l.a); }); }
  // Liens
  fgLinks().forEach(l => {
    const a = fgNode(l.a), b = fgNode(l.b); if (!a || !b) return;
    const pa = w2s(a.x, a.y), pb = w2s(b.x, b.y);
    const dim = near && !(near.has(a.id) && near.has(b.id));
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = l.manual ? (dim ? 'rgba(13,148,136,0.15)' : 'rgba(13,148,136,0.55)') : (dim ? 'rgba(148,163,184,0.10)' : 'rgba(148,163,184,0.40)');
    ctx.lineWidth = (l.manual ? 2 : 1.3) * Math.max(0.5, S); ctx.stroke();
  });
  // Nœuds (pastilles)
  fg.nodes.forEach(n => {
    const p = w2s(n.x, n.y), r = n.r * S;
    const dim = near && !near.has(n.id);
    ctx.globalAlpha = dim ? 0.22 : 1;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = archNodeColor(n); ctx.fill();
    if (linkSource === n.id) { ctx.lineWidth = 3; ctx.strokeStyle = '#0D9488'; ctx.stroke(); }
    else if (n === fgHover) { ctx.lineWidth = 3; ctx.strokeStyle = '#0F172A'; ctx.stroke(); }
    else if (n.expanded) { ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke(); }
    // Chiffre au centre (nb de routes)
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (n.kind === 'module') { const m = getArchModule(n.mod); ctx.font = `700 ${Math.max(10,13*S)}px Manrope, sans-serif`; ctx.fillText(m ? m.route_count : '', p.x, p.y); }
    else if (n.kind === 'file') { ctx.font = `700 ${Math.max(9,11*S)}px Manrope, sans-serif`; ctx.fillText(n.count, p.x, p.y); }
    else if (n.kind === 'manual') { ctx.font = `700 ${Math.max(10,12*S)}px Manrope, sans-serif`; ctx.fillText('✦', p.x, p.y); }
    ctx.globalAlpha = 1;
  });
  ctx.textBaseline = 'alphabetic';
  // Libellés : placement radial (en éventail) + anti-chevauchement
  const fs = Math.max(10, Math.min(15, 12 * S));
  ctx.font = `600 ${fs}px Manrope, sans-serif`;
  const placed = [];
  const overlaps = (a) => placed.some(b => !(a.x2 < b.x1 || b.x2 < a.x1 || a.y2 < b.y1 || b.y2 < a.y1));
  // Priorité : survol > modules > nœuds manuels > fichiers > grosses routes
  const cands = fg.nodes
    .filter(n => !(near && !near.has(n.id)))
    .filter(n => n === fgHover || n.kind === 'module' || n.kind === 'manual' || n.r * S > 9)
    .map(n => ({ n, prio: n === fgHover ? 1000 : n.kind === 'module' ? 800 : n.kind === 'manual' ? 700 : n.kind === 'file' ? 600 : 100 + n.r }))
    .sort((a, b) => b.prio - a.prio);
  cands.forEach(({ n }) => {
    const p = w2s(n.x, n.y), r = n.r * S;
    const txt = truncLabel(n.label, n.kind === 'route' ? 24 : 18);
    const w = ctx.measureText(txt).width;
    let lx, ly, align = 'center';
    const par = n.parent ? fgNode(n.parent) : null;
    if (par) {
      // Étiquette poussée vers l'extérieur, à l'opposé du parent (effet éventail)
      const pp = w2s(par.x, par.y);
      let ang = Math.atan2(p.y - pp.y, p.x - pp.x);
      if (!isFinite(ang)) ang = Math.PI / 2;
      lx = p.x + Math.cos(ang) * (r + 7);
      ly = p.y + Math.sin(ang) * (r + 7) + fs * 0.35;
      align = Math.cos(ang) >= 0 ? 'left' : 'right';
    } else {
      lx = p.x; ly = p.y + r + fs + 2; align = 'center';
    }
    const x1 = align === 'left' ? lx : align === 'right' ? lx - w : lx - w / 2;
    const rect = { x1: x1 - 3, x2: x1 + w + 3, y1: ly - fs, y2: ly + 4 };
    if (n !== fgHover && overlaps(rect)) return; // on garde le plus prioritaire, le reste au survol
    placed.push(rect);
    // Fond blanc translucide pour la lisibilité
    ctx.fillStyle = 'rgba(248,250,252,0.82)';
    ctx.fillRect(rect.x1, rect.y1, rect.x2 - rect.x1, rect.y2 - rect.y1);
    ctx.fillStyle = n === fgHover ? '#0F172A' : '#334155';
    ctx.textAlign = align;
    ctx.fillText(txt, lx, ly);
  });
  ctx.textAlign = 'center';
}

function fgNodeAt(sx, sy) {
  for (let i = fg.nodes.length-1; i >= 0; i--) {
    const n = fg.nodes[i], p = w2s(n.x, n.y);
    if (Math.hypot(sx-p.x, sy-p.y) <= n.r*graphCam.scale + 2) return n;
  }
  return null;
}

function fgClick(node) {
  if (node.kind === 'manual') { showNodeDetail(node.manualRef); return; }
  if (node.kind === 'route') { archOpenRoute(node.mod, node.file, node.routeKey); return; }

  fgToggle(node);

}

function fgTip(node, clientX, clientY) {
  const tip = document.getElementById('fg-tip'); if (!tip) return;
  if (!node) { tip.style.display = 'none'; return; }

      + `<div class="h">${node.expanded ? 'Clic : replier' : 'Clic : déplier ses fichiers'}</div>`;

      + `<div class="h">${node.expanded ? 'Clic : replier' : 'Clic : déplier ses routes'}</div>`;

      + `<div class="acc" style="color:${a.color}">● ${esc(a.label)}</div><div class="h">Clic : voir la fiche détaillée</div>`;
  } else {

  if (x + tw > window.innerWidth - 10) x = clientX - tw - 16;
  if (y + th > window.innerHeight - 10) y = clientY - th - 16;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}

function fgLoop() {
  if (!fgCanvas || !document.body.contains(fgCanvas)) { fgRAF = null; return; }
  // Tant que ce n'est pas stabilisé, on simule ; sinon on fige (plus aucun mouvement parasite)
  if (!fgSettled) {
    const md = fgPhysics();
    if (fgDrag) fgCalm = 0;
    else if (md < 0.4) {
      if (++fgCalm > 24) {
        fgSettled = true;
        // Une fois posé, on recadre en douceur sur le nœud qu'on vient d'ouvrir
        if (fgFitTarget) { fgAnimateToBox(fgSubtreeBBox(fgFitTarget)); fgFitTarget = null; }
      }
    } else fgCalm = 0;
  }
  fgDraw();
  fgRAF = requestAnimationFrame(fgLoop);
}

function setupGraph(canvas) {
  fgCanvas = canvas; fgCtx = canvas.getContext('2d');
  if (fgRAF) cancelAnimationFrame(fgRAF);
  if (fgResize) window.removeEventListener('resize', fgResize);
  fgResize = function () { const r = canvas.parentElement.getBoundingClientRect(); canvas.width = r.width; canvas.height = r.height; };
  window.addEventListener('resize', fgResize);
  fgResize();
  // On stabilise la disposition AVANT le premier affichage, puis on fige et on recadre
  fgTemp = 6;
  for (let i = 0; i < 240; i++) fgPhysics();
  fgSettled = true; fgCalm = 0; fgTemp = 0.05;
  fgFit();

  canvas.onmousedown = e => {
    const rect = canvas.getBoundingClientRect(), mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const node = fgNodeAt(mx, my);
    fgDownPos = { x: mx, y: my }; fgDownTime = Date.now(); fgMoved = false;
    if (linkMode && node) {
      if (!linkSource) linkSource = node.id;
      else if (linkSource !== node.id) {
        state.links = state.links || [];
        const ex = state.links.some(l => (l.source===linkSource&&l.target===node.id)||(l.source===node.id&&l.target===linkSource));
        if (!ex) { state.links.push({ source: linkSource, target: node.id }); save(); }
        linkSource = null;
      }
      return;
    }
    if (node) { fgDrag = node; fgWake(); }
    else { fgPan = { x: mx, y: my, ox: graphCam.offsetX, oy: graphCam.offsetY }; }
  };
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect(), mx = e.clientX-rect.left, my = e.clientY-rect.top;
    if (fgDownPos && (Math.abs(mx-fgDownPos.x) > 4 || Math.abs(my-fgDownPos.y) > 4)) fgMoved = true;
    if (fgDrag) { const w = s2w(mx, my); fgDrag.x = w.x; fgDrag.y = w.y; fgDrag.vx = 0; fgDrag.vy = 0;
      if (fgDrag.parent === null) { fgDrag.hx = w.x; fgDrag.hy = w.y; } // déplacer un module redéfinit son ancrage
      fgWake(); fgTip(null); return; }
    if (fgPan) { graphCam.offsetX = fgPan.ox + (mx-fgPan.x); graphCam.offsetY = fgPan.oy + (my-fgPan.y); return; }
    const node = fgNodeAt(mx, my);
    fgHover = node;
    canvas.style.cursor = node ? 'pointer' : 'grab';
    fgTip(node, e.clientX, e.clientY);
  };
  canvas.onmouseup = () => {
    if (fgDrag && fgDrag.manualRef) { fgDrag.manualRef.x = fgDrag.x; fgDrag.manualRef.y = fgDrag.y; save(); }
    const wasDrag = fgMoved || (Date.now() - fgDownTime > 250);
    const node = fgDrag;
    fgDrag = null; fgPan = null; fgDownPos = null;
    if (!wasDrag && node && !linkMode) fgClick(node);
  };
  canvas.onmouseleave = () => { fgHover = null; fgDrag = null; fgPan = null; fgDownPos = null; fgTip(null); };
  canvas.ondblclick = () => { fgFit(); };
  canvas.onwheel = e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect(), mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = s2w(mx, my);
    graphCam.scale *= e.deltaY > 0 ? 0.9 : 1.1;
    graphCam.scale = Math.max(0.08, Math.min(4, graphCam.scale));
    const after = s2w(mx, my);
    graphCam.offsetX += (after.x-before.x) * graphCam.scale;
    graphCam.offsetY += (after.y-before.y) * graphCam.scale;
  };
  fgLoop();
}

// Liste lisible de « ce qu'on peut faire » : on regroupe les routes par sujet + verbes
function archCapabilities(mod) {
  const bySubject = {};
  (mod.routes || []).forEach(r => {
    const c = frRoute(r);                 // "Verbe · sujet"
    const idx = c.indexOf(' · ');
    if (idx < 0) return;
    const verb = c.slice(0, idx), subj = c.slice(idx + 3).trim();
    if (!subj) return;
    (bySubject[subj] = bySubject[subj] || new Set()).add(verb.toLowerCase());
  });
  return Object.keys(bySubject)
    .map(s => ({ subject: s, verbs: [...bySubject[s]], n: bySubject[s].size }))
    .sort((a, b) => b.n - a.n);
}
// Répartition des accès dans une partie (sécurité)
function archSecurity(mod) {
  const c = { public: 0, login: 0, restrict: 0, admin: 0, total: 0 };
  (mod.routes || []).forEach(r => { c[routeAccess(r)]++; c.total++; });
  return c;
}
// Poids relatif d'un module (pour dire « grosse » / « petite » partie)
function archWeight(name) {
  const counts = (archData.modules || []).map(m => m.route_count || 0).sort((a, b) => b - a);
  const mod = getArchModule(name); if (!mod) return '';
  const rc = mod.route_count || 0, max = counts[0] || 1, rank = counts.indexOf(rc);
  if (rank < 3 && rc > max * 0.4) return 'une des plus grosses parties';
  if (rc < max * 0.15) return 'une petite partie';
  return 'une partie de taille moyenne';
}

function jss(s) { return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
function getArchModule(name) { return (archData && archData.modules || []).find(m => m.name === name); }
function archFilesOf(mod) {
  const map = {};
  (mod.routes || []).forEach(r => {
    const f = r.file || 'fichier non identifié';
    (map[f] = map[f] || []).push(r);
  });
  return Object.keys(map).map(f => ({ file: f, routes: map[f] })).sort((a, b) => b.routes.length - a.routes.length);
}

  const c = archSecurity(mod);
  if (c.total === 0) return '';
  if (c.public === c.total) return `🟢 <b>Tout est public</b> ici (accessible sans connexion).`;
  if (c.public === 0) {
    let extra = c.admin ? ` dont <b>${c.admin}</b> réservée(s) aux admins` : '';
    return `🔒 <b>Tout est protégé</b> (connexion obligatoire)${extra}.`;
  }
  return `🔓 <b>${c.public}</b> action(s) publique(s) et <b>${c.total - c.public}</b> protégée(s).`;
}

function archFileHtml() {

function archSearchHtml(q) {
  const ql = q.toLowerCase();
  const modHits = [], routeHits = [];
  (archData.modules || []).forEach(m => {
    if (m.name.toLowerCase().includes(ql)) modHits.push(m);
    (m.routes || []).forEach(r => {
      if ((r.path||'').toLowerCase().includes(ql) || (r.function||'').toLowerCase().includes(ql) || (r.file||'').toLowerCase().includes(ql)) {
        routeHits.push({ m, r });
      }
    });
  });
  if (!modHits.length && !routeHits.length) return `<div class="arch-empty">Rien trouvé pour « ${esc(q)} ».</div>`;
  let h = '';
  if (modHits.length) {
    h += `<div class="arch-cat">Modules (${modHits.length})</div>`;
    modHits.forEach(m => {
      h += `<div class="arch-row" onclick="archGoModule('${jss(m.name)}')">
        <span class="arch-dot" style="background:${m.color||'#64748B'}"></span>
        <div class="main"><div class="name">${esc(m.name)}</div><div class="sub">${esc(ARCH_MODULE_FR[m.name]||'')}</div></div>
        <span class="count">${m.route_count||0}</span><span class="chev">›</span></div>`;
    });
  }
  const shown = routeHits.slice(0, 80);
  if (routeHits.length) {
    h += `<div class="arch-cat">Routes (${routeHits.length}${routeHits.length>80?' · 80 affichées':''})</div>`;
    shown.forEach(({ m, r }) => {
      const key = (r.function || '') + '|' + (r.path || '');
      const file = r.file || 'fichier non identifié';
      const lock = (r.protections || []).length ? ' 🔒' : '';
      h += `<div class="arch-row" onclick="archOpenRoute('${jss(m.name)}','${jss(file)}','${jss(key)}')">
        <span class="arch-dot" style="background:${m.color||'#64748B'};border-radius:50%"></span>
        <div class="main"><div class="name"><code>${esc(r.path||'')}</code>${lock}</div><div class="sub">${esc(m.name)} · ${esc(r.function||'')}()</div></div>
        <span class="chev">›</span></div>`;
    });
  }
  return h;
}

function archContextForLLM() {
  if (!archData || !archData.modules) return '(aucune donnée d\'architecture)';
  const s = archData.stats || {};
  let out = `Le site « CPTS Pilot » compte ${s.total_routes || 0} actions réparties en ${archData.modules.length} grandes parties (modules).\n\n`;
  [...archData.modules].sort((a, b) => (b.route_count || 0) - (a.route_count || 0)).forEach(m => {

    const caps = archCapabilities(m).slice(0, 10).map(c => `${c.subject.replace(/-/g, ' ')} (${c.verbs.join('/')})`).join(' ; ');
    out += `### ${m.name}\n`;
    out += `Rôle : ${ARCH_MODULE_FR[m.name] || '—'}\n`;
    if (ARCH_MODULE_WHY[m.name]) out += `Pourquoi c'est là : ${ARCH_MODULE_WHY[m.name]}\n`;

async function archExplainCall() {
  const cfg = getAiConfig();
  if (!cfg.key) throw new Error('Clé Claude non configurée');
  const SYSTEM = `Tu es Magnus, le Chef Produit de CPTS Pilot (plateforme pour les CPTS — Communautés Professionnelles Territoriales de Santé). Tu expliques à Eva — coordinatrice CPTS, fondatrice qui ne sait pas coder — comment SON site est architecturé. Objectif : qu'elle COMPRENNE, à son niveau.
Règles : français très simple, ZÉRO jargon technique (ou alors tu l'expliques avec une image concrète). Réponses courtes, chaleureuses, bien structurées (markdown : **gras**, listes). Tu peux utiliser des analogies (le site = un bâtiment : les parties = des étages, les actions = des portes, les protections = des badges). Tu t'appuies UNIQUEMENT sur la carte ci-dessous. Si l'info n'y est pas, dis-le franchement et propose une « ronde » (relecture complète du code en session).

CARTE DE L'ARCHITECTURE (extraite du vrai code d'Eva) :
${archContextForLLM()}`;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'x-api-key': cfg.key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: cfg.model || 'claude-haiku-4-5',
      max_tokens: 900,
      system: [{ type: 'text', text: SYSTEM, cache_control: { type: 'ephemeral' } }],
      messages: archExplainMsgs.map(m => ({ role: m.role, content: m.content }))
    })
  });
  if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.error?.message || `Erreur API (${resp.status})`); }
  const data = await resp.json();
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim() || '(réponse vide)';
}
function renderArchExplain() {
  const el = document.getElementById('arch-exp-body'); if (!el) return;
  const cfg = getAiConfig();
  if (!cfg.key) {
    el.innerHTML = `<div class="arch-note">💬 <b>Explique-moi</b> te laisse poser tes questions en français (« c'est quoi la trésorerie ? », « que se passe-t-il quand un membre s'inscrit ? »). Magnus répond en s'appuyant sur la carte de ton code.<br><br>Il faut d'abord connecter ta clé Claude (la même que l'espace de Magnus).</div>

function archExplainKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); archExplainSend(); } }
async function archExplainSend() {
  const ta = document.getElementById('arch-explain-input'); if (!ta) return;
  const q = ta.value.trim(); if (!q || archExplainBusy) return;
  archExplainMsgs.push({ role: 'user', content: q });
  archExplainBusy = true; renderArchExplain();
  try { const a = await archExplainCall(); archExplainMsgs.push({ role: 'assistant', content: a }); }
  catch (e) { archExplainMsgs.push({ role: 'assistant', content: '⚠ ' + (e.message || 'Erreur') }); }
  archExplainBusy = false; renderArchExplain();
}
// Depuis un bouton de fiche : bascule en mode chat avec une question pré-remplie
function archAsk(question) {
  archExplorerOpen = true; archMode = 'explain';
  const cfg = getAiConfig();
  if (!cfg.key) { renderArchExplorer(); return; }
  archExplainMsgs.push({ role: 'user', content: question });
  archExplainBusy = true; renderArchExplorer();
  archExplainCall()
    .then(a => archExplainMsgs.push({ role: 'assistant', content: a }))
    .catch(e => archExplainMsgs.push({ role: 'assistant', content: '⚠ ' + (e.message || 'Erreur') }))
    .finally(() => { archExplainBusy = false; renderArchExplain(); });
}

  const arr = [...groups.values()].sort((a, b) => b.items.length - a.items.length);
  let h = `<div class="mm-board" id="mm-board"><svg class="mm-links-svg" id="mm-links"></svg>`;
  arr.forEach(g => {

      <div class="mm-mosaic">${g.items.map(i => mmCardHtml(i, leg)).join('')}</div></div>`;
  });
  return h + `</div>`;
}
// ---- Mosaïque : fil conducteur (liens SVG) ----
function mmCardEl(id) { const b = document.getElementById('mm-board'); if (!b) return null; return b.querySelector(`.mm-card[data-id="${(window.CSS&&CSS.escape)?CSS.escape(id):id}"]`); }
function mmDrawLinks(focusId) {
  const svg = document.getElementById('mm-links'), board = document.getElementById('mm-board'); if (!svg || !board) return;
  const W = board.scrollWidth, H = board.scrollHeight;
  svg.setAttribute('width', W); svg.setAttribute('height', H); svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const br = board.getBoundingClientRect();
  const center = id => { const el = mmCardEl(id); if (!el) return null; const r = el.getBoundingClientRect(); return { x: r.left-br.left + r.width/2, y: r.top-br.top + r.height/2 }; };
  let edges = ideaEdges();
  if (focusId) edges = edges.filter(e => e.source === focusId || e.target === focusId);
  let p = '';
  edges.forEach(e => { const a = center(e.source), b = center(e.target); if (!a || !b) return;
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2 - Math.min(70, Math.abs(b.x-a.x)*0.2 + 22);
    p += `<path d="M${a.x.toFixed(1)},${a.y.toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${b.x.toFixed(1)},${b.y.toFixed(1)}" fill="none" stroke="${focusId?'#2563EB':'rgba(37,99,235,0.20)'}" stroke-width="${focusId?2.2:1.5}" stroke-linecap="round"/>`;
  });
  svg.innerHTML = p;
}
function mmClearLinks() { const svg = document.getElementById('mm-links'); if (svg) svg.innerHTML = ''; }
function mmBoardInit() { if (mmShowLinks) mmDrawLinks(null); else mmClearLinks(); }
function toggleMmLinks() { mmShowLinks = !mmShowLinks; render(); }
function mmFocus(id) {
  const board = document.getElementById('mm-board'); if (!board) return;
  const linked = new Set();
  ideaEdges().forEach(e => { if (e.source === id) linked.add(e.target); if (e.target === id) linked.add(e.source); });
  board.querySelectorAll('.mm-card').forEach(el => { const cid = el.dataset.id;
    el.classList.toggle('linksrc', cid === id);
    el.classList.toggle('linked', linked.has(cid));
    el.classList.toggle('dim', linked.size > 0 && cid !== id && !linked.has(cid));
  });
  const svg = document.getElementById('mm-links'); if (svg) svg.style.zIndex = '25';
  mmDrawLinks(id);
}
function mmBlur() {
  const board = document.getElementById('mm-board'); if (!board) return;
  board.querySelectorAll('.mm-card').forEach(el => el.classList.remove('linksrc','linked','dim'));
  const svg = document.getElementById('mm-links'); if (svg) svg.style.zIndex = '';
  if (mmShowLinks) mmDrawLinks(null); else mmClearLinks();
}
function mmJump(id) { const el = mmCardEl(id); if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); mmFocus(id); } }
function mmCardClick(id) {

const VIVIER_FAMILLE_ORDER = ['produit-strategie', 'technique'];
const VIVIER_NATURE_ORDER  = ['decision', 'cap-mur', 'etincelle'];
// Libellés de repli si la légende du JSON ne les fournit pas (la légende prime toujours).
const VIVIER_FAMILLE_FB = { 'produit-strategie': 'Produit & stratégie', 'technique': 'Technique' };
const VIVIER_FAMILLE_SUB = { 'produit-strategie': 'le QUOI', 'technique': 'le COMMENT' };

const VIVIER_NATURE_ICON = { decision: '◆', 'cap-mur': '▲', etincelle: '✦' };
const VIVIER_NATURE_HINT = {
  decision: 'carrefour à trancher — conditionne la stratégie',
  'cap-mur': 'quasi adopté, mûr pour passer en stratégie',
  etincelle: 'idée non tranchée'
};
const VIVIER_STATUT_FB = { 'en-suspens': 'En suspens', reportee: 'Reportée', 'en-reflexion': 'En réflexion', 'deja-en-strategie': 'Déjà en stratégie' };
const VIVIER_NAT_RANK = { decision: 0, 'cap-mur': 1, etincelle: 2 };  // ordre « à trancher d'abord »

// Récupère un libellé depuis la légende du JSON ; accepte string ou objet {label/titre}.
function legLabel(map, key, fallback) {
  if (map && map[key] != null) {
    const v = map[key];
    if (typeof v === 'string') return v;
    if (typeof v === 'object') return v.label || v.titre || v.nom || fallback || key;
  }
  return fallback || key;
}
// Description longue d'une clé de légende si disponible (sinon repli).
function legHint(map, key, fallback) {
  const v = map && map[key];
  if (v && typeof v === 'object') return v.description || v.hint || v.note || fallback || '';
  return fallback || '';
}
// Tri d'une liste de clés selon un ordre voulu, inconnues en fin.
function vivierOrder(keys, order) {
  return [...keys].sort((a, b) => ((order.indexOf(a) + 1 || 99) - (order.indexOf(b) + 1 || 99)));
}

function setVivierFilter(key, val) { ideesFilters[key] = val; render(); }

function vivierMatch(i) {

  if (ideesFilters.theme && i.theme !== ideesFilters.theme) return false;

}
// Liste filtrée + triée selon ideesSort
function vivierVisible() {

// ===== Écriture GitHub sécurisée (idees.json / strategy.json / roadmap.json sur Plateforme-CPTS) =====
function normalizeIdees(p) {
  return { idees: Array.isArray(p.idees) ? p.idees : [], legende: p.legende || {}, description: p.description || '', updated_at: p.updated_at || '' };
}
function vivierToast(msg) {
  let t = document.getElementById('v-toast');
  if (!t) { t = document.createElement('div'); t.id = 'v-toast'; t.className = 'v-toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}
// Lit le fichier, applique mutateFn à l'objet parsé, réécrit avec le SHA (verrou optimiste : si
// le fichier a changé entre-temps, GitHub refuse → on recharge et on réessaie). mutateFn renvoie
// false pour annuler. Renvoie { ok, data?, error? }.
async function writeRepoJson(filename, mutateFn, message, opts) {
  const cfg = getGhConfig();
  if (!cfg.token) return { ok: false, error: 'token GitHub non configuré (Réglages)' };
  const owner = cfg.owner || 'Evalita03';
  const branch = 'main';
  const apiUrl = `https://api.github.com/repos/${owner}/Plateforme-CPTS/contents/${filename}`;
  const headers = { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
  for (let attempt = 0; attempt < 4; attempt++) {
    let sha = null, parsed = {};
    const getResp = await fetch(`${apiUrl}?ref=${branch}&t=${Date.now()}`, { headers });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
      try { parsed = JSON.parse(b64ToUtf8(data.content)); }
      catch (e) { return { ok: false, error: `${filename} illisible : ${e.message}` }; }
    } else if (getResp.status === 404) {
      if (!opts || !opts.createIfMissing) return { ok: false, error: `${filename} introuvable (404)` };
      parsed = opts.initial || {};
    } else {
      const e = await getResp.json().catch(() => ({}));
      return { ok: false, error: `Lecture : ${e.message || getResp.status}` };
    }
    if (mutateFn(parsed) === false) return { ok: false, error: 'opération annulée' };
    parsed.updated_at = new Date().toISOString().slice(0, 10);
    const body = { message, content: utf8ToBase64(JSON.stringify(parsed, null, 2)), branch };
    if (sha) body.sha = sha;
    const putResp = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (putResp.ok) return { ok: true, data: parsed };
    if (putResp.status === 409 || putResp.status === 422) continue; // conflit de SHA → on recharge et on retente
    const e = await putResp.json().catch(() => ({}));
    return { ok: false, error: `Écriture : ${e.message || putResp.status}` };
  }
  return { ok: false, error: 'le fichier a changé plusieurs fois pendant l\'écriture — réessaie' };
}
// Mutation pratique d'idees.json + rafraîchissement de l'affichage
async function mutateIdees(mutateFn, message) {
  if (ideesBusy) return;
  ideesBusy = true; vivierToast('Enregistrement…'); render();
  const res = await writeRepoJson('idees.json', mutateFn, message);
  ideesBusy = false;
  if (res.ok) { ideesData = normalizeIdees(res.data); vivierToast('✓ ' + message); }
  else alert('Action impossible : ' + res.error);
  render();
}

// ----- Actions sur une idée -----
function ideeById(id) { return (ideesData && ideesData.idees || []).find(x => x.id === id); }

function addNoteToIdee(id) {
  if (ideesBusy) return;
  const txt = prompt('Note à ajouter à cette idée :');
  if (txt == null) return;
  const t = txt.trim(); if (!t) return;
  mutateIdees(p => { const x = (p.idees||[]).find(y => y.id === id); if (!x) return false; x.note = (x.note ? x.note + '\n' : '') + '• ' + t; }, 'Note ajoutée à ' + id);
}
function deleteIdee(id, fromModal) {
  if (ideesBusy) return;
  const it = ideeById(id); if (!it) return;
  if (!confirm('Supprimer définitivement « ' + it.titre + ' » ?\n\n⚠ Irréversible (contrairement à l\'archivage). L\'idée disparaît du vivier pour de bon.')) return;
  if (fromModal) closeModal();
  mutateIdees(p => { const before = (p.idees || []).length; p.idees = (p.idees || []).filter(y => y.id !== id); if ((p.idees || []).length === before) return false; }, 'Suppression idée ' + id);
}
function archiveIdee(id) {
  if (ideesBusy) return;
  const it = ideeById(id); if (!it) return;
  const archiving = !it.archived;
  if (archiving && !confirm('Archiver « ' + it.titre + ' » ? (réversible)')) return;
  mutateIdees(p => { const x = (p.idees||[]).find(y => y.id === id); if (!x) return false; x.archived = archiving; }, (archiving ? 'Archiver ' : 'Désarchiver ') + id);
}
// ----- Basculer une idée dans le To do (À faire / En cours) -----
function sendIdeeToTodo(id) {
  if (ideesBusy) return;
  const it = ideeById(id); if (!it) return;
  const m = document.getElementById('modal'); m.classList.remove('qc-mode');

async function confirmIdeeToTodo(id) {
  const status = document.getElementById('todo-status').value === 'doing' ? 'doing' : 'todo';
  closeModal();
  const it = ideeById(id); if (!it || ideesBusy) return;
  // 1) Crée la tâche localement → visible tout de suite dans le To do
  const title = it.titre || '(sans titre)';
  if (!state.tasks.some(t => (t.title || '').trim().toLowerCase() === title.trim().toLowerCase() && t.status !== 'done')) {
    state.tasks.push({ id: uid(), title: title, status: status, body: it.note || it.citation || '' });
  }
  save();
  // 2) Marque l'idée comme passée en tâche + archive (cohérent avec → Stratégie / → Roadmap)
  ideesBusy = true; vivierToast('Enregistrement…'); render();
  const res = await writeRepoJson('idees.json',
    p => { const x = (p.idees || []).find(y => y.id === id); if (x) { x.en_todo = true; x.archived = true; } },
    'Idée ' + id + ' passée en tâche');
  ideesBusy = false;
  if (res.ok) { ideesData = normalizeIdees(res.data); vivierToast('✓ Envoyée dans le To do'); }
  else alert('Tâche créée, mais le marquage du vivier a échoué : ' + res.error);
  render();
}
// Une idée est « aboutie » si elle a été promue en stratégie, envoyée en roadmap ou passée en tâche
function ideeIsCompleted(i) { return i.statut === 'deja-en-strategie' || i.promotion_strategy || i.en_roadmap || i.en_todo; }
// Balayage unique : archive toutes les idées abouties encore actives (réversible, elles restent consultables)
async function archiveCompletedIdeas() {
  if (ideesBusy) return;
  const d = ideesData; if (!d) return;
  const ids = (d.idees || []).filter(i => !i.archived && ideeIsCompleted(i)).map(i => i.id);
  if (!ids.length) { vivierToast('Aucune idée à archiver'); return; }
  if (!confirm('Archiver ' + ids.length + ' idée' + (ids.length > 1 ? 's' : '') + ' déjà promue(s) en stratégie ou envoyée(s) en roadmap ?\n\n(réversible — elles restent consultables via « Voir archivées »)')) return;
  ideesBusy = true; vivierToast('Archivage…'); render();
  const res = await writeRepoJson('idees.json',
    p => { (p.idees || []).forEach(x => { if (ids.includes(x.id)) x.archived = true; }); },
    'Archivage des idées promues / en roadmap (' + ids.length + ')');
  ideesBusy = false;
  if (res.ok) { ideesData = normalizeIdees(res.data); vivierToast('✓ ' + ids.length + ' idée' + (ids.length > 1 ? 's' : '') + ' archivée' + (ids.length > 1 ? 's' : '')); }
  else alert('Échec de l\'archivage : ' + res.error);
  render();
}
// ----- Modale « envoyer en roadmap » (choix du mois) -----
function roadmapMonthOptions(selected) {
  const now = new Date();
  let opts = '';
  for (let k = 0; k < 12; k++) {
    const d = new Date(now.getFullYear(), now.getMonth() + k, 1);
    const m = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    opts += `<option value="${m}" ${selected === m ? 'selected' : ''}>${monthLabel(m)}${k === 0 ? ' (ce mois-ci)' : ''}</option>`;
  }
  opts += `<option value="" ${!selected ? 'selected' : ''}>À planifier (sans date)</option>`;
  return opts;
}
function sendToRoadmap(id) {
  if (ideesBusy) return;
  const it = ideeById(id); if (!it) return;

}
async function confirmSendToRoadmap(id) {
  const month = document.getElementById('roadmap-month').value || null;
  closeModal();
  const it = ideeById(id); if (!it || ideesBusy) return;
  ideesBusy = true; vivierToast('Enregistrement…'); render();
  const r1 = await writeRepoJson('roadmap.json',
    p => { p.items = Array.isArray(p.items) ? p.items : []; p.items.push({ title: it.titre, status: 'planned', month: month, body: it.note || it.citation || '' }); },
    `Jalon roadmap depuis idée ${id}`, { createIfMissing: true, initial: { items: [] } });
  if (!r1.ok) { ideesBusy = false; render(); alert('Échec côté roadmap : ' + r1.error); return; }
  const r2 = await writeRepoJson('idees.json',
    p => { const x = (p.idees||[]).find(y => y.id === id); if (x) { x.en_roadmap = true; x.archived = true; } },
    `Idée ${id} envoyée en roadmap`);
  ideesBusy = false;
  if (r2.ok) {
    ideesData = normalizeIdees(r2.data);
    // Recopie locale immédiate → le jalon apparaît tout de suite dans l'onglet Roadmap
    state.roadmap = state.roadmap || [];
    if (!roadmapHas(it.titre)) state.roadmap.push({ id: uid(), title: it.titre, month: month, status: 'planned', body: 'Depuis le vivier (idée ' + id + ').\n\n' + (it.note || it.citation || '') });
    save();
    vivierToast('✓ Envoyée en roadmap');
  }
  else alert('Jalon créé dans la roadmap, mais le marquage du vivier a échoué : ' + r2.error);
  render();
}

// Groupes existants d'un volet de stratégie (pour ranger une idée promue au bon endroit)
function stratGroups(section) {
  return [...new Set((state.strategiePillars[section] || []).map(e => (e.group || '').trim()).filter(Boolean))];
}
function promoToggleRow(cb) {
  const row = cb.closest('.promo-axe-row');
  const sel = row.querySelector('select.promo-group');
  const ni = row.querySelector('.promo-group-new');
  if (sel) sel.disabled = !cb.checked;
  if (ni) ni.disabled = !cb.checked;
  if (cb.checked && sel) promoGroupSelChange(sel);
}
// Affiche le champ « nouvelle catégorie » quand l'option dédiée est choisie dans le menu
function promoGroupSelChange(sel) {
  const ni = sel.closest('.promo-axe-row').querySelector('.promo-group-new');
  if (!ni) return;
  const isNew = sel.value === '__new__';
  ni.style.display = isNew ? '' : 'none';
  if (isNew && !sel.disabled) ni.focus();
}
function openPromoteModal(id) {
  const it = ideeById(id); if (!it) return;
  const axes = [['vision','Vision'],['marche','Prise de marché'],['pricing','Tarification'],['dev','Dev']];
  const cur = Array.isArray(it.axe_strategy) ? it.axe_strategy : (it.axe_strategy ? [it.axe_strategy] : []);

    const groups = stratGroups(v);
    const checked = cur.includes(v);
    const noGroup = groups.length === 0;
    return `<div class="promo-axe-row">
        <label class="promo-axe-check"><input type="checkbox" class="promo-axe" value="${v}" ${checked?'checked':''} onchange="promoToggleRow(this)"> ${l}</label>
        <select class="promo-group" data-axe="${v}" ${checked?'':'disabled'} onchange="promoGroupSelChange(this)">
          ${groups.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('')}

        </select>
        <input class="promo-group-new" data-axe="${v}" placeholder="Nom de la nouvelle catégorie" style="display:${noGroup?'':'none'}" ${checked?'':'disabled'}>
      </div>`;
  }).join('');
  // Description : si l'idée a été créée par l'utilisatrice (une note, sans verbatim),

  const hasOwnDesc = !((it.citation || '').trim()) && (it.note || '').trim().length > 0;
  const prefill = hasOwnDesc ? it.note : (it.citation || it.note || '');

    <div class="field"><label>Titre de l'encart</label><input id="promo-name" value="${esc(it.titre || '')}"></div>
    <div class="field">
      <label>Texte de l'encart <button type="button" class="btn btn-ghost btn-sm" id="promo-suggest-btn" onclick="promoSuggest('${esc(id)}')" style="float:right;margin-top:-2px">✨ Reformuler</button></label>
      <textarea id="promo-text" style="min-height:120px" placeholder="${hasOwnDesc?'':'✨ Proposition en cours…'}">${esc(prefill)}</textarea>
    </div>
    <div class="field"><label>Volet(s) &amp; groupe</label><div class="promo-axes">${rows}</div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="confirmPromote('${esc(id)}')">Confirmer</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  // Auto-proposition d'une reformulation pour les idées nourries (pas pour les tiennes déjà décrites)
  if (!hasOwnDesc && getAiConfig().key) promoSuggest(id);
}

// Génère une description d'encart présentable à partir de la matière de l'idée (IA)
async function proposeEncartText(idea) {
  const cfg = getAiConfig();
  if (!cfg.key) throw new Error('Assistant IA non configuré (Réglages)');
  const SYSTEM = `Tu es l'éditeur stratégique du cockpit de CPTS Pilot (logiciel pour les CPTS — Communautés Professionnelles Territoriales de Santé). On te donne une idée brute (titre, verbatim d'origine, notes de contexte, thème). Rédige la description d'un ENCART de stratégie : un paragraphe net, posé, présentable, 2 à 4 phrases, en français. Pose le parti pris clairement, sans jargon, sans listes, sans titre, et SANS reprendre des tournures de note perso (« garde ça sous le coude », « à reprendre »…). N'invente aucun fait absent de l'idée. Réponds uniquement par le paragraphe, rien d'autre.`;
  const msg = `Titre : ${idea.titre || ''}\nThème : ${idea.theme || ''}\nNature : ${idea.nature || ''}\nVerbatim d'origine : ${idea.citation || '(aucun)'}\nNotes de contexte : ${idea.note || '(aucune)'}`;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'x-api-key': cfg.key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: cfg.model || 'claude-haiku-4-5',
      max_tokens: 400,
      system: [{ type: 'text', text: SYSTEM, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: msg }]
    })
  });
  if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error?.message || `Erreur API (${resp.status})`); }
  const data = await resp.json();
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
}
async function promoSuggest(id) {
  const it = ideeById(id); if (!it) return;
  const ta = document.getElementById('promo-text');
  const btn = document.getElementById('promo-suggest-btn');
  if (!getAiConfig().key) { alert('Configure l\'assistant IA dans les Réglages pour générer une proposition.'); return; }
  const prev = btn ? btn.textContent : '';
  if (btn) { btn.textContent = '✨ …'; btn.disabled = true; }
  try {
    const txt = await proposeEncartText(it);
    if (txt && ta) ta.value = txt;
  } catch (e) { if (ta && !ta.value) ta.placeholder = ''; alert('Proposition IA impossible : ' + e.message); }
  finally { if (btn) { btn.textContent = prev || '✨ Reformuler'; btn.disabled = false; } if (ta) ta.placeholder = ''; }
}
async function confirmPromote(id) {
  const axes = Array.from(document.querySelectorAll('.promo-axe:checked')).map(c => c.value);
  if (!axes.length) { alert('Choisis au moins un volet.'); return; }
  const it = ideeById(id); if (!it || ideesBusy) return;
  const name = (document.getElementById('promo-name').value || '').trim() || it.titre || '(sans titre)';
  const text = (document.getElementById('promo-text').value || '').trim();
  const groups = {};
  axes.forEach(ax => {
    const sel = document.querySelector(`select.promo-group[data-axe="${ax}"]`);
    let g = sel ? sel.value : '';
    if (g === '__new__') { const ni = document.querySelector(`.promo-group-new[data-axe="${ax}"]`); g = ni ? ni.value : ''; }
    groups[ax] = (g || '').trim();
  });
  closeModal();
  ideesBusy = true; vivierToast('Enregistrement…'); render();
  // 1) Ajoute un encart (mis en forme + rangé dans un groupe) dans chaque volet coché
  const r1 = await writeRepoJson('strategy.json',
    p => { p.encarts = p.encarts || {};
           axes.forEach(axe => { p.encarts[axe] = Array.isArray(p.encarts[axe]) ? p.encarts[axe] : [];
             p.encarts[axe].push({ name, text, size: 'normal', group: groups[axe] || '' }); }); },
    `Encart stratégie (${axes.join(', ')}) depuis idée ${id}`, { createIfMissing: true, initial: { encarts: {} } });
  if (!r1.ok) { ideesBusy = false; render(); alert('Échec côté stratégie : ' + r1.error); return; }
  // 2) Marque l'idée comme promue ET archivée dans idees.json (une idée aboutie quitte le vivier actif, reste consultable)
  const r2 = await writeRepoJson('idees.json',
    p => { const x = (p.idees||[]).find(y => y.id === id); if (x) { x.statut = 'deja-en-strategie'; x.promotion_strategy = true; x.axe_strategy = axes.length === 1 ? axes[0] : axes; x.axe_strategy_group = groups[axes[0]] || ''; x.archived = true; delete x.flash; } },
    `Idée ${id} promue en stratégie (${axes.join(', ')})`);
  ideesBusy = false;
  if (r2.ok) {
    ideesData = normalizeIdees(r2.data);
    // Recopie locale immédiate → l'encart apparaît tout de suite, au bon endroit, sans resynchro
    state.strategiePillars = state.strategiePillars || {};
    axes.forEach(axe => {
      state.strategiePillars[axe] = state.strategiePillars[axe] || [];
      state.strategiePillars[axe].push({ id: uid(), name, text, size: 'normal', group: groups[axe] || '', contributions: [] });
    });
    save();
    vivierToast('✓ Promue en stratégie');
  }
  else alert('Encarts créés dans la stratégie, mais le marquage du vivier a échoué : ' + r2.error);
  render();
}

// ----- Modale créer / modifier une idée -----
function vivierIdGen(famille, ideas) {
  const prefix = famille === 'technique' ? 'TEC' : 'PRD';
  let max = 0;
  (ideas || []).forEach(i => { const m = (i.id || '').match(new RegExp('^' + prefix + '-(\\d+)$')); if (m) max = Math.max(max, parseInt(m[1], 10)); });
  return prefix + '-' + String(max + 1).padStart(2, '0');
}
