function saveIdee(id) {
  const v = x => (document.getElementById(x).value || '').trim();
  const titre = v('idee-titre');
  if (!titre) return alert('Le titre est requis');
  const data = { titre, theme: v('idee-theme'), famille: v('idee-famille'), nature: v('idee-nature'), statut: v('idee-statut'), citation: v('idee-citation'), note: v('idee-note') };
  closeModal();
  if (id) mutateIdees(p => { const x = (p.idees||[]).find(y => y.id === id); if (!x) return false; Object.assign(x, data); delete x.flash; }, 'Modifier ' + id);
  else mutateIdees(p => { p.idees = p.idees || []; const nid = vivierIdGen(data.famille, p.idees); p.idees.push({ id: nid, ...data }); }, 'Nouvelle idée');
}

// ===== Carte mentale : graphe du vivier (idees.json) =====
// Couleurs par état d'une idée (priorité : archivée > aboutie > déposée-à-traiter > nature)
const MINDMAP_COLORS = {
  flash:     { c: '#6366F1', label: 'Déposée, à traiter' },
  decision:  { c: '#DC2626', label: 'Décision à trancher' },
  'cap-mur': { c: '#0D9488', label: 'Cap mûr' },
  etincelle: { c: '#D97706', label: 'Étincelle' },
  aboutie:   { c: '#16A34A', label: 'Aboutie (promue / roadmap)' },
  archivee:  { c: '#94A3B8', label: 'Archivée' }
};
function ideaColorKey(i) {
  if (i.archived) return 'archivee';
  if (i.statut === 'deja-en-strategie' || i.en_roadmap) return 'aboutie';
  if (i.flash) return 'flash';
  if (MINDMAP_COLORS[i.nature]) return i.nature;
  return 'etincelle';
}
function mindmapLegend() {
  const order = ['flash','decision','cap-mur','etincelle','aboutie','archivee'];
  return `<div class="v-legend mm-legend">` +
    order.map(k => `<span><span class="mm-dot" style="background:${MINDMAP_COLORS[k].c}"></span> ${MINDMAP_COLORS[k].label}</span>`).join('') +
    `</div>`;
}

// ===== Carte mentale : clusters organiques (simulation physique) =====
let ideaGroupBy = 'theme';      // dimension de regroupement : theme | famille | nature | statut
let mmShowArchived = false;     // afficher les idées archivées sur la carte ?
let mmNeedsFit = true;          // recadrer à la prochaine peinture
let mmSim = null;               // simulation { nodes, links, byId, sig }
let mmAlpha = 0;                // énergie de la simulation (refroidit vers 0)
let mmRAF = null;               // id d'animation
let mmHover = null;             // nœud survolé (surbrillance de cluster)
let mmShowLinks = false;        // afficher tous les fils entre idées en permanence ?
const MM_GROUPS = [['theme','Thème'], ['famille','Famille'], ['nature','Nature'], ['statut','Statut']];

function setIdeaGroupBy(v) { ideaGroupBy = v; mmSim = null; mmNeedsFit = true; render(); }
function toggleMmArchived() { mmShowArchived = !mmShowArchived; mmSim = null; mmNeedsFit = true; render(); }
function mmReorganize() { mmSim = null; mmNeedsFit = true; render(); }

function mmVisibleIdeas() {
  const all = (ideesData && Array.isArray(ideesData.idees)) ? ideesData.idees : [];
  return mmShowArchived ? all : all.filter(i => !i.archived);
}
function mindmapIdeas() { return mmVisibleIdeas(); }   // compat (liens entre idées)
function ideaGroupValue(i, by) {
  const leg = (ideesData && ideesData.legende) || {};
  if (by === 'famille') { const f = (i.famille||'').trim(); return { key: f || '∅', label: f ? legLabel(leg.famille, f, VIVIER_FAMILLE_FB[f]||f) : 'Sans famille' }; }
  if (by === 'nature')  { const n = (i.nature||'').trim();  return { key: n || '∅', label: n ? legLabel(leg.nature, n, VIVIER_NATURE_FB[n]||n) : 'Sans nature' }; }
  if (by === 'statut')  { const s = (i.statut||'').trim();  return { key: s || '∅', label: s ? legLabel(leg.statut, s, VIVIER_STATUT_FB[s]||s) : 'Sans statut' }; }
  const t = (i.theme||'').trim(); return { key: t || '∅', label: t || 'Sans thème' };   // theme par défaut
}
// Amorce : positions de départ en pôles (la physique relâche ensuite)
function computeMindmapLayout(ideas, by) {
  const groups = new Map();
  ideas.forEach(i => {
    const { key, label } = ideaGroupValue(i, by);
    if (!groups.has(key)) groups.set(key, { key, label, items: [] });
    groups.get(key).items.push(i);
  });
  const hubs = [...groups.values()].sort((a, b) => b.items.length - a.items.length);
  const G = hubs.length;
  const hubR = Math.max(260, 140 + G * 30);
  const pos = {};
  hubs.forEach((h, gi) => {
    const ang = (gi / Math.max(1, G)) * Math.PI * 2 - Math.PI / 2;
    h.x = Math.cos(ang) * hubR; h.y = Math.sin(ang) * hubR;
    h.items.forEach((it, k) => {
      const a2 = ang + (k - (h.items.length - 1) / 2) * 0.4;
      const rr = 90 + (k % 3) * 26;
      pos[it.id] = { x: h.x + Math.cos(a2) * rr, y: h.y + Math.sin(a2) * rr };
    });
  });
  return { hubs, pos, root: { x: 0, y: 0 } };
}
function mmSignature() {
  const ids = mmVisibleIdeas().map(i => i.id + ':' + ideaGroupValue(i, ideaGroupBy).key).join(',');
  return ideaGroupBy + '|' + mmShowArchived + '|' + ids;
}
// Construit les nœuds (cœur + pôles + idées) et les liens (cœur→pôle→idée + références)
function mmBuildSim() {
  const ideas = mmVisibleIdeas();
  const L = computeMindmapLayout(ideas, ideaGroupBy);
  const nodes = [], byId = new Map();
  const root = { id: '__root__', type: 'root', x: 0, y: 0, vx: 0, vy: 0, r: 30 };
  nodes.push(root); byId.set(root.id, root);
  L.hubs.forEach(h => {
    const hn = { id: 'hub:' + h.key, type: 'hub', label: h.label, count: h.items.length, hubKey: h.key, x: h.x, y: h.y, vx: 0, vy: 0, r: 40 };
    nodes.push(hn); byId.set(hn.id, hn);
  });
  ideas.forEach(i => {
    const p = L.pos[i.id] || { x: (Math.random() - 0.5) * 300, y: (Math.random() - 0.5) * 300 };
    const { key } = ideaGroupValue(i, ideaGroupBy);
    const n = { id: i.id, type: 'idea', idea: i, hubKey: key, x: p.x, y: p.y, vx: 0, vy: 0, r: 22 };
    nodes.push(n); byId.set(n.id, n);
  });
  const links = [];
  L.hubs.forEach(h => {
    links.push({ a: '__root__', b: 'hub:' + h.key, len: 240, k: 0.03 });
    h.items.forEach(it => links.push({ a: 'hub:' + h.key, b: it.id, len: 92, k: 0.05 }));
  });
  ideaEdges().forEach(e => { if (byId.has(e.source) && byId.has(e.target)) links.push({ a: e.source, b: e.target, len: 150, k: 0.015, dashed: true }); });
  mmSim = { nodes, links, byId, sig: mmSignature() };
}
function mmEnsureSim() { if (!mmSim || mmSim.sig !== mmSignature()) { mmBuildSim(); mmAlpha = 1; } }

// Liens entre idées : champ links[] + ids cités dans la note/citation (PRD-01, TEC-2, IDEE-3…)
function ideaRefIds(i) {
  const ids = new Set();
  (Array.isArray(i.links) ? i.links : []).forEach(x => ids.add(x));
  const txt = (i.note || '') + ' ' + (i.citation || '');
  const re = /\b([A-Z]{2,5}-\d{1,3})\b/g; let m;
  while ((m = re.exec(txt))) { if (m[1] !== i.id) ids.add(m[1]); }
  return [...ids];
}
function ideaEdges() {
  const ideas = mindmapIdeas();
  const exist = new Set(ideas.map(i => i.id));
  const seen = new Set(), edges = [];
  ideas.forEach(i => {
    ideaRefIds(i).forEach(tid => {
      if (!exist.has(tid)) return;
      const key = [i.id, tid].sort().join('|');
      if (seen.has(key)) return; seen.add(key);
      edges.push({ source: i.id, target: tid });
    });
  });
  return edges;
}
// Relier deux idées = ajouter une référence dans links[] (écrit dans idees.json)
function linkIdeas(aId, bId) {
  if (aId === bId) return;
  mutateIdees(p => {
    const a = (p.idees || []).find(x => x.id === aId); if (!a) return false;
    a.links = Array.isArray(a.links) ? a.links : [];
    if (a.links.includes(bId)) return false;
    a.links.push(bId);
  }, `Relier ${aId} ↔ ${bId}`);
}

// Capture flash : dépose une idée minimale dans le vivier, marquée « à traiter »
function flashIdGen(ideas) {
  let max = 0;
  (ideas || []).forEach(i => { const m = (i.id || '').match(/^IDEE-(\d+)$/); if (m) max = Math.max(max, parseInt(m[1], 10)); });
  return 'IDEE-' + String(max + 1).padStart(2, '0');
}
function flashIdee() {
  if (ideesBusy) return;
  if (!ideesData) { alert('Vivier non chargé.'); return; }
  const t = prompt('💡 Idée flash — note-la en une phrase :');
  if (t == null) return;
  const titre = t.trim(); if (!titre) return;
  mutateIdees(p => {
    p.idees = p.idees || [];
    const id = flashIdGen(p.idees);
    p.idees.push({ id, titre, statut: 'en-suspens', famille: '', nature: '', citation: '', note: '', flash: true });
  }, 'Idée flash déposée');
}

function setupIdeaGraph(canvas) {
  if (mmRAF) { cancelAnimationFrame(mmRAF); mmRAF = null; }
  mmEnsureSim();
  const ctx = canvas.getContext('2d');
  const gs = ideaGraphState;
  function w2s(x,y) { return { x: x*gs.scale+gs.offsetX, y: y*gs.scale+gs.offsetY }; }
  function s2w(x,y) { return { x: (x-gs.offsetX)/gs.scale, y: (y-gs.offsetY)/gs.scale }; }
  function reheat(a) { mmAlpha = Math.max(mmAlpha, a == null ? 1 : a); kick(); }
  function fit() {
    const ns = mmSim.nodes;
    if (ns.length < 2) { gs.scale = 1; gs.offsetX = canvas.width/2; gs.offsetY = canvas.height/2; return; }
    let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity;
    ns.forEach(n => { minx=Math.min(minx,n.x); miny=Math.min(miny,n.y); maxx=Math.max(maxx,n.x); maxy=Math.max(maxy,n.y); });
    const pad = 110, w = (maxx-minx)+pad*2, h = (maxy-miny)+pad*2;
    gs.scale = Math.max(0.22, Math.min(1.3, Math.min(canvas.width/w, canvas.height/h)));
    gs.offsetX = canvas.width/2 - ((minx+maxx)/2)*gs.scale;
    gs.offsetY = canvas.height/2 - ((miny+maxy)/2)*gs.scale;
  }
  // ---- Simulation physique : répulsion + ressorts + gravité + anti-chevauchement ----
  function tick() {
    const ns = mmSim.nodes, byId = mmSim.byId;
    const f = 0.35 + 0.65 * mmAlpha;
    for (let i = 0; i < ns.length; i++) {
      const a = ns[i];
      for (let j = i + 1; j < ns.length; j++) {
        const b = ns[j];
        let dx = a.x - b.x, dy = a.y - b.y, d2 = dx*dx + dy*dy; if (d2 < 1) d2 = 1;
        const d = Math.sqrt(d2), rep = 5800 / d2 * f, ux = dx/d, uy = dy/d;
        a.vx += ux*rep; a.vy += uy*rep; b.vx -= ux*rep; b.vy -= uy*rep;
      }
    }
    mmSim.links.forEach(l => {
      const a = byId.get(l.a), b = byId.get(l.b); if (!a || !b) return;
      let dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy) || 1;
      const force = (d - l.len) * l.k * f, ux = dx/d, uy = dy/d;
      a.vx += ux*force; a.vy += uy*force; b.vx -= ux*force; b.vy -= uy*force;
    });
    ns.forEach(n => { const g = (n.type === 'root' ? 0.09 : 0.013) * f; n.vx += -n.x*g; n.vy += -n.y*g; });
    ns.forEach(n => { if (n === gs.dragging) { n.vx = 0; n.vy = 0; return; } n.vx *= 0.82; n.vy *= 0.82; n.x += n.vx; n.y += n.vy; });
    for (let i = 0; i < ns.length; i++) {
      const a = ns[i];
      for (let j = i + 1; j < ns.length; j++) {
        const b = ns[j], min = a.r + b.r + 8;
        let dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy) || 1;
        if (d < min) { const push = (min-d)/2, ux = dx/d, uy = dy/d;
          if (a !== gs.dragging) { a.x -= ux*push; a.y -= uy*push; }
          if (b !== gs.dragging) { b.x += ux*push; b.y += uy*push; } }
      }
    }
    mmAlpha *= 0.975;
  }
  function pill(x,y,text,bg,fg,maxChars,alpha) {
    let t = text; if (maxChars && t.length>maxChars) t = t.slice(0,maxChars-1)+'…';
    ctx.font = `700 ${12*gs.scale}px Manrope, sans-serif`;
    const w = ctx.measureText(t).width + 20*gs.scale, h = 23*gs.scale, rad = 7*gs.scale, rx = x-w/2, ry = y-h/2;
    ctx.globalAlpha = alpha == null ? 1 : alpha;
    ctx.beginPath();
    ctx.moveTo(rx+rad,ry); ctx.arcTo(rx+w,ry,rx+w,ry+h,rad); ctx.arcTo(rx+w,ry+h,rx,ry+h,rad); ctx.arcTo(rx,ry+h,rx,ry,rad); ctx.arcTo(rx,ry,rx+w,ry,rad); ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
    ctx.fillStyle = fg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(t, x, y);
    ctx.globalAlpha = 1;
  }
  function focusKey() { return mmHover ? (mmHover.type === 'root' ? null : mmHover.hubKey) : undefined; }
  function inFocus(n) { const fk = focusKey(); if (fk === undefined || fk === null) return true; return n.type === 'root' || n.hubKey === fk; }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const byId = mmSim.byId;
    mmSim.links.forEach(l => {
      const a = byId.get(l.a), b = byId.get(l.b); if (!a || !b) return;
      const foc = inFocus(a) && inFocus(b), A = w2s(a.x,a.y), B = w2s(b.x,b.y);
      ctx.save();
      if (l.dashed) { ctx.setLineDash([5*gs.scale,5*gs.scale]); ctx.strokeStyle = `rgba(37,99,235,${foc?0.55:0.08})`; ctx.lineWidth = 1.5*gs.scale; }
      else { ctx.strokeStyle = `rgba(148,163,184,${foc?0.4:0.07})`; ctx.lineWidth = 1.4*gs.scale; }
      ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke(); ctx.restore();
    });
    mmSim.nodes.forEach(n => {
      if (n.type !== 'idea') return;
      const foc = inFocus(n), p = w2s(n.x,n.y), r = n.r*gs.scale, col = MINDMAP_COLORS[ideaColorKey(n.idea)].c;
      ctx.globalAlpha = foc ? (n.idea.archived ? 0.5 : 1) : 0.13;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fillStyle = col; ctx.fill();
      if (ideaLinkSource === n.id) { ctx.lineWidth = 3; ctx.strokeStyle = '#0F172A'; ctx.stroke(); }
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `700 ${12*gs.scale}px Manrope, sans-serif`;
      ctx.fillText(VIVIER_NATURE_ICON[n.idea.nature] || (n.idea.flash ? '⚡' : '•'), p.x, p.y);
      if (foc) { ctx.fillStyle = '#0F172A'; ctx.textBaseline = 'alphabetic'; ctx.font = `600 ${11*gs.scale}px Manrope, sans-serif`;
        const lab = (n.idea.titre||'').length>20 ? n.idea.titre.slice(0,19)+'…' : (n.idea.titre||'');
        ctx.fillText(lab, p.x, p.y + r + 13*gs.scale); }
      ctx.globalAlpha = 1;
    });
    mmSim.nodes.forEach(n => { if (n.type !== 'hub') return; const p = w2s(n.x,n.y);
      pill(p.x, p.y, `${n.label} · ${n.count}`, '#1E293B', '#fff', 26, inFocus(n) ? 1 : 0.3); });
    const root = byId.get('__root__'), rp = w2s(root.x, root.y);
    pill(rp.x, rp.y, `Idées · ${mmSim.nodes.filter(n=>n.type==='idea').length}`, '#2563EB', '#fff', 30, 1);
  }
  function loop() {
    if (!document.body.contains(canvas)) { mmRAF = null; return; }
    tick(); draw();
    if (mmAlpha > 0.02 || gs.dragging) mmRAF = requestAnimationFrame(loop); else mmRAF = null;
  }
  function kick() { if (!mmRAF) mmRAF = requestAnimationFrame(loop); }
  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
    if (mmNeedsFit) { fit(); mmNeedsFit = false; }
    draw();
  }
  function nodeAt(sx,sy) {
    const ns = mmSim.nodes;
    for (let i = ns.length-1; i >= 0; i--) { const n = ns[i]; const p = w2s(n.x,n.y);
      if (Math.hypot(sx-p.x, sy-p.y) <= (n.r+2)*gs.scale) return n; }
    return null;
  }
  let downAt = 0;
  canvas.onmousedown = e => {
    downAt = Date.now();
    const rect = canvas.getBoundingClientRect(), mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const node = nodeAt(mx,my);
    if (ideaLinkMode && node && node.type === 'idea') {
      if (!ideaLinkSource) { ideaLinkSource = node.id; draw(); }
      else if (ideaLinkSource !== node.id) { const src = ideaLinkSource; ideaLinkSource = null; linkIdeas(src, node.id); }
      return;
    }
    if (node) { gs.dragging = node; reheat(0.5); } else { gs.panning = true; gs.lastX = mx; gs.lastY = my; }
  };
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect(), mx = e.clientX-rect.left, my = e.clientY-rect.top;
    if (gs.dragging) { const wld = s2w(mx,my); gs.dragging.x = wld.x; gs.dragging.y = wld.y; reheat(0.5); }
    else if (gs.panning) { gs.offsetX += mx-gs.lastX; gs.offsetY += my-gs.lastY; gs.lastX = mx; gs.lastY = my; draw(); }
    else { const n = nodeAt(mx,my); const h = (n && n.type !== 'root') ? n : null;
      if (h !== mmHover) { mmHover = h; canvas.style.cursor = n ? 'pointer' : 'grab'; if (!mmRAF) draw(); } }
  };
  canvas.onmouseup = () => { if (gs.dragging) reheat(0.3); gs.dragging = null; gs.panning = false; };
  canvas.onmouseleave = () => { gs.dragging = null; gs.panning = false; if (mmHover) { mmHover = null; if (!mmRAF) draw(); } };
  canvas.onclick = e => {
    if (Date.now()-downAt > 200 || ideaLinkMode) return;
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node && node.type === 'idea') openIdeeModal(node.id);
  };
  canvas.onwheel = e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect(), mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = s2w(mx,my);
    gs.scale *= e.deltaY>0 ? 0.92 : 1.08; gs.scale = Math.max(0.22, Math.min(2.5, gs.scale));
    const after = s2w(mx,my);
    gs.offsetX += (after.x-before.x)*gs.scale; gs.offsetY += (after.y-before.y)*gs.scale;
    draw();
  };
  redrawIdeas = draw;
  resize();
  if (mmAlpha > 0.02) kick();
}
function openNoteModal(id) {
  const note = id ? state.notes.find(n=>n.id===id) : null;
  const others = state.notes.filter(n=>!id || n.id!==id);
  const m = document.getElementById('modal');
  m.classList.remove('qc-mode');
  m.innerHTML = `
    <h2>${note?'Modifier l\'idée':'Nouvelle idée'}</h2>
    <div class="field"><label>Titre</label><input id="note-title" value="${note?esc(note.title):''}"></div>
    <div class="field"><label>Description</label><textarea id="note-body" style="min-height:140px" placeholder="Décris ton idée…">${note?esc(note.body||''):''}</textarea></div>
    <div class="field"><label>Relier à d'autres idées</label>
      <select id="note-links" multiple style="min-height:80px">
        ${others.map(n=>`<option value="${n.id}" ${note?.links?.includes(n.id)?'selected':''}>${esc(n.title)}</option>`).join('')}
      </select>
      <div style="font-size:11px;color:var(--slate-400);margin-top:4px">Ctrl/Cmd + clic pour sélectionner plusieurs</div>
    </div>
    <div class="modal-actions">
      ${note?`<button class="btn btn-ghost" style="color:var(--red-600);margin-right:auto" onclick="deleteNote('${id}')">Supprimer</button>`:''}
      ${note?`<button class="btn btn-ghost" onclick="startClassify('${id}',this)">✨ Classer</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveNote('${id||''}')">Enregistrer</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveNote(id) {
  const title = document.getElementById('note-title').value.trim();
  if (!title) return alert('Le titre est requis');
  const links = Array.from(document.getElementById('note-links').selectedOptions).map(o=>o.value);
  const data = { title, body: document.getElementById('note-body').value.trim(), links };
  if (id) Object.assign(state.notes.find(n=>n.id===id), data);
  else state.notes.push({ id: uid(), ...data });
  save(); closeModal(); render();
}
function deleteNote(id) {
  if (!confirm('Supprimer cette idée ?')) return;
  state.notes = state.notes.filter(n=>n.id!==id);
  state.notes.forEach(n => { if(n.links) n.links = n.links.filter(l=>l!==id); });
  save(); closeModal(); render();
}

// Drag-and-drop des tâches entre colonnes
function taskDragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}
function taskDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.task-column.drop-target').forEach(c => c.classList.remove('drop-target'));
}
function taskDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function taskDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-target');
  }
}
function taskDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const id = e.dataTransfer.getData('text/plain');
  if (!id) return;
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.status === newStatus) return;
  task.status = newStatus;
  save();
  render();
}
function openTaskModal(id) {
  const task = id ? state.tasks.find(t=>t.id===id) : null;
  const m = document.getElementById('modal');
  m.innerHTML = `
    <h2>${task?'Modifier':'Nouvelle'} tâche</h2>
    <div class="field"><label>Intitulé</label><input id="task-title" value="${task?esc(task.title):''}"></div>

      <option value="todo" ${task?.status==='todo'?'selected':''}>À faire</option>

    <div class="modal-actions">
      ${task?`<button class="btn btn-ghost" style="color:var(--red-600);margin-right:auto" onclick="deleteTask('${id}')">Supprimer</button>`:''}
      ${task?`<button class="btn btn-ghost" onclick="sendTaskToRoadmap('${id}')">→ Roadmap</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveTask('${id||''}')">Enregistrer</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveTask(id) {
  const title = document.getElementById('task-title').value.trim();
  if (!title) return alert('L\'intitulé est requis');
  const data = { title, status: document.getElementById('task-status').value, body: document.getElementById('task-body').value.trim() };
  if (id) Object.assign(state.tasks.find(t=>t.id===id), data);
  else state.tasks.push({ id: uid(), ...data });

function sendTaskToRoadmap(id) {

  const m = document.getElementById('modal'); m.classList.remove('qc-mode');
  m.innerHTML = `

async function confirmTaskToRoadmap(id) {
  const month = document.getElementById('task-roadmap-month').value || null;
  closeModal();
  const task = state.tasks.find(t => t.id === id); if (!task) return;
  // Statut du jalon aligné sur l'avancement de la tâche
  const rstatus = task.status === 'done' ? 'done' : (task.status === 'doing' ? 'doing' : 'planned');
  // 1) Recopie locale immédiate → le jalon apparaît tout de suite dans l'onglet Roadmap
  state.roadmap = state.roadmap || [];
  if (!roadmapHas(task.title)) state.roadmap.push({ id: uid(), title: task.title, month: month, status: rstatus, body: 'Depuis le To do.\n\n' + (task.body || '') });
  // La tâche quitte le To do : elle vit désormais comme jalon (pas de double suivi)
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(); render();
  // 2) Publie dans roadmap.json (même tiroir que les idées) si le token est configuré
  const cfg = getGhConfig();
  if (cfg && cfg.token) {
    vivierToast('Publication…');
    const res = await writeRepoJson('roadmap.json',
      p => { p.items = Array.isArray(p.items) ? p.items : []; p.items.push({ title: task.title, status: rstatus, month: month, body: task.body || '' }); },
      'Jalon roadmap depuis tâche ' + id, { createIfMissing: true, initial: { items: [] } });
    vivierToast(res.ok ? '✓ Envoyée en roadmap' : '⚠ ajoutée en local, publication échouée : ' + res.error);
  } else {
    vivierToast('✓ Envoyée en roadmap (local)');
  }
  render();
}

// Marque Mixer : 4 curseurs verticaux, handle 3 en cobalt (cf. docs/brand/README de Plateforme-CPTS)
function mixerMarkSvg() {
  return `<svg class="mixer-mark" viewBox="0 0 60 60" fill="none">

    <line class="track" x1="26" y1="8" x2="26" y2="52"/>

function getStratTagline(section) {
  const encarts = state.strategiePillars[section] || [];
  const lead = encarts.find(e => e.size === 'large') || encarts[0];
  if (!lead || !lead.text) return stratMeta[section]?.fallback || '';
  const first = lead.text.replace(/«|»/g, '').split(/[.!?]\s/)[0].trim();
  return first.length > 130 ? first.slice(0, 127) + '…' : first;
}
function renderStratHero(section) {
  const meta = stratMeta[section] || {};
  const label = meta.label || '';
  const accent = meta.accent || '';
  // Met l'accent en italique cobalt sur le dernier mot reconnu
  let title = esc(label);
  if (accent) {
    const re = new RegExp('(' + accent.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'i');
    title = esc(label).replace(re, '<span class="accent">$1</span>');
  }
  return `<div class="strat-hero">
    ${mixerMarkSvg()}
    <div class="strat-hero-text">
      <div class="strat-hero-title">${title}</div>
      <div class="strat-hero-tagline">${esc(getStratTagline(section))}</div>

}

function stratGroupOptions(section) {
  const used = (state.strategiePillars[section] || []).map(x => (x.group || '').trim()).filter(Boolean);
  return [...new Set([...used, ...(STRAT_SUGGESTED_GROUPS[section] || [])])];

function allStratGroupsInUse() {

function findPillar(section, pid) { return (state.strategiePillars[section]||[]).find(p=>p.id===pid); }

let expandedGroups = { vision: new Set(), marche: new Set(), pricing: new Set(), dev: new Set() };

function renderStrategie(content, actions, section) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="addEncart('${section}')">+ Encart</button>`;
  const encarts = state.strategiePillars[section] || [];
  let html = '<div class="panel" style="max-width:1100px">';
  html += renderStratHero(section);
  if (encarts.length === 0) {
    html += `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="10" width="8" height="11" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/></svg>
      <p>Aucun encart. Clique « + Encart » pour composer cette section.</p></div>`;
    html += '</div>';
    content.innerHTML = html;
    return;
  }
  // Regroupement par champ "group" (ou « Sans catégorie » si absent), en préservant l'ordre d'apparition
  const order = [];
  const map = new Map();
  encarts.forEach(p => {
    const g = (p.group || '').trim() || 'Sans catégorie';
    if (!map.has(g)) { map.set(g, []); order.push(g); }
    map.get(g).push(p);
  });
  if (!expandedGroups[section]) expandedGroups[section] = new Set();
  const opened = expandedGroups[section];
  html += `<div class="hub-grid${opened.size?' has-focus':''}">`;
  order.forEach(g => {
    const items = map.get(g);
    const lead = items.find(p => p.size === 'large') || items[0];
    const preview = (lead.text || '').trim().slice(0, 200);
    const isExp = opened.has(g);
    html += `<div class="group-card ${isExp?'is-expanded':''}" data-section="${section}" data-group="${esc(g)}" onclick="toggleGroupFromEl(this)">
      <div class="group-card-head">${esc(g)}</div>
      <div class="group-card-lead">${esc(preview)}${(lead.text||'').length>200?'…':''}</div>
      <div class="group-card-count">${items.length} encart${items.length>1?'s':''} ${isExp?'▴':'▾'}</div>
    </div>`;
    if (isExp) {
      html += `<div class="group-expansion">
        <div class="group-expansion-grid">
          ${items.map(p => renderEncartCard(section, p)).join('')}
        </div>
        <div class="group-expansion-actions">
          <button class="btn btn-ghost btn-sm" data-section="${section}" data-group="${esc(g)}" onclick="event.stopPropagation();addEncartFromGroupEl(this)">+ Encart dans ce groupe</button>
        </div>
      </div>`;
    }
  });
  html += '</div></div>';
  content.innerHTML = html;
}
function renderEncartCard(section, p) {
  const n = (p.contributions||[]).length;
  const preview = (p.text||'').trim();
  const max = p.size === 'large' ? 420 : 220;
  return `<div class="encart ${p.size==='large'?'encart-lg':''}" onclick="event.stopPropagation();openEncartModal('${section}','${p.id}')">
    <div class="encart-title">${esc(p.name)}</div>
    ${preview ? `<div class="encart-text">${esc(preview.slice(0,max))}${preview.length>max?'…':''}</div>` : `<div class="encart-empty">Vide — clique pour rédiger</div>`}
    ${n ? `<div class="encart-badge">▸ ${n} apport${n>1?'s':''}</div>` : ''}
  </div>`;
}
function toggleGroupFromEl(el) {
  const section = el.dataset.section;
  const group = el.dataset.group;
  if (!expandedGroups[section]) expandedGroups[section] = new Set();
  const wasOpen = expandedGroups[section].has(group);
  // Accordéon strict : ferme tout, puis ouvre le clic si c'était fermé
  expandedGroups[section].clear();
  if (!wasOpen) expandedGroups[section].add(group);
  render();
}
function openGroupModal(section, groupName) {

function addEncartFromGroupEl(el) { addEncart(el.dataset.section, el.dataset.group); }

// Publie l'état complet d'un volet dans strategy.json (sinon l'édition resterait locale et sauterait à la synchro)
async function persistStrategySection(section, label) {
  const cfg = getGhConfig();
  if (!cfg || !cfg.token) { vivierToast('Enregistré en local (token GitHub non configuré dans Réglages)'); return; }
  vivierToast('Publication…');
  const res = await writeRepoJson('strategy.json',
    p => { p.encarts = p.encarts || {};
           p.encarts[section] = (state.strategiePillars[section] || []).map(e => ({
             name: e.name || 'Encart', text: e.text || '',
             size: e.size === 'large' ? 'large' : 'normal', group: (e.group || '').trim() })); },
    (label || 'Stratégie mise à jour') + ' · ' + section,
    { createIfMissing: true, initial: { encarts: {} } });
  vivierToast(res.ok ? '✓ publié' : '⚠ enregistré en local, publication échouée : ' + res.error);
}
function renamePillar(section, pid, name) {
  const p = findPillar(section, pid); if (!p) return;
  p.name = name.trim() || 'Encart'; save();
  persistStrategySection(section, 'Renommage encart');
}
function savePillarText(section, pid, text) {
  const p = findPillar(section, pid); if (!p) return;
  p.text = text; save();
  persistStrategySection(section, 'Texte encart');
}
function setEncartGroup(section, pid, group) {
  const p = findPillar(section, pid); if (!p) return;
  p.group = (group || '').trim(); save();
  persistStrategySection(section, 'Catégorie encart');
}
function toggleEncartSize(section, pid) {
  syncEncartText(section, pid);
  const p = findPillar(section, pid); if (!p) return;
  p.size = p.size === 'large' ? 'normal' : 'large';
  save(); persistStrategySection(section, 'Taille encart'); openEncartModal(section, pid);
}
function deleteEncart(section, pid) {
  const p = findPillar(section, pid); if (!p) return;
  const n = (p.contributions||[]).length;
  if (!confirm(`Supprimer l'encart « ${p.name} »${n?` et ses ${n} apport(s)`:''} ?`)) return;
  state.strategiePillars[section] = state.strategiePillars[section].filter(x=>x.id!==pid);
  save(); persistStrategySection(section, 'Suppression encart'); closeModal(); render();
}
function syncEncartText(section, pid) {
  const ta = document.getElementById('encart-text');
  if (!ta) return;
  const p = findPillar(section, pid); if (p) p.text = ta.value;
}
function integrateContrib(section, pid, cid) {
  syncEncartText(section, pid);
  const p = findPillar(section, pid); if (!p) return;
  const c = (p.contributions||[]).find(x=>x.id===cid); if (!c) return;
  const add = (c.title ? c.title : '') + (c.body ? (c.title?' : ':'') + c.body : '');
  p.text = (p.text ? p.text.trimEnd() + '\n\n' : '') + add;
  p.contributions = p.contributions.filter(x=>x.id!==cid);
  save();
  if (document.getElementById('encart-text')) openEncartModal(section, pid); else render();
}
function deleteContrib(section, pid, cid) {
  syncEncartText(section, pid);
  const p = findPillar(section, pid); if (!p) return;
  p.contributions = (p.contributions||[]).filter(x=>x.id!==cid);
  save();
  if (document.getElementById('encart-text')) openEncartModal(section, pid); else render();
}

function mdToHtml(t) {
  let s = esc(t).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  const lines = s.split('\n'); const out = []; let inList = false;
  for (const line of lines) {
    const m = line.match(/^\s*[-•]\s+(.*)$/);
    if (m) { if (!inList) { out.push('<ul>'); inList = true; } out.push('<li>' + m[1] + '</li>'); }

const roadmapStatusLabel = { done: 'Livré', doing: 'En cours', planned: 'À venir' };
const roadmapStatusDot = { done: 'var(--teal-600)', doing: 'var(--blue-500)', planned: 'var(--slate-400)' };
const MONTH_FR = ['Janv.', 'Févr.', 'Mars', 'Avril', 'Mai', 'Juin', 'Juil.', 'Août', 'Sept.', 'Oct.', 'Nov.', 'Déc.'];
function monthLabel(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return MONTH_FR[parseInt(mo, 10) - 1] + ' ' + y.slice(2);

function expandMonths(start, end, extraFuture) {
  if (!start) return [];
  let [cy, cm] = start.split('-').map(Number);
  const [ey, em] = end.split('-').map(Number);
  const arr = [];
  let safety = 60;
  while (safety-- > 0) {
    arr.push(`${cy}-${String(cm).padStart(2, '0')}`);
    if (cy === ey && cm === em) break;
    cm++; if (cm > 12) { cm = 1; cy++; }
  }
  for (let i = 0; i < extraFuture; i++) {
    cm++; if (cm > 12) { cm = 1; cy++; }
    arr.push(`${cy}-${String(cm).padStart(2, '0')}`);
  }
  return arr;
}
function renderRoadmap(content, actions) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="openRoadmapItemModal()">+ Jalon</button>`;
  const items = (state.roadmap || []).slice();
  if (items.length === 0) {
    content.innerHTML = `<div class="panel"><div class="roadmap-empty">
      Aucun jalon. Clique « + Jalon » pour ajouter une étape — ou ouvre Réglages → « Charger la synthèse plateforme » pour pré-remplir depuis Plateforme-CPTS.
    </div></div>`;
    return;
  }
  const months = [...new Set(items.map(i => i.month).filter(Boolean))].sort();
  const today = new Date().toISOString().slice(0, 7);
  const start = months[0] || today;
  const end = months[months.length - 1] >= today ? months[months.length - 1] : today;

// ============ VUE SUIVI BÉTA TEST ============
// Coquille : l'interface et toute la logique sont prêtes. Les chiffres d'usage
// (connexions, activité, retours des membres) arriveront de l'instance de la CPTS
// une fois celle-ci créée et branchée. Cahier des charges : mémoire « suivi-beta-test ».
const BETA = {
  cpts: 'CPTS PAU BÉARN',
  dureeMois: 6,            // Art. 3 — durée minimale
  nbRapports: 3,           // Art. 7.4 — bimestriel sur la durée
  intervalleMois: 2,
  // Délais contractuels de correction (Art. 7.2). « jours » = jours ouvrés approchés.
  sla: {
    haute:   { label: 'Haute',   jours: 3,    desc: '72 h ouvrables' },
    normale: { label: 'Normale', jours: 7,    desc: '7 j ouvrés' },
    basse:   { label: 'Basse',   jours: null, desc: 'planifié' }
  },
  typeLabel: { bug: '🐞 Bug', souhait: '💡 Souhait', autre: '💬 Autre' },
  journalIco: { releve: '🔴', demande: '💡', apporte: '🚀', ajuste: '🔧' }
};

function ensureBeta() {
  if (!state.beta || typeof state.beta !== 'object') state.beta = {};
  const b = state.beta;
  if (typeof b.signatureDate !== 'string') b.signatureDate = '';
  if (!Array.isArray(b.invites)) b.invites = [];     // {id, nom, role}
  if (!Array.isArray(b.retours)) b.retours = [];     // {id, type, titre, description, auteur, priorite, statut, date, dateResolu, taskId, arbitrage}
  if (!Array.isArray(b.incidents)) b.incidents = []; // {id, date, description, cptsInformeeLe}
  if (!Array.isArray(b.journal)) b.journal = [];     // {id, date, type, texte, ref}
  if (!Array.isArray(b.reports)) b.reports = [];     // {id, no, dateEnvoi, statut}
  return b;
}

// ---- Helpers dates ----
function betaDays(ms) { return Math.ceil(ms / 86400000); }
function betaAddBusinessDays(date, n) {
  const d = new Date(date); let added = 0;
  while (added < n) { d.setDate(d.getDate() + 1); const j = d.getDay(); if (j !== 0 && j !== 6) added++; }
  return d;
}
function betaAddMonths(dateStr, n) { const d = new Date(dateStr); d.setMonth(d.getMonth() + n); return d; }
function fmtFr(d) {
  if (!d) return '—';
  const date = (typeof d === 'string') ? new Date(d) : d;
  if (isNaN(date.getTime())) return '—';
  return date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function betaInPeriod(iso, start, end) { const d = new Date(iso); return d >= start && d <= end; }

// ---- SLA (compte à rebours contractuel) ----
function betaSlaDeadline(r) {
  const cfg = BETA.sla[r.priorite];
  if (!cfg || cfg.jours == null || !r.date) return null;
  return betaAddBusinessDays(new Date(r.date), cfg.jours);
}
function betaSlaInfo(r) {
  if (r.statut === 'resolu') return { etat: 'resolu', label: 'Résolu' };
  const dl = betaSlaDeadline(r);
  if (!dl) return { etat: 'na', label: 'Planifié' };
  const ms = dl - new Date();
  if (ms < 0) return { etat: 'depasse', label: 'Dépassé', deadline: dl };
  const j = betaDays(ms);
  return { etat: ms < 86400000 ? 'bientot' : 'ok', label: 'Reste ' + (j <= 1 ? '< 1 j' : j + ' j'), deadline: dl };
}
const betaSlaRank = { depasse: 0, bientot: 1, ok: 2, na: 3, resolu: 4 };

// ---- Échéancier des rapports bimestriels (Art. 7.4) ----
function betaReportSchedule(b) {
  if (!b.signatureDate) return [];
  const out = [];
  for (let i = 1; i <= BETA.nbRapports; i++) {
    const due = betaAddMonths(b.signatureDate, i * BETA.intervalleMois);
    const periodeStart = betaAddMonths(b.signatureDate, (i - 1) * BETA.intervalleMois);
    const sent = b.reports.find(r => r.no === i && r.statut === 'envoye');
    out.push({ no: i, due, periodeStart, periodeEnd: due, sent: !!sent, sentInfo: sent });
  }
  return out;
}

// ---- Tri automatique de la priorité (Art. 7.2) ----
// Règles par mots-clés en attendant le branchement de l'assistant de classement (IA).
function betaAutoTriage(text) {
  const t = (text || '').toLowerCase();
  if (/(bloqu|impossible de (se )?(connect|acc[eé]d)|connexion|crash|plante|écran blanc|erreur 500|perte de donn|donn[eé]es? perdu|inaccessible|ne fonctionne plus)/.test(t)) return 'haute';
  if (/(orthograph|coquille|couleur|alignement|libell[eé]|d[eé]tail|esth[eé]tique|confort|pr[eé]f[eé]rence)/.test(t)) return 'basse';
  return 'normale';
}

// ---- Journal de bord vivant ----
function betaJournalAdd(type, texte, ref) {
  const b = ensureBeta();
  b.journal.push({ id: uid(), date: new Date().toISOString(), type, texte, ref: ref || '' });
}

// ---- Point d'entrée UNIQUE des remontées ----
// Appelé par l'instance (plus tard) ou par « + Retour ». Fait tout, tout seul :
// 1) tri auto de la priorité  2) création d'une tâche taguée « béta »  3) ligne de journal.
function betaIngestRetour({ type, titre, description, auteur }) {
  const b = ensureBeta();
  const isBug = type === 'bug';
  const priorite = isBug ? betaAutoTriage((titre || '') + ' ' + (description || '')) : 'basse';
  const task = {
    id: uid(),
    title: (isBug ? '[Béta · bug] ' : '[Béta · ' + type + '] ') + (titre || (description || '').slice(0, 40)),
    body: description || '',
    category: isBug ? 'tech' : 'strategie',
    status: 'todo',
    source: 'beta'           // ← tag repérable par Magnus pour l'arbitrage roadmap
  };
  state.tasks.push(task);
  const retour = {
    id: uid(), type, titre: titre || '', description: description || '', auteur: auteur || '',
    priorite, statut: 'ouvert', date: new Date().toISOString(), dateResolu: '',
    taskId: task.id, arbitrage: ''
  };
  b.retours.push(retour);
  betaJournalAdd(isBug ? 'releve' : 'demande',
    (isBug ? 'Bug signalé' : (type === 'souhait' ? 'Souhait remonté' : 'Retour reçu')) + ' : ' + (titre || (description || '').slice(0, 60)),
    retour.id);
  save();
  return retour;
}

// ---- Réconciliation : tâche « Terminé » → retour « résolu » + journal « traité » ----
function betaReconcile() {
  if (!state.beta || !Array.isArray(state.beta.retours)) return;
  state.beta.retours.forEach(r => {
    if (r.taskId && r.statut === 'ouvert') {
      const t = (state.tasks || []).find(x => x.id === r.taskId);
      if (t && t.status === 'done') {
        r.statut = 'resolu';
        r.dateResolu = new Date().toISOString();
        if (r.type === 'bug') betaJournalAdd('apporte', 'Dysfonctionnement traité : ' + (r.titre || (r.description || '').slice(0, 60)), r.id);
      }
    }
  });
}

const BETA_FLASK = '<path d="M9 3h6M10 3v6.5L5.2 18a2 2 0 001.8 3h10a2 2 0 001.8-3L14 9.5V3"/><path d="M7.5 14h9"/>';
function renderBeta(content, actions) {

// Satisfaction : alimentée plus tard (mini-questionnaire / instance). null tant qu'on n'a rien.
function betaSatisfaction(b) { return null; }

// La liste de TOUT ce qui demande une action, trié du plus urgent au moins urgent.
function betaActionItems(b) {
  const items = [];
  // Bugs ouverts → chrono SLA
  b.retours.filter(r => r.statut === 'ouvert' && r.type === 'bug').forEach(r => {
    const s = betaSlaInfo(r);
    const urg = s.etat === 'depasse' ? 0 : s.etat === 'bientot' ? 1 : 2;
    items.push({ urg, etat: s.etat, ico: '🐞', titre: r.titre || r.description.slice(0, 60),
      meta: 'Bug · ' + BETA.sla[r.priorite].label + ' · ' + s.label,
      btns: `<button class="btn btn-ghost beta-mini" onclick="event.stopPropagation();goToTaskFromToday('${r.taskId}')">Ouvrir</button>
             <button class="btn btn-primary beta-mini" onclick="event.stopPropagation();betaMarkResolved('${r.id}')">Régler</button>` });
  });
  // Incidents à notifier
  b.incidents.filter(i => !i.cptsInformeeLe).forEach(() => {
    items.push({ urg: 0, etat: 'depasse', ico: '⚠️', titre: 'Incident à notifier à la CPTS',
      meta: 'sans délai (Art. 4.3)',
      btns: `<button class="btn btn-primary beta-mini" onclick="event.stopPropagation();openBetaIncident()">Notifier</button>` });
  });
  // Rapport à préparer (en retard ou < 14 j)
  const next = betaReportSchedule(b).find(s => !s.sent);
  if (next) {
    const ms = next.due - new Date();
    if (ms < 0 || betaDays(ms) <= 14) {
      items.push({ urg: ms < 0 ? 0 : 1, etat: ms < 0 ? 'depasse' : 'bientot', ico: '📄',
        titre: 'Rapport n°' + next.no + ' à envoyer à la CPTS',
        meta: ms < 0 ? ('en retard depuis le ' + fmtFr(next.due)) : ('avant le ' + fmtFr(next.due)),
        btns: `<button class="btn btn-primary beta-mini" onclick="event.stopPropagation();openBetaReport()">Préparer</button>` });
    }
  }
  // Souhaits à arbitrer
  b.retours.filter(r => r.statut === 'ouvert' && r.type === 'souhait' && !r.arbitrage).forEach(r => {
    items.push({ urg: 3, etat: 'ok', ico: '💡', titre: r.titre || r.description.slice(0, 60),
      meta: 'Souhait · à arbitrer pour la roadmap',
      btns: `<button class="btn btn-ghost beta-mini" onclick="event.stopPropagation();goToTaskFromToday('${r.taskId}')">Voir</button>` });
  });
  // Avis / autres
  b.retours.filter(r => r.statut === 'ouvert' && r.type === 'autre').forEach(r => {
    items.push({ urg: 4, etat: 'ok', ico: '💬', titre: r.titre || r.description.slice(0, 60), meta: 'Avis / question',
      btns: `<button class="btn btn-ghost beta-mini" onclick="event.stopPropagation();goToTaskFromToday('${r.taskId}')">Voir</button>` });
  });
  return items.sort((a, c) => a.urg - c.urg);
}

// Régler une remontée directement : sa tâche passe « Terminé » → clôture auto via save().
function betaMarkResolved(retourId) {
  const b = ensureBeta();
  const r = b.retours.find(x => x.id === retourId);
  if (!r) return;
  const t = (state.tasks || []).find(x => x.id === r.taskId);
  if (t) t.status = 'done';
  else { r.statut = 'resolu'; r.dateResolu = new Date().toISOString(); }
  save(); render();
}

// ---- Bandeau flash : 4 chiffres lisibles d'un coup d'œil ----
function betaFlashHtml(b) {
  const bugsOuverts = b.retours.filter(r => r.type === 'bug' && r.statut === 'ouvert');
  const horsDelai = bugsOuverts.filter(r => betaSlaInfo(r).etat === 'depasse').length;
  const next = betaReportSchedule(b).find(s => !s.sent);
  let echNum = '—', echSub = 'tout est envoyé', echAlert = false;
  if (next) {
    const ms = next.due - new Date();
    if (ms < 0) { echNum = 'En retard'; echAlert = true; } else echNum = 'J‑' + betaDays(ms);
    echSub = 'rapport n°' + next.no;
  }
  const sat = betaSatisfaction(b);
  const face = sat == null ? '🙂' : (sat < 40 ? '😟' : sat < 70 ? '😐' : '😊');
  return `<div class="beta-kpis">
    <div class="beta-kpi">
      <div class="beta-kpi-label">😊 Satisfaction</div>
      <div class="satbar">${sat != null ? `<span class="satbar-needle" style="left:${sat}%"></span>` : ''}</div>
      <div class="beta-kpi-sub">${sat != null ? face + ' ' + sat + '%' : 'à recueillir'}</div>
    </div>
    <div class="beta-kpi ${horsDelai ? 'alert' : ''}">
      <div class="beta-kpi-label">🐞 À corriger</div>

// ---- Générateur de rapport bimestriel (Art. 7.4) ----
function betaBuildReport(b, no) {
  const sched = betaReportSchedule(b);
  const s = sched.find(x => x.no === no) || sched[0];
  const start = s.periodeStart, end = s.periodeEnd;
  const evolutions = b.journal.filter(j => (j.type === 'apporte' || j.type === 'ajuste') && betaInPeriod(j.date, start, end));
  const traites = b.retours.filter(r => r.type === 'bug' && r.statut === 'resolu' && r.dateResolu && betaInPeriod(r.dateResolu, start, end));
  const prevus = (state.roadmap || []).filter(j => j.status !== 'done' && j.month && new Date(j.month + '-01') >= end);
  const souhaits = b.retours.filter(r => r.type === 'souhait' && r.statut === 'ouvert');
  return { s, start, end, evolutions, traites, prevus, souhaits };
}
function openBetaReport() {
  const b = ensureBeta();
  const sched = betaReportSchedule(b);
  const next = sched.find(x => !x.sent) || sched[sched.length - 1];
  const r = betaBuildReport(b, next.no);
  const li = (arr, fn) => arr.length ? '<ul>' + arr.map(fn).join('') + '</ul>' : '<p style="color:var(--slate-400)">— Rien à signaler sur la période.</p>';
  const m = document.getElementById('modal');

// ============ BACKUP GITHUB ============
const GH_CONFIG_KEY = 'cpts_github_config';
const BACKUP_INTERVAL_MS = 10 * 60 * 1000;  // 10 min (filet de sécurité)
const BACKUP_PATH = 'backups/cockpit-latest.json';
let backupInterval = null;
let backupDebounce = null;
let backupPending = false;
// Sauvegarde auto ~45s après la dernière modif (débounce) — fiable même si la page est rechargée souvent
function scheduleAutoBackup() {
  const cfg = getGhConfig();
  if (!cfg || !cfg.token) return;
  backupPending = true;
  if (backupDebounce) clearTimeout(backupDebounce);
  backupDebounce = setTimeout(() => { backupPending = false; backupDebounce = null; backupToGithub(true); }, 45000);
}

function getGhConfig() {
  try { return JSON.parse(localStorage.getItem(GH_CONFIG_KEY) || '{}'); }
  catch { return {}; }
}
function setGhConfig(c) { localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(c)); }

// Encodage UTF-8 → base64 (gère les caractères accentués)
function utf8ToBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

async function backupToGithub(silent) {
  const cfg = getGhConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    if (!silent) alert('Backup non configuré. Clique sur "Backup Github" pour le configurer.');
    return false;
  }
  const branch = cfg.branch || 'main';
  const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${BACKUP_PATH}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  try {
    // 1. Récupère le SHA actuel (si le fichier existe déjà)
    let sha = null;
    const getResp = await fetch(`${apiUrl}?ref=${branch}`, { headers });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
    } else if (getResp.status !== 404) {
      const err = await getResp.json().catch(() => ({}));
      throw new Error(err.message || `Lecture impossible (${getResp.status})`);
    }
    // 2. Prépare le snapshot
    const snapshot = {
      version: 1,
      exportedAt: new Date().toISOString(),
      origin: silent ? 'auto-backup' : 'manual-backup',
      data: state
    };
    const body = {
      message: `Backup cockpit ${new Date().toLocaleString('fr-FR')}`,
      content: utf8ToBase64(JSON.stringify(snapshot, null, 2)),
      branch
    };
    if (sha) body.sha = sha;
    // 3. PUT
    const putResp = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({}));
      throw new Error(err.message || `Échec (${putResp.status})`);
    }
    cfg.lastBackup = new Date().toISOString();
    cfg.lastError = null;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('✓ Backup réussi sur Github');
    return true;
  } catch (e) {
    cfg.lastError = e.message;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('Erreur backup : ' + e.message);
    return false;
  }
}

async function doManualBackup() {
  const cfg = getGhConfig();
  if (!cfg.token) { openGhConfigModal(); return; }
  const btn = document.getElementById('manual-backup-btn');
  if (btn) { btn.disabled = true; btn.textContent = '… sauvegarde en cours'; }
  await backupToGithub(false);
  if (btn) { btn.disabled = false; btn.textContent = '↑ Sauvegarder maintenant'; }
}

function startAutoBackup() {
  if (backupInterval) clearInterval(backupInterval);
  const cfg = getGhConfig();
  if (!cfg.token) return;
  backupInterval = setInterval(() => backupToGithub(true), BACKUP_INTERVAL_MS);
}

function updateBackupStatus() {
  const el = document.getElementById('backup-status');
  if (!el) return;
  const cfg = getGhConfig();
  let dot, text, title = '';
  if (!cfg.token) { dot = 'var(--slate-500)'; text = 'Backup non configuré'; }
  else if (cfg.lastError) { dot = 'var(--red-600)'; text = 'Erreur de backup'; title = cfg.lastError; }

// Appel direct à l'API Claude depuis le navigateur. Sortie JSON garantie par structured output.
async function classifyIdea(note, cfgOverride) {
  const cfg = cfgOverride || getAiConfig();
  if (!cfg.key) throw new Error('Assistant IA non configuré');
  const SYSTEM = `Tu es l'assistant de classement du cockpit de pilotage de CPTS Pilot (un logiciel pour les CPTS — Communautés Professionnelles Territoriales de Santé). On te donne une « idée » (note libre). Choisis sa destination.
Deux chemins :
- Si l'idée est une ACTION concrète à réaliser → destination "tache" (elle ira dans le tableau To do).
- Si l'idée est une INTUITION / orientation stratégique déjà mûre → range-la directement dans la stratégie : "vision" (cap, raison d'être, long terme), "marche" (prise de marché : cibles, canaux, go-to-market), ou "pricing" (modèle de prix, offres).
- Si rien ne colle vraiment → "idee" (la garder en l'état).
reason : une phrase courte (max 15 mots) en français justifiant le choix.
Réponds uniquement via le schéma fourni.`;
  const SCHEMA = {
    type: 'object',
    properties: {
      destination: { type: 'string', enum: ['vision', 'marche', 'pricing', 'dev', 'tache', 'idee'] },
      reason: { type: 'string' }
    },
    required: ['destination', 'reason'],
    additionalProperties: false
  };
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': cfg.key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: cfg.model || 'claude-haiku-4-5',
      max_tokens: 400,
      system: [{ type: 'text', text: SYSTEM, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: `Titre : ${note.title}\n\nContenu : ${note.body || '(vide)'}` }],
      output_config: { format: { type: 'json_schema', schema: SCHEMA } }
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erreur API (${resp.status})`);
  }
  const data = await resp.json();
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  try { return JSON.parse(txt); }
  catch { throw new Error('Réponse de l\'IA illisible'); }
}

// Décodage base64 UTF-8 propre (les contenus français contiennent des accents)
function b64ToUtf8(b64) {
  const bin = atob((b64 || '').replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
// Lit Plateforme-CPTS/roadmap.json via l'API GitHub (repo privé → token du backup)
async function fetchDynamicRoadmap() {
  const cfg = getGhConfig();
  if (!cfg.token) return { items: [], note: 'token GitHub non configuré' };
  const owner = cfg.owner || 'Evalita03';
  const url = `https://api.github.com/repos/${owner}/Plateforme-CPTS/contents/roadmap.json?ref=main&t=${Date.now()}`;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) return { items: [], note: 'roadmap.json pas encore créé côté Plateforme-CPTS' };
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); return { items: [], note: `API GitHub : ${e.message || resp.status}` }; }
    const data = await resp.json();
    const text = b64ToUtf8(data.content);
    const parsed = JSON.parse(text);
    return { items: Array.isArray(parsed.items) ? parsed.items : [], updated_at: parsed.updated_at };
  } catch (e) {
    return { items: [], note: 'lecture impossible : ' + e.message };
  }
}

async function loadStrategySeed() {
  if (!confirm('Charger / synchroniser depuis Plateforme-CPTS ?\n\n• Encarts Vision / Prise de marché / Tarification : remplacés par la version la plus récente (strategy.json sur Plateforme-CPTS si présent, sinon mon seed statique). Tes éventuelles modifs locales seront écrasées.\n• Roadmap : jalons historiques + étapes en cours/à venir lues en direct dans Plateforme-CPTS.\n\nContinuer ?')) return;
  try {
    // 1. Seed statique (fallback encarts + jalons historiques)
    const resp = await fetch('strategy-seed.json?t=' + Date.now());
    if (!resp.ok) throw new Error(`strategy-seed.json introuvable (${resp.status})`);
    const seed = await resp.json();

    // 2. Lectures dynamiques en parallèle (API GitHub sur Plateforme-CPTS)
    const [dynRoad, dynStrat] = await Promise.all([
      fetchDynamicRoadmap(),
      fetchDynamicStrategy()
    ]);

    // Encarts : strategy.json (live) si dispo, sinon fallback seed
    let dynEncartsCount = 0;
    ['vision', 'marche', 'pricing', 'dev'].forEach(sec => {
      const live = dynStrat.encarts && Array.isArray(dynStrat.encarts[sec]) ? dynStrat.encarts[sec] : null;
      const fallback = seed.encarts && Array.isArray(seed.encarts[sec]) ? seed.encarts[sec] : null;
      const source = live || fallback;
      if (Array.isArray(source)) {
        state.strategiePillars[sec] = source.map(e => ({
          id: uid(),
          name: e.name,
          text: e.text || '',
          size: e.size === 'large' ? 'large' : 'normal',
          group: (e.group || '').trim(),
          contributions: []
        }));
      }
      if (live) dynEncartsCount += live.length;
    });

    // Roadmap = historique du seed + items dynamiques
    const seedItems = Array.isArray(seed.roadmap) ? seed.roadmap : [];
    state.roadmap = [...seedItems, ...dynRoad.items].map(r => ({
      id: uid(),
      title: r.title || '(sans titre)',
      month: r.month || null,
      status: ['done', 'doing', 'planned'].includes(r.status) ? r.status : 'planned',
      body: r.body || ''
    }));

    save(); closeModal(); render();
    // Message récap : encarts + roadmap, source par source
    let msg = '✓ Synthèse chargée.\n\n';
    msg += 'ENCARTS — ';
    if (dynEncartsCount) {
      msg += `${dynEncartsCount} en direct depuis Plateforme-CPTS`;
      if (dynStrat.updated_at) msg += ` (maj ${dynStrat.updated_at})`;
      msg += '.';
    } else {
      msg += `seed statique (${dynStrat.note || 'fallback'}).`;
    }
    msg += '\nROADMAP — ';
    msg += `${seedItems.length} jalons historiques`;
    if (dynRoad.items.length) {
      msg += ` + ${dynRoad.items.length} en cours/à venir (Plateforme-CPTS`;
      if (dynRoad.updated_at) msg += `, maj ${dynRoad.updated_at}`;
      msg += ').';
    } else if (dynRoad.note) {
      msg += `.\n(roadmap dynamique : ${dynRoad.note})`;
    } else msg += '.';
    alert(msg);
  } catch (e) {
    alert('Chargement impossible : ' + e.message);
  }
}

// ============ INIT ============
load();
render();
updateBackupStatus();
startAutoBackup();
// Sauvegarde immédiate quand tu quittes / recharges la page, s'il y a des modifs en attente
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && backupPending) {
    backupPending = false;
    if (backupDebounce) { clearTimeout(backupDebounce); backupDebounce = null; }
    backupToGithub(true);
  }
});

// Charge architecture.json en arrière-plan pour alimenter le pouls projet
// même si l'utilisateur n'a pas encore visité la vue Architecture.
(async () => {
  if (archData) return;
  try {
    const resp = await fetch('architecture.json?t=' + Date.now());
    if (resp.ok) {
      archData = await resp.json();
      buildNodesFromArch();
      if (currentView === 'today') render();
    }
  } catch(e) {}
})();

// Amorçage « rattrapage » des encarts de base du volet Dev. Ils ont été ajoutés
// après le seed initial, donc absents des cockpits déjà seedés. On FUSIONNE : on
// ajoute les encarts de base manquants (par nom) sans toucher à ceux déjà présents
// (ex. une idée promue), une seule fois (drapeau devBaseSeeded). Non destructif.
(async () => {
  if (state.devBaseSeeded) return;
  if (!state.strategiePillars) state.strategiePillars = {};
  if (!Array.isArray(state.strategiePillars.dev)) state.strategiePillars.dev = [];
  try {
    const resp = await fetch('strategy-seed.json?t=' + Date.now());
    if (!resp.ok) return;
    const seed = await resp.json();
    const base = seed.encarts && Array.isArray(seed.encarts.dev) ? seed.encarts.dev : [];
    const present = new Set(state.strategiePillars.dev.map(p => (p.name || '').trim().toLowerCase()));
    const toAdd = base
      .filter(e => !present.has((e.name || '').trim().toLowerCase()))
      .map(e => ({ id: uid(), name: e.name, text: e.text || '', size: e.size === 'large' ? 'large' : 'normal', group: (e.group || '').trim(), contributions: [] }));
    // Encarts de base d'abord (groupés), encarts déjà là (ex. idées promues) ensuite
    state.strategiePillars.dev = [...toAdd, ...state.strategiePillars.dev];
    state.devBaseSeeded = true;
    save();
    if (currentView === 'strat-dev') render();
  } catch(e) {}
})();
</script>
