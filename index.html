<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPTS Pilot — Cockpit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
:root {
  --blue-900: #1E3A8A;
  --blue-700: #1D4ED8;
  --blue-600: #2563EB;
  --blue-500: #3B82F6;
  --blue-100: #DBEAFE;
  --blue-50: #EFF6FF;
  --teal-700: #0F766E;
  --teal-600: #0D9488;
  --teal-100: #CCFBF1;
  --slate-900: #0F172A;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748B;
  --slate-400: #94A3B8;
  --slate-300: #CBD5E1;
  --slate-200: #E2E8F0;
  --slate-100: #F1F5F9;
  --slate-50: #F8FAFC;
  --orange-600: #EA580C;
  --orange-100: #FFEDD5;
  --red-600: #DC2626;
  --white: #FFFFFF;
  --tech: #2563EB;
  --commercial: #0D9488;
  --strategie: #7C3AED;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--slate-50);
  color: var(--slate-900);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--slate-900);
  color: var(--white);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.logo {
  padding: 20px 20px 16px;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.025em;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo .dot { color: var(--blue-500); }
.logo .sub { display:block; font-size: 11px; font-weight: 500; color: var(--slate-400); letter-spacing: 0.04em; margin-top: 4px; text-transform: uppercase;}
.nav { flex: 1; padding: 12px 0; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--slate-300);
  border-left: 3px solid transparent; transition: all .15s;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.nav-item.active { background: rgba(59,130,246,0.12); border-left-color: var(--blue-500); color: var(--white); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

/* Nav à 2 niveaux */
.nav { overflow-y: auto; }
.nav-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 10px 20px; }
.nav-group-header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer; user-select: none;
  font-size: 11px; font-weight: 700; color: var(--slate-400);
  text-transform: uppercase; letter-spacing: 0.05em;
  transition: color .15s;
}
.nav-group-header:hover { color: var(--white); }
.nav-group-header svg.grp-icon { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.85; }
.nav-group-header .chevron {
  margin-left: auto; width: 13px; height: 13px; opacity: 0.5;
  transition: transform .2s ease;
}
.nav-group.collapsed .nav-group-header .chevron { transform: rotate(-90deg); }
.nav-group-items { max-height: 360px; overflow: hidden; transition: max-height .25s ease; }
.nav-group.collapsed .nav-group-items { max-height: 0; }
.nav-subitem {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 20px 9px 35px; cursor: pointer;
  font-size: 13.5px; font-weight: 500; color: var(--slate-300);
  border-left: 3px solid transparent; transition: all .15s;
}
.nav-subitem:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.nav-subitem.active { background: rgba(59,130,246,0.12); border-left-color: var(--blue-500); color: var(--white); }
.nav-subitem .sub-bullet { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.45; flex-shrink: 0; }
.nav-subitem.active .sub-bullet { opacity: 1; background: var(--blue-500); }

.nav-footer { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.footer-settings {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 9px 11px; border-radius: 8px; text-align: left;
  border: 1px solid rgba(255,255,255,0.12); background: transparent;
  color: var(--slate-300); font-family: inherit; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.footer-settings:hover { background: rgba(255,255,255,0.06); color: var(--white); border-color: rgba(255,255,255,0.2); }
.footer-settings .backup-status { flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--slate-400); }
.footer-settings:hover .backup-status { color: inherit; }
.footer-settings .backup-status .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.footer-settings .backup-status .bs-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.footer-settings .gear { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 60px; background: var(--white); border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0;
}
.topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.topbar .actions { display: flex; gap: 10px; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--blue-700); color: var(--white); }
.btn-primary:hover { background: var(--blue-600); }
.btn-ghost { background: var(--slate-100); color: var(--slate-700); }
.btn-ghost:hover { background: var(--slate-200); }
.content { flex: 1; overflow: auto; position: relative; }

/* Graph view */
#graph-canvas { width: 100%; height: 100%; display: block; cursor: grab; background:
  radial-gradient(circle at 1px 1px, var(--slate-200) 1px, transparent 0); background-size: 24px 24px; }
#graph-canvas:active { cursor: grabbing; }
.graph-legend {
  position: absolute; bottom: 20px; left: 20px; background: var(--white);
  border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.08); font-size: 12px;
}
.graph-legend h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); margin-bottom: 10px; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: var(--slate-700); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Panels (notes, tasks, etc) */
.panel { padding: 24px; max-width: 1100px; margin: 0 auto; }
.panel-grid { display: grid; gap: 16px; }
.card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px;
  padding: 18px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); transition: all .15s;
}
.card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.08); }
.card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 13px; color: var(--slate-600); line-height: 1.6; }
.card .meta { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.tag {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.tag-tech { background: var(--blue-100); color: var(--blue-700); }
.tag-commercial { background: var(--teal-100); color: var(--teal-700); }
.tag-strategie { background: #EDE9FE; color: #7C3AED; }

/* Tasks */
.task-col { display: flex; flex-direction: column; gap: 10px; }
.task-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.task-column { background: var(--slate-100); border-radius: 12px; padding: 14px; }
.task-column h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--slate-500); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.task-count { background: var(--slate-300); color: var(--slate-700); border-radius: 20px; padding: 1px 8px; font-size: 11px; }
.task-card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 8px;
  padding: 12px; font-size: 13px; cursor: pointer; box-shadow: 0 1px 2px rgba(15,23,42,0.04);
}
.task-card:hover { border-color: var(--blue-500); cursor: grab; }
.task-card { user-select: none; transition: opacity .15s, transform .1s, border-color .15s; }
.task-card:active { cursor: grabbing; }
.task-card.dragging { opacity: 0.4; transform: scale(0.97); cursor: grabbing; }
.task-column { transition: background-color .15s, outline .15s; }
.task-column.drop-target { background: var(--blue-50); outline: 2px dashed var(--blue-500); outline-offset: -4px; }
.task-card .task-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.dot-status { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.task-note-snippet { margin-top: 6px; font-size: 11.5px; color: var(--slate-500); line-height: 1.4; }

/* Écran To do (Idées + kanban) */
.todo-section { margin-bottom: 30px; }
.todo-section:last-child { margin-bottom: 0; }
.todo-section-title {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--slate-700); margin-bottom: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.todo-section-title svg { width: 16px; height: 16px; color: var(--slate-400); flex-shrink: 0; }
.todo-section-title .count-pill { font-size: 11px; font-weight: 700; color: var(--slate-600); background: var(--slate-100); border-radius: 20px; padding: 2px 9px; }
.idea-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.idea-card {
  position: relative; background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 12px; padding: 16px; cursor: pointer;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04); transition: all .15s;
}
.idea-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.08); border-color: var(--slate-300); }
.idea-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; padding-right: 104px; color: var(--slate-900); line-height: 1.35; }
.idea-card p { font-size: 12.5px; color: var(--slate-600); line-height: 1.5; }
.idea-card .meta { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.idea-card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
.idea-act {
  font-family: inherit; font-size: 11px; font-weight: 600;
  border-radius: 7px; padding: 4px 8px; cursor: pointer; transition: all .15s;
  border: 1px solid; display: inline-flex; align-items: center; gap: 4px;
}
.idea-classify { color: var(--teal-700); background: var(--teal-100); border-color: var(--teal-100); }
.idea-classify:hover { background: var(--teal-600); color: var(--white); border-color: var(--teal-600); }
.idea-promote { color: var(--blue-700); background: var(--blue-50); border-color: var(--blue-100); }
.idea-promote:hover { background: var(--blue-700); color: var(--white); border-color: var(--blue-700); }
.ai-reason {
  font-size: 13px; color: var(--slate-700); line-height: 1.5;
  padding: 10px 12px; background: var(--blue-50); border: 1px solid var(--blue-100);
  border-radius: 8px; margin-bottom: 16px;
}

/* Stratégie globale — Hub d'encarts (mosaïque) */
.hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; grid-auto-flow: dense; align-items: start; }
.encart {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 14px;
  padding: 18px; cursor: pointer; box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  transition: all .15s; display: flex; flex-direction: column; min-height: 128px;
}
.encart:hover { box-shadow: 0 8px 22px rgba(15,23,42,0.09); border-color: var(--slate-300); transform: translateY(-2px); }
.encart-lg { grid-column: span 2; }
.encart-title { font-size: 15px; font-weight: 700; color: var(--slate-900); margin-bottom: 8px; letter-spacing: -0.01em; }
.encart .encart-text { font-size: 13px; color: var(--slate-600); line-height: 1.55; white-space: pre-wrap; flex: 1; }
.encart-empty { font-size: 12.5px; color: var(--slate-400); font-style: italic; flex: 1; }
.encart-badge { margin-top: 12px; align-self: flex-start; font-size: 11px; font-weight: 700; color: var(--blue-700); background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 20px; padding: 2px 10px; }
/* Modale d'édition d'un encart */
.encart-modal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.encart-name { flex: 1; font-family: inherit; font-size: 18px; font-weight: 700; color: var(--slate-900); border: none; background: transparent; padding: 4px 6px; border-radius: 6px; letter-spacing: -0.01em; }
.encart-name:hover { background: var(--slate-50); }
.encart-name:focus { outline: none; background: var(--slate-50); box-shadow: 0 0 0 2px var(--blue-100); }
.encart-size-btn { border: 1px solid var(--slate-200); background: var(--white); border-radius: 7px; font-family: inherit; font-size: 11px; font-weight: 600; color: var(--slate-600); cursor: pointer; padding: 5px 10px; white-space: nowrap; flex-shrink: 0; }
.encart-size-btn:hover { border-color: var(--blue-500); color: var(--blue-700); }
.encart-text-edit { width: 100%; min-height: 160px; resize: vertical; border: 1px solid var(--slate-200); border-radius: 8px; padding: 12px; font-family: inherit; font-size: 13.5px; line-height: 1.6; color: var(--slate-700); }
.encart-text-edit:focus { outline: none; border-color: var(--blue-500); }
.encart-apports { margin-top: 16px; }
.contrib-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-400); font-weight: 700; margin-bottom: 8px; }
.contrib { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 8px; margin-bottom: 6px; }
.contrib-main { flex: 1; min-width: 0; }
.contrib-main .ct { font-size: 13px; font-weight: 600; color: var(--slate-900); }
.contrib-main .cb { font-size: 12.5px; color: var(--slate-600); line-height: 1.5; margin-top: 2px; white-space: pre-wrap; }
.contrib-main .cm { font-size: 10.5px; color: var(--slate-400); margin-top: 5px; }
.contrib-acts { display: flex; gap: 4px; flex-shrink: 0; }
.contrib-acts button {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 6px;
  font-family: inherit; font-size: 11px; font-weight: 600; color: var(--slate-600);
  cursor: pointer; padding: 3px 8px; transition: all .15s; white-space: nowrap;
}
.contrib-acts button:hover { border-color: var(--blue-500); color: var(--blue-700); }

/* Roadmap — frise chronologique */
.roadmap-frise { display: flex; gap: 0; overflow-x: auto; padding: 8px 4px 16px; min-height: 380px; }
.roadmap-col { flex: 0 0 170px; padding: 0 10px; border-right: 1px dashed var(--slate-200); }
.roadmap-col:last-child { border-right: none; }
.roadmap-col-head {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--slate-500); font-weight: 700; padding: 10px 0 12px;
  border-bottom: 2px solid var(--slate-200); margin-bottom: 14px; text-align: center;
}
.roadmap-col.is-current .roadmap-col-head { color: var(--blue-700); border-bottom-color: var(--blue-500); }
.roadmap-col.is-future .roadmap-col-head { color: var(--slate-400); border-bottom-style: dashed; }
.roadmap-items { display: flex; flex-direction: column; gap: 8px; }
.roadmap-item {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 8px;
  padding: 8px 10px; cursor: pointer; transition: all .15s;
  font-size: 12.5px; line-height: 1.35; color: var(--slate-700);
}
.roadmap-item:hover { border-color: var(--blue-500); box-shadow: 0 4px 12px rgba(15,23,42,0.08); transform: translateY(-1px); }
.roadmap-item.is-done { background: var(--teal-100); border-color: var(--teal-100); color: var(--teal-700); }
.roadmap-item.is-doing { background: var(--blue-50); border-color: var(--blue-100); color: var(--blue-700); font-weight: 600; }
.roadmap-item.is-planned { background: var(--white); border-style: dashed; color: var(--slate-500); }
.roadmap-item-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.roadmap-empty { padding: 60px 24px; text-align: center; color: var(--slate-400); font-size: 13px; line-height: 1.6; }
.rm-detail-head { display: flex; align-items: center; gap: 12px; }
.rm-detail-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 20px; }
.rm-detail-status.is-done { background: var(--teal-100); color: var(--teal-700); }
.rm-detail-status.is-doing { background: var(--blue-50); color: var(--blue-700); }
.rm-detail-status.is-planned { background: var(--slate-100); color: var(--slate-600); }
.rm-detail-month { font-size: 12px; color: var(--slate-500); font-weight: 600; letter-spacing: 0.02em; }
.rm-detail-body { font-size: 14px; color: var(--slate-700); line-height: 1.65; white-space: pre-wrap; margin: 12px 0 22px; padding: 14px 16px; background: var(--slate-50); border-left: 3px solid var(--blue-500); border-radius: 4px; }
.rm-detail-empty { font-size: 13px; color: var(--slate-400); font-style: italic; margin: 12px 0 22px; padding: 14px 16px; background: var(--slate-50); border: 1px dashed var(--slate-200); border-radius: 8px; text-align: center; }
.todo-empty-zone {
  font-size: 13px; color: var(--slate-500); padding: 22px 18px;
  background: var(--slate-50); border: 1px dashed var(--slate-200);
  border-radius: 12px; line-height: 1.6;
}
.todo-section-controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.lens-toggle { display: inline-flex; background: var(--slate-100); border-radius: 8px; padding: 3px; gap: 2px; }
.lens-toggle button { border: none; background: transparent; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--slate-500); padding: 5px 11px; border-radius: 6px; cursor: pointer; transition: all .15s; }
.lens-toggle button.active { background: var(--white); color: var(--blue-700); box-shadow: 0 1px 2px rgba(15,23,42,0.08); }
.btn-sm { padding: 6px 11px; font-size: 12px; }
#idea-link-btn.active { background: var(--teal-600); color: var(--white); }
.idea-canvas-wrap {
  position: relative; height: 480px; border: 1px solid var(--slate-200);
  border-radius: 12px; overflow: hidden; background-color: var(--white);
  background-image: radial-gradient(circle at 1px 1px, var(--slate-200) 1px, transparent 0);
  background-size: 22px 22px;
}
.idea-canvas-wrap canvas { width: 100%; height: 100%; display: block; cursor: grab; }
.idea-canvas-wrap canvas:active { cursor: grabbing; }
.idea-canvas-hint {
  position: absolute; bottom: 10px; left: 12px; font-size: 11px; color: var(--slate-500);
  background: rgba(255,255,255,0.85); padding: 4px 9px; border-radius: 6px; pointer-events: none;
}
.idea-canvas-empty {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  text-align: center; color: var(--slate-400); font-size: 13px; padding: 24px; pointer-events: none;
}

/* Prospects table */
table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; border: 1px solid var(--slate-200); }
th { background: var(--blue-700); color: var(--white); text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; }
td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--slate-100); color: var(--slate-700); }
tr:hover td { background: var(--blue-50); }
.status-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.status-contact { background: var(--blue-100); color: var(--blue-700); }
.status-demo { background: var(--orange-100); color: var(--orange-600); }
.status-nego { background: #EDE9FE; color: #7C3AED; }
.status-client { background: var(--teal-100); color: var(--teal-700); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none;
  align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 16px; padding: 24px; width: 480px; max-width: 90vw;
  max-height: 85vh; overflow: auto; box-shadow: 0 24px 48px rgba(15,23,42,0.2);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--slate-600); margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--slate-200); border-radius: 8px;
  font-family: inherit; font-size: 13px; color: var(--slate-900);
}
.field textarea { resize: vertical; min-height: 80px; }

<script>
// ============ ÉTAT & PERSISTANCE ============
const STORE_KEY = 'cpts_pilot_cockpit_v1';
let state = {
  nodes: [],      // {id, label, category, type, description, x, y}
  links: [],      // {source, target}
  notes: [],      // {id, title, body, category, links:[noteIds]}
  tasks: [],      // {id, title, category, status}
  strategie: [],  // {id, title, body}
  prospects: [],  // {id, nom, contact, statut, notes}
  today: { intention: '', date: '' }  // intention du jour + date à laquelle elle a été posée
};

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { console.warn('Pas de données sauvegardées'); }
  if (!state.nodes) state.nodes = [];
  if (!state.links) state.links = [];
  if (!state.notes) state.notes = [];
  if (!state.tasks) state.tasks = [];
  if (!state.strategie) state.strategie = [];
  if (!state.prospects) state.prospects = [];
  if (!state.today) state.today = { intention: '', date: '' };
  if (!Array.isArray(state.roadmap)) state.roadmap = [];
  // Stratégie globale en piliers (par section)
  if (!state.strategiePillars) state.strategiePillars = {};
  ['vision','marche','pricing'].forEach(s => { if (!Array.isArray(state.strategiePillars[s])) state.strategiePillars[s] = []; });
  if (!state.strategieSeeded) {
    const defaults = {
      vision: ['Notre cap', 'Pour qui', 'Pourquoi maintenant'],
      marche: ['Cibles prioritaires', 'Canaux', 'Arguments clés'],
      pricing: ['Modèle', 'Offres', 'Logique tarifaire']
    };
    Object.keys(defaults).forEach(s => {
      if (state.strategiePillars[s].length === 0)
        state.strategiePillars[s] = defaults[s].map(name => ({ id: uid(), name, text: '', contributions: [] }));
    });
    // Migration des anciens éléments plats vers le 1er pilier de leur section
    if (Array.isArray(state.strategie) && state.strategie.length) {
      state.strategie.forEach(it => {
        const sec = state.strategiePillars[it.section] ? it.section : 'vision';
        const p = state.strategiePillars[sec][0];
        if (p) p.contributions.push({ id: uid(), title: it.title, body: it.body || '', from: 'import', date: '' });
      });
      state.strategie = [];
    }
    state.strategieSeeded = true;
  }
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e) { alert('Erreur de sauvegarde'); }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ============ NAVIGATION ============
let currentView = 'today';
const titles = {
  today:'Aujourd\'hui',
  graph:'Architecture du code',
  roadmap:'Roadmap produit',
  monitoring:'Monitoring',
  todo:'To do',
  'strat-vision':'Stratégie — Vision',
  idees:'Stratégie — Idées',
  'strat-marche':'Stratégie — Prise de marché',
  'strat-pricing':'Stratégie — Tarification',
  'clients-valides':'Clients validés',
  'clients-prospects':'Prospects CPTS',
  communication:'Communication'
};

// Recherche : vues filtrables + placeholders
let searchQuery = '';
const searchPlaceholders = {
  todo: 'Rechercher une tâche…',
  idees: 'Rechercher une idée…',
  'clients-valides': 'Rechercher un client…',
  'clients-prospects': 'Rechercher une CPTS, un contact…'
};

document.querySelectorAll('.nav-item, .nav-subitem').forEach(item => {
  item.addEventListener('click', () => goTo(item.dataset.view));
});
document.querySelectorAll('.nav-group-header').forEach(h => {
  h.addEventListener('click', () => h.closest('.nav-group').classList.toggle('collapsed'));
});

function updateSearch(value) {
  searchQuery = value;
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('has-value', !!value);
  render();
  const input = document.getElementById('search-input');
  if (input && document.activeElement !== input) {
    input.focus();
    input.setSelectionRange(value.length, value.length);
  }
}

function clearSearch() {
  searchQuery = '';
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  document.getElementById('search-bar').classList.remove('has-value');
  render();
}

// Raccourcis clavier : "/" pour focus la recherche, "N" pour capture rapide, "Esc" pour fermer/vider
document.addEventListener('keydown', e => {
  const isTyping = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  const modalOpen = document.getElementById('modal-overlay').classList.contains('open');
  if (e.key === '/' && !isTyping && searchPlaceholders[currentView]) {
    e.preventDefault();
    const input = document.getElementById('search-input');
    if (input) input.focus();
  } else if ((e.key === 'n' || e.key === 'N') && !isTyping && !modalOpen) {
    e.preventDefault();
    openQuickCapture();
  } else if (e.key === 'Escape') {
    if (modalOpen) { closeModal(); return; }
    const input = document.getElementById('search-input');
    if (document.activeElement === input) {
      if (searchQuery) clearSearch();
      else input.blur();
    }
  }
});

const catLabel = { tech:'Technique', commercial:'Commercial', strategie:'Stratégie' };
const catClass = { tech:'tag-tech', commercial:'tag-commercial', strategie:'tag-strategie' };

function render() {
  const content = document.getElementById('content');
  const actions = document.getElementById('view-actions');
  content.innerHTML = '';
  actions.innerHTML = '';

  // Sync la barre de recherche selon la vue
  const searchBar = document.getElementById('search-bar');
  const searchInput = document.getElementById('search-input');
  if (searchPlaceholders[currentView]) {
    searchBar.classList.add('visible');
    searchInput.placeholder = searchPlaceholders[currentView];
    if (searchInput.value !== searchQuery) searchInput.value = searchQuery;
    searchBar.classList.toggle('has-value', !!searchQuery);
  } else {
    searchBar.classList.remove('visible', 'has-value');
    searchInput.value = '';
  }

  if (currentView === 'today') renderToday(content, actions);
  else if (currentView === 'graph') renderGraph(content, actions);
  else if (currentView === 'roadmap') renderRoadmap(content, actions);
  else if (currentView === 'monitoring') renderPlaceholder(content, actions, 'monitoring');
  else if (currentView === 'todo') renderTodo(content, actions);
  else if (currentView === 'idees') renderIdees(content, actions);
  else if (currentView === 'strat-vision') renderStrategie(content, actions, 'vision');
  else if (currentView === 'strat-marche') renderStrategie(content, actions, 'marche');
  else if (currentView === 'strat-pricing') renderStrategie(content, actions, 'pricing');
  else if (currentView === 'clients-valides') renderProspects(content, actions, 'clients');
  else if (currentView === 'clients-prospects') renderProspects(content, actions, 'prospects');
  else if (currentView === 'communication') renderPlaceholder(content, actions, 'communication');
}

function goTo(view) {
  document.querySelectorAll('.nav-item, .nav-subitem').forEach(i => i.classList.toggle('active', i.dataset.view === view));
  // Déplie le groupe contenant la sous-vue active
  const active = document.querySelector('.nav-subitem.active');
  if (active) { const g = active.closest('.nav-group'); if (g) g.classList.remove('collapsed'); }
  currentView = view;
  searchQuery = '';  // reset à chaque changement de vue
  document.getElementById('view-title').textContent = titles[view] || '';
  render();
}

// Helper : filtre une liste sur plusieurs champs
function matchSearch(item, fields) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return fields.some(f => (f||'').toString().toLowerCase().includes(q));
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function formatRelativeDate(iso) {
  const d = new Date(iso);
  const diffH = Math.floor((Date.now() - d.getTime()) / 3600000);
  if (diffH < 1) return 'il y a moins d\'1h';
  if (diffH < 24) return 'il y a ' + diffH + 'h';
  const diffD = Math.floor(diffH / 24);
  if (diffD < 7) return 'il y a ' + diffD + 'j';
  return 'le ' + d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

// ============ VUE GRAPHE (ARCHITECTURE) ============
let graphState = { offsetX: 0, offsetY: 0, scale: 1, dragging: null, panning: false, lastX: 0, lastY: 0 };

let archData = null;
function renderGraph(content, actions) {
  actions.innerHTML = `
    <button class="btn btn-ghost" onclick="reloadArch()">⟳ Recharger le code</button>
    <button class="btn btn-ghost" onclick="openNodeModal()">+ Nœud manuel</button>
    <button class="btn btn-primary" onclick="toggleLinkMode()" id="link-btn">↔ Relier</button>`;
  content.innerHTML = `
    <canvas id="graph-canvas"></canvas>
    <div class="graph-legend">
      <h4>Architecture du code</h4>
      <div id="legend-content" style="font-size:11px;color:var(--slate-400)">Chargement...</div>
    </div>
    <div class="node-detail" id="node-detail"></div>`;
  const canvas = document.getElementById('graph-canvas');
  loadArch(canvas);
}
function reloadArch() { archData = null; render(); }
async function loadArch(canvas) {
  if (!archData) {
    try {
      const resp = await fetch('architecture.json?t=' + Date.now());
      if (resp.ok) { archData = await resp.json(); buildNodesFromArch(); }
    } catch(e) { console.log('Pas de architecture.json'); }
  }
  updateLegend();
  setupGraph(canvas);
}
function buildNodesFromArch() {
  if (!archData || !archData.modules) return;
  const manual = state.nodes.filter(n => !n.fromArch);
  const arch = [];
  const cx = 480, cy = 340, R = 250, n = archData.modules.length;
  archData.modules.forEach((mod, i) => {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    const size = Math.min(58, 24 + mod.route_count*0.3);
    arch.push({ id:'arch_'+mod.name, label:mod.name, category:mod.category,
      type:mod.route_count+' routes', color:mod.color, radius:size,
      x:cx+Math.cos(a)*R, y:cy+Math.sin(a)*R, fromArch:true,
      routes:mod.routes||[], routeCount:mod.route_count, fileCount:mod.file_count });
  });
  state.nodes = [...arch, ...manual];
}
function updateLegend() {
  const el = document.getElementById('legend-content');
  if (!el) return;
  if (archData && archData.stats) {
    const s = archData.stats;
    const d = new Date(archData.generated_at).toLocaleString('fr-FR');
    el.innerHTML = '<div style="color:var(--slate-700);font-weight:600;margin-bottom:6px">'+s.total_routes+' routes · '+s.total_modules+' modules</div><div style="margin-bottom:8px">'+s.files_scanned+' fichiers scannés</div><div style="color:var(--slate-400);font-size:10px">Généré le '+d+'</div><div style="margin-top:10px;color:var(--slate-400);font-size:10px">Clic sur un module → ses routes<br>Glisser · Molette pour zoomer</div>';
  } else {
    el.innerHTML = '<div style="color:var(--slate-500)">Aucun architecture.json trouvé.<br><br>Lance le script de scan dans ta plateforme et place architecture.json à la racine de Strategy.</div>';
  }
}

let linkMode = false, linkSource = null;
function toggleLinkMode() {
  linkMode = !linkMode; linkSource = null;
  const btn = document.getElementById('link-btn');
  btn.style.background = linkMode ? 'var(--teal-600)' : '';
  btn.style.color = linkMode ? '#fff' : '';
  btn.textContent = linkMode ? '✓ Mode liaison' : '↔ Relier';
}

const catColors = { tech:'#2563EB', commercial:'#0D9488', strategie:'#7C3AED' };

function setupGraph(canvas) {
  const ctx = canvas.getContext('2d');
  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
    draw();
  }
  window.addEventListener('resize', resize);

  function worldToScreen(x, y) {
    return { x: x * graphState.scale + graphState.offsetX, y: y * graphState.scale + graphState.offsetY };
  }
  function screenToWorld(x, y) {
    return { x: (x - graphState.offsetX) / graphState.scale, y: (y - graphState.offsetY) / graphState.scale };
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // Links
    ctx.lineWidth = 1.5 * graphState.scale;
    state.links.forEach(l => {
      const s = state.nodes.find(n => n.id === l.source);
      const t = state.nodes.find(n => n.id === l.target);
      if (!s || !t) return;
      const ss = worldToScreen(s.x, s.y), ts = worldToScreen(t.x, t.y);
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y); ctx.lineTo(ts.x, ts.y);
      ctx.strokeStyle = 'rgba(148,163,184,0.5)';
      ctx.stroke();
    });
    // Nodes
    state.nodes.forEach(n => {
      const p = worldToScreen(n.x, n.y);
      const r = (n.radius || 26) * graphState.scale;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.fillStyle = n.color || catColors[n.category] || '#64748B';
      ctx.fill();
      if (linkSource === n.id) { ctx.lineWidth = 3; ctx.strokeStyle = '#0D9488'; ctx.stroke(); }
      ctx.fillStyle = '#0F172A';
      ctx.font = `600 ${13*graphState.scale}px Manrope, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.label, p.x, p.y + r + 16*graphState.scale);
      ctx.fillStyle = '#fff';
      if (n.fromArch) {
        ctx.font = `700 ${Math.max(11,14*graphState.scale)}px Manrope, sans-serif`;
        ctx.fillText(n.routeCount, p.x, p.y + 5*graphState.scale);
      } else {
        ctx.font = `600 ${12*graphState.scale}px Manrope, sans-serif`;
        ctx.fillText((n.type||'+').charAt(0).toUpperCase(), p.x, p.y + 4*graphState.scale);
      }
    });
  }

  function nodeAt(sx, sy) {
    for (let i = state.nodes.length-1; i>=0; i--) {
      const n = state.nodes[i];
      const p = worldToScreen(n.x, n.y);
      const r = (n.radius || 26) * graphState.scale;
      if (Math.hypot(sx-p.x, sy-p.y) <= r) return n;
    }
    return null;
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const node = nodeAt(mx, my);
    if (linkMode && node) {
      if (!linkSource) { linkSource = node.id; draw(); }
      else if (linkSource !== node.id) {
        const exists = state.links.some(l => (l.source===linkSource&&l.target===node.id)||(l.source===node.id&&l.target===linkSource));
        if (!exists) { state.links.push({source:linkSource, target:node.id}); save(); }
        linkSource = null; draw();
      }
      return;
    }
    if (node) { graphState.dragging = node; }
    else { graphState.panning = true; graphState.lastX = mx; graphState.lastY = my; }
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (graphState.dragging) {
      const w = screenToWorld(mx, my);
      graphState.dragging.x = w.x; graphState.dragging.y = w.y; draw();
    } else if (graphState.panning) {
      graphState.offsetX += mx - graphState.lastX;
      graphState.offsetY += my - graphState.lastY;
      graphState.lastX = mx; graphState.lastY = my; draw();
    }
  });
  canvas.addEventListener('mouseup', e => {
    if (graphState.dragging) { save(); }
    graphState.dragging = null; graphState.panning = false;
  });
  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node) showNodeDetail(node);
  });
  let cs = 0;
  canvas.addEventListener('mousedown', () => { cs = Date.now(); });
  canvas.addEventListener('click', e => {
    if (Date.now() - cs > 200) return;
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node && node.fromArch && !linkMode) showNodeDetail(node);
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = screenToWorld(mx, my);
    graphState.scale *= e.deltaY > 0 ? 0.92 : 1.08;
    graphState.scale = Math.max(0.3, Math.min(3, graphState.scale));
    const after = screenToWorld(mx, my);
    graphState.offsetX += (after.x - before.x) * graphState.scale;
    graphState.offsetY += (after.y - before.y) * graphState.scale;
    draw();
  });
  resize();
}

function showNodeDetail(node) {
  const d = document.getElementById('node-detail');
  if (node.fromArch) {
    let rh = '';
    (node.routes||[]).slice(0,40).forEach(r => {
      const prot = (r.protections||[]).length ? ' · 🔒' : '';
      rh += `<div style="padding:6px 0;border-bottom:1px solid var(--slate-100);font-size:11px"><span style="font-family:monospace;color:var(--blue-700)">${esc(r.path)}</span>${prot}<div style="color:var(--slate-400);font-size:10px">${esc(r.function||'')}() · ${(r.methods||['GET']).join(', ')}</div></div>`;
    });
    const more = (node.routes||[]).length > 40 ? `<div style="color:var(--slate-400);font-size:11px;margin-top:6px">... et ${(node.routes||[]).length-40} autres routes</div>` : '';
    d.innerHTML = `<button class="close" onclick="document.getElementById('node-detail').classList.remove('open')">×</button><h3 style="color:${node.color}">${esc(node.label)}</h3><div style="color:var(--slate-500);font-size:12px;margin-bottom:12px">${node.routeCount} routes · ${node.fileCount} fichiers</div><div style="max-height:300px;overflow:auto">${rh || '<span style="color:var(--slate-400)">Routes non détaillées</span>'}${more}</div>`;
  } else {
    d.innerHTML = `<button class="close" onclick="document.getElementById('node-detail').classList.remove('open')">×</button><h3>${esc(node.label)}</h3><div class="meta" style="margin-bottom:10px;"><span class="tag ${catClass[node.category]||''}">${catLabel[node.category]||node.category}</span><span class="tag" style="background:var(--slate-100);color:var(--slate-600)">${esc(node.type||'')}</span></div><p style="font-size:13px;color:var(--slate-600);line-height:1.6;">${esc(node.description||'Pas de description')}</p><div style="margin-top:14px;display:flex;gap:8px;"><button class="btn btn-ghost" onclick="openNodeModal('${node.id}')">Modifier</button><button class="btn btn-ghost" style="color:var(--red-600)" onclick="deleteNode('${node.id}')">Supprimer</button></div>`;
  }
  d.classList.add('open');
}

function openNodeModal(id) {
  const node = id ? state.nodes.find(n=>n.id===id) : null;
  const m = document.getElementById('modal');
  m.innerHTML = `
    <h2>${node?'Modifier':'Nouveau'} nœud</h2>
    <div class="field"><label>Nom</label><input id="n-label" value="${node?esc(node.label):''}" placeholder="Ex: Route /api/membres"></div>
    <div class="field"><label>Catégorie</label><select id="n-category">
      <option value="tech" ${node?.category==='tech'?'selected':''}>Technique</option>
      <option value="commercial" ${node?.category==='commercial'?'selected':''}>Commercial</option>
      <option value="strategie" ${node?.category==='strategie'?'selected':''}>Stratégie</option>
    </select></div>
    <div class="field"><label>Type</label><input id="n-type" value="${node?esc(node.type||''):''}" placeholder="Ex: Route, Module, Fonctionnalité, Composant"></div>
    <div class="field"><label>Description</label><textarea id="n-desc" placeholder="Détails techniques, rôle, dépendances...">${node?esc(node.description||''):''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveNode('${id||''}')">Enregistrer</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveNode(id) {
  const label = document.getElementById('n-label').value.trim();
  if (!label) return alert('Le nom est requis');
  const data = {
    label, category: document.getElementById('n-category').value,
    type: document.getElementById('n-type').value.trim(),
    description: document.getElementById('n-desc').value.trim()
  };
  if (id) { Object.assign(state.nodes.find(n=>n.id===id), data); }
  else { state.nodes.push({ id: uid(), ...data, x: 200+Math.random()*300, y: 150+Math.random()*200 }); }
  save(); closeModal();
  document.getElementById('node-detail').classList.remove('open');
  render();
}
function deleteNode(id) {
  if (!confirm('Supprimer ce nœud et ses liens ?')) return;
  state.nodes = state.nodes.filter(n=>n.id!==id);
  state.links = state.links.filter(l=>l.source!==id && l.target!==id);

let ideaLens = 'map';
let ideaGraphState = { offsetX: 0, offsetY: 0, scale: 1, dragging: null, panning: false, lastX: 0, lastY: 0 };
let ideaLinkMode = false, ideaLinkSource = null;
let redrawIdeas = null;

function layoutIdeasIfNeeded() {
  const cx = 470, cy = 320;
  let placed = state.notes.filter(n => typeof n.x === 'number' && typeof n.y === 'number').length;
  let changed = false;
  state.notes.forEach(n => {
    if (typeof n.x === 'number' && typeof n.y === 'number') return;
    const k = placed++;
    const ring = 1 + Math.floor(k / 8);
    const ang = (k % 8) * (Math.PI / 4) + ring * 0.5;
    n.x = cx + Math.cos(ang) * 95 * ring;
    n.y = cy + Math.sin(ang) * 72 * ring;
    changed = true;
  });
  if (changed) save();
}

function ideaEdges() {
  const seen = new Set(), edges = [];
  state.notes.forEach(n => {
    (n.links||[]).forEach(tid => {
      if (!state.notes.find(x=>x.id===tid)) return;
      const key = [n.id, tid].sort().join('|');
      if (seen.has(key)) return; seen.add(key);
      edges.push({ source:n.id, target:tid });
    });
  });
  return edges;
}

function linkIdeas(aId, bId) {
  const a = state.notes.find(n=>n.id===aId), b = state.notes.find(n=>n.id===bId);
  if (!a || !b) return;
  a.links = a.links || []; b.links = b.links || [];
  if (!a.links.includes(bId) && !b.links.includes(aId)) { a.links.push(bId); save(); }
}

function setupIdeaGraph(canvas) {
  const ctx = canvas.getContext('2d');
  layoutIdeasIfNeeded();
  const gs = ideaGraphState;
  const R = 30;
  const byId = id => state.notes.find(n => n.id === id);
  function resize() { const r = canvas.parentElement.getBoundingClientRect(); canvas.width = r.width; canvas.height = r.height; draw(); }
  function w2s(x,y) { return { x: x*gs.scale+gs.offsetX, y: y*gs.scale+gs.offsetY }; }
  function s2w(x,y) { return { x: (x-gs.offsetX)/gs.scale, y: (y-gs.offsetY)/gs.scale }; }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth = 1.5*gs.scale; ctx.strokeStyle = 'rgba(148,163,184,0.55)';
    ideaEdges().forEach(e => {
      const s = byId(e.source), t = byId(e.target); if (!s||!t) return;
      const a = w2s(s.x,s.y), b = w2s(t.x,t.y);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    });
    state.notes.forEach(n => {
      const p = w2s(n.x,n.y), r = R*gs.scale;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle = '#3B82F6'; ctx.fill();
      if (ideaLinkSource===n.id) { ctx.lineWidth = 3; ctx.strokeStyle = '#0D9488'; ctx.stroke(); }
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `700 ${13*gs.scale}px Manrope, sans-serif`;
      ctx.fillText(((n.title||'').trim()[0]||'•').toUpperCase(), p.x, p.y);
      ctx.fillStyle = '#0F172A'; ctx.textBaseline = 'alphabetic';
      ctx.font = `600 ${12*gs.scale}px Manrope, sans-serif`;
      const label = (n.title||'').length>22 ? n.title.slice(0,21)+'…' : (n.title||'');
      ctx.fillText(label, p.x, p.y + r + 15*gs.scale);
    });
  }
  function nodeAt(sx,sy) {
    for (let i=state.notes.length-1; i>=0; i--) {
      const n = state.notes[i]; const p = w2s(n.x,n.y);
      if (Math.hypot(sx-p.x, sy-p.y) <= R*gs.scale) return n;
    }
    return null;
  }
  let downAt = 0;
  canvas.onmousedown = e => {
    downAt = Date.now();
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const node = nodeAt(mx,my);
    if (ideaLinkMode && node) {
      if (!ideaLinkSource) { ideaLinkSource = node.id; draw(); }
      else if (ideaLinkSource !== node.id) { linkIdeas(ideaLinkSource, node.id); ideaLinkSource = null; draw(); }
      return;
    }
    if (node) { gs.dragging = node; } else { gs.panning = true; gs.lastX = mx; gs.lastY = my; }
  };
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    if (gs.dragging) { const wld = s2w(mx,my); gs.dragging.x = wld.x; gs.dragging.y = wld.y; draw(); }
    else if (gs.panning) { gs.offsetX += mx-gs.lastX; gs.offsetY += my-gs.lastY; gs.lastX = mx; gs.lastY = my; draw(); }
  };
  canvas.onmouseup = () => { if (gs.dragging) save(); gs.dragging = null; gs.panning = false; };
  canvas.onclick = e => {
    if (Date.now()-downAt > 200 || ideaLinkMode) return;
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node) openNoteModal(node.id);
  };
  canvas.onwheel = e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = s2w(mx,my);
    gs.scale *= e.deltaY>0 ? 0.92 : 1.08; gs.scale = Math.max(0.4, Math.min(2.5, gs.scale));
    const after = s2w(mx,my);
    gs.offsetX += (after.x-before.x)*gs.scale; gs.offsetY += (after.y-before.y)*gs.scale;
    draw();
  };
  redrawIdeas = draw;
  resize();
}

// Drag-and-drop des tâches entre colonnes
function taskDragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}
function taskDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.task-column.drop-target').forEach(c => c.classList.remove('drop-target'));
}
function taskDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function taskDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-target');
  }
}
function taskDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const id = e.dataTransfer.getData('text/plain');
  if (!id) return;
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.status === newStatus) return;
  task.status = newStatus;
  save();
  render();
}
function openTaskModal(id) {
  const task = id ? state.tasks.find(t=>t.id===id) : null;
  const m = document.getElementById('modal');
  m.innerHTML = `

    <div class="field"><label>Statut</label><select id="task-status">

      <option value="doing" ${task?.status==='doing'?'selected':''}>En cours</option>
      <option value="done" ${task?.status==='done'?'selected':''}>Terminé</option>
    </select></div>
    <div class="field"><label>Détails (optionnel)</label><textarea id="task-body" style="min-height:90px">${task?esc(task.body||''):''}</textarea></div>
    <div class="modal-actions">
      ${task?`<button class="btn btn-ghost" style="color:var(--red-600);margin-right:auto" onclick="deleteTask('${id}')">Supprimer</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>

function saveTask(id) {

function openEncartModal(section, pid) {

function renamePillar(section, pid, name) {
  const p = findPillar(section, pid); if (!p) return;
  p.name = name.trim() || 'Encart'; save();
}
function savePillarText(section, pid, text) {
  const p = findPillar(section, pid); if (!p) return;
  p.text = text; save();
}
function toggleEncartSize(section, pid) {
  syncEncartText(section, pid);
  const p = findPillar(section, pid); if (!p) return;
  p.size = p.size === 'large' ? 'normal' : 'large';
  save(); openEncartModal(section, pid);
}
function deleteEncart(section, pid) {
  const p = findPillar(section, pid); if (!p) return;
  const n = (p.contributions||[]).length;
  if (!confirm(`Supprimer l'encart « ${p.name} »${n?` et ses ${n} apport(s)`:''} ?`)) return;
  state.strategiePillars[section] = state.strategiePillars[section].filter(x=>x.id!==pid);

}
function syncEncartText(section, pid) {
  const ta = document.getElementById('encart-text');
  if (!ta) return;
  const p = findPillar(section, pid); if (p) p.text = ta.value;
}
function integrateContrib(section, pid, cid) {
  syncEncartText(section, pid);
  const p = findPillar(section, pid); if (!p) return;
  const c = (p.contributions||[]).find(x=>x.id===cid); if (!c) return;
  const add = (c.title ? c.title : '') + (c.body ? (c.title?' : ':'') + c.body : '');
  p.text = (p.text ? p.text.trimEnd() + '\n\n' : '') + add;
  p.contributions = p.contributions.filter(x=>x.id!==cid);
  save();
  if (document.getElementById('encart-text')) openEncartModal(section, pid); else render();

const roadmapStatusLabel = { done: 'Livré', doing: 'En cours', planned: 'À venir' };
const roadmapStatusDot = { done: 'var(--teal-600)', doing: 'var(--blue-500)', planned: 'var(--slate-400)' };
const MONTH_FR = ['Janv.', 'Févr.', 'Mars', 'Avril', 'Mai', 'Juin', 'Juil.', 'Août', 'Sept.', 'Oct.', 'Nov.', 'Déc.'];
function monthLabel(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return MONTH_FR[parseInt(mo, 10) - 1] + ' ' + y.slice(2);
}
function expandMonths(start, end, extraFuture) {
  if (!start) return [];
  let [cy, cm] = start.split('-').map(Number);
  const [ey, em] = end.split('-').map(Number);
  const arr = [];
  let safety = 60;
  while (safety-- > 0) {
    arr.push(`${cy}-${String(cm).padStart(2, '0')}`);
    if (cy === ey && cm === em) break;
    cm++; if (cm > 12) { cm = 1; cy++; }
  }
  for (let i = 0; i < extraFuture; i++) {
    cm++; if (cm > 12) { cm = 1; cy++; }
    arr.push(`${cy}-${String(cm).padStart(2, '0')}`);
  }
  return arr;
}
function renderRoadmap(content, actions) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="openRoadmapItemModal()">+ Jalon</button>`;
  const items = (state.roadmap || []).slice();
  if (items.length === 0) {
    content.innerHTML = `<div class="panel"><div class="roadmap-empty">
      Aucun jalon. Clique « + Jalon » pour ajouter une étape — ou ouvre Réglages → « Charger la synthèse plateforme » pour pré-remplir depuis Plateforme-CPTS.
    </div></div>`;
    return;
  }
  const months = [...new Set(items.map(i => i.month).filter(Boolean))].sort();
  const today = new Date().toISOString().slice(0, 7);
  const start = months[0] || today;
  const end = months[months.length - 1] >= today ? months[months.length - 1] : today;
  const allMonths = expandMonths(start, end, 4);
  let html = '<div class="panel" style="max-width:none"><div class="roadmap-frise">';
  allMonths.forEach(m => {
    const colItems = items.filter(i => i.month === m);
    let klass = '';
    if (m === today) klass = 'is-current';
    else if (m > today) klass = 'is-future';
    html += `<div class="roadmap-col ${klass}">
      <div class="roadmap-col-head">${monthLabel(m)}</div>
      <div class="roadmap-items">`;
    colItems.forEach(i => {
      const st = i.status || 'planned';
      html += `<div class="roadmap-item is-${st}" onclick="openRoadmapDetail('${i.id}')" title="${roadmapStatusLabel[st] || ''}">
        <span class="roadmap-item-dot" style="background:${roadmapStatusDot[st]}"></span>${esc(i.title)}

    });
    html += '</div></div>';
  });
  html += '</div></div>';
  content.innerHTML = html;

// ============ BACKUP GITHUB ============
const GH_CONFIG_KEY = 'cpts_github_config';
const BACKUP_INTERVAL_MS = 6 * 3600 * 1000;  // 6h
const BACKUP_PATH = 'backups/cockpit-latest.json';
let backupInterval = null;

function getGhConfig() {
  try { return JSON.parse(localStorage.getItem(GH_CONFIG_KEY) || '{}'); }
  catch { return {}; }
}
function setGhConfig(c) { localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(c)); }

// Encodage UTF-8 → base64 (gère les caractères accentués)
function utf8ToBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

async function backupToGithub(silent) {
  const cfg = getGhConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    if (!silent) alert('Backup non configuré. Clique sur "Backup Github" pour le configurer.');
    return false;
  }
  const branch = cfg.branch || 'main';
  const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${BACKUP_PATH}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  try {
    // 1. Récupère le SHA actuel (si le fichier existe déjà)
    let sha = null;
    const getResp = await fetch(`${apiUrl}?ref=${branch}`, { headers });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
    } else if (getResp.status !== 404) {
      const err = await getResp.json().catch(() => ({}));
      throw new Error(err.message || `Lecture impossible (${getResp.status})`);
    }
    // 2. Prépare le snapshot
    const snapshot = {
      version: 1,
      exportedAt: new Date().toISOString(),
      origin: silent ? 'auto-backup' : 'manual-backup',
      data: state
    };
    const body = {
      message: `Backup cockpit ${new Date().toLocaleString('fr-FR')}`,
      content: utf8ToBase64(JSON.stringify(snapshot, null, 2)),
      branch
    };
    if (sha) body.sha = sha;
    // 3. PUT
    const putResp = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({}));
      throw new Error(err.message || `Échec (${putResp.status})`);
    }
    cfg.lastBackup = new Date().toISOString();
    cfg.lastError = null;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('✓ Backup réussi sur Github');
    return true;
  } catch (e) {
    cfg.lastError = e.message;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('Erreur backup : ' + e.message);
    return false;
  }
}

async function doManualBackup() {
  const cfg = getGhConfig();
  if (!cfg.token) { openGhConfigModal(); return; }
  const btn = document.getElementById('manual-backup-btn');
  if (btn) { btn.disabled = true; btn.textContent = '… sauvegarde en cours'; }
  await backupToGithub(false);
  if (btn) { btn.disabled = false; btn.textContent = '↑ Sauvegarder maintenant'; }
}

function startAutoBackup() {
  if (backupInterval) clearInterval(backupInterval);
  const cfg = getGhConfig();
  if (!cfg.token) return;
  backupInterval = setInterval(() => backupToGithub(true), BACKUP_INTERVAL_MS);
}

function updateBackupStatus() {
  const el = document.getElementById('backup-status');
  if (!el) return;
  const cfg = getGhConfig();
  let dot, text, title = '';
  if (!cfg.token) { dot = 'var(--slate-500)'; text = 'Backup non configuré'; }
  else if (cfg.lastError) { dot = 'var(--red-600)'; text = 'Erreur de backup'; title = cfg.lastError; }
  else if (cfg.lastBackup) {
    dot = 'var(--teal-600)'; text = 'Sauvegardé ' + formatRelativeDate(cfg.lastBackup);
    title = 'Dernier backup : ' + new Date(cfg.lastBackup).toLocaleString('fr-FR') + '\nProchain backup auto dans 6h';
  }
  else { dot = 'var(--orange-600)'; text = 'Premier backup en attente'; }
  el.innerHTML = `<span class="status-dot" style="background:${dot}"></span><span class="bs-text">${text}</span>`;
  el.title = title;
}

async function saveGhConfig() {
  const tokenInput = document.getElementById('gh-token').value.trim();
  const existing = getGhConfig();
  const cfg = {
    token: tokenInput || existing.token || '',
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim() || 'main',
    lastBackup: existing.lastBackup,
    lastError: null
  };
  const status = document.getElementById('gh-status');
  const saveBtn = document.getElementById('gh-save-btn');
  status.style.display = 'block';
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    status.textContent = 'Tous les champs sont requis (token + owner + repo).';
    status.style.color = 'var(--red-600)';
    return;
  }
  status.style.color = 'var(--slate-600)';
  status.textContent = 'Test de la connexion Github…';
  saveBtn.disabled = true;
  try {
    const resp = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {
      headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `Repo introuvable ou token invalide (${resp.status})`);
    }
    setGhConfig(cfg);
    status.textContent = 'Connexion OK. Premier backup en cours…';
    const ok = await backupToGithub(true);
    if (ok) {
      status.style.color = 'var(--teal-700)';
      status.textContent = '✓ Backup activé. Sauvegarde auto toutes les 6h.';
      startAutoBackup();
      setTimeout(() => { closeModal(); updateBackupStatus(); }, 1500);
    } else {
      const c = getGhConfig();
      status.style.color = 'var(--red-600)';
      status.textContent = '✗ ' + (c.lastError || 'Erreur lors du premier backup');
    }
  } catch (e) {
    status.style.color = 'var(--red-600)';
    status.textContent = '✗ ' + e.message;
  } finally {
    saveBtn.disabled = false;
  }
}

// ============ ASSISTANT IA (classement des idées) ============
const AI_CONFIG_KEY = 'cpts_ai_config';
function getAiConfig() {
  try { return JSON.parse(localStorage.getItem(AI_CONFIG_KEY) || '{}'); }
  catch { return {}; }
}
function setAiConfig(c) { localStorage.setItem(AI_CONFIG_KEY, JSON.stringify(c)); }

// Appel direct à l'API Claude depuis le navigateur. Sortie JSON garantie par structured output.
async function classifyIdea(note, cfgOverride) {
  const cfg = cfgOverride || getAiConfig();
  if (!cfg.key) throw new Error('Assistant IA non configuré');
  const SYSTEM = `Tu es l'assistant de classement du cockpit de pilotage de CPTS Pilot (un logiciel pour les CPTS — Communautés Professionnelles Territoriales de Santé). On te donne une « idée » (note libre). Choisis sa destination.
Deux chemins :
- Si l'idée est une ACTION concrète à réaliser → destination "tache" (elle ira dans le tableau To do).
- Si l'idée est une INTUITION / orientation stratégique déjà mûre → range-la directement dans la stratégie : "vision" (cap, raison d'être, long terme), "marche" (prise de marché : cibles, canaux, go-to-market), ou "pricing" (modèle de prix, offres).
- Si rien ne colle vraiment → "idee" (la garder en l'état).
reason : une phrase courte (max 15 mots) en français justifiant le choix.
Réponds uniquement via le schéma fourni.`;
  const SCHEMA = {
    type: 'object',
    properties: {
      destination: { type: 'string', enum: ['vision', 'marche', 'pricing', 'tache', 'idee'] },
      reason: { type: 'string' }
    },
    required: ['destination', 'reason'],
    additionalProperties: false
  };
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': cfg.key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: cfg.model || 'claude-haiku-4-5',
      max_tokens: 400,
      system: [{ type: 'text', text: SYSTEM, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: `Titre : ${note.title}\n\nContenu : ${note.body || '(vide)'}` }],
      output_config: { format: { type: 'json_schema', schema: SCHEMA } }
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erreur API (${resp.status})`);
  }
  const data = await resp.json();
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  try { return JSON.parse(txt); }
  catch { throw new Error('Réponse de l\'IA illisible'); }
}

async function startClassify(noteId, btn) {
  const note = state.notes.find(n => n.id === noteId);
  if (!note) return;

  if (btn) { btn.dataset.old = btn.textContent; btn.textContent = '…'; btn.disabled = true; }
  try {
    const suggestion = await classifyIdea(note);
    openClassifyModal(noteId, suggestion);
  } catch (e) {
    alert('Classement IA impossible : ' + e.message);
    if (btn) { btn.textContent = btn.dataset.old || '✨'; btn.disabled = false; }
  }
}

      <option value="vision" ${dest==='vision'?'selected':''}>Stratégie › Vision</option>
      <option value="marche" ${dest==='marche'?'selected':''}>Stratégie › Prise de marché</option>
      <option value="pricing" ${dest==='pricing'?'selected':''}>Stratégie › Tarification</option>

    </select></div>

function updateClassifyPillars() {
  const dest = document.getElementById('cl-dest').value;
  const field = document.getElementById('cl-pillar-field');
  const sel = document.getElementById('cl-pillar');
  if (['vision','marche','pricing'].includes(dest)) {
    field.style.display = '';

    sel.innerHTML = pillars.length
      ? pillars.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')

function applyClassify(noteId) {
  const note = state.notes.find(n => n.id === noteId);
  if (!note) { closeModal(); return; }
  const dest = document.getElementById('cl-dest').value;
  if (dest === 'tache') { closeModal(); promoteNote(noteId); return; }
  if (dest === 'idee') { closeModal(); return; }
  const pillarId = document.getElementById('cl-pillar').value;
  closeModal();
  fileIdeaToStrategy(noteId, dest, pillarId);
}
function shortDate() { return new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'short' }); }
function fileIdeaToStrategy(noteId, section, pillarId) {
  const note = state.notes.find(n => n.id === noteId);
  if (!note) return;
  state.strategiePillars[section] = state.strategiePillars[section] || [];
  let p = state.strategiePillars[section].find(x => x.id === pillarId) || state.strategiePillars[section][0];
  if (!p) { p = { id: uid(), name: 'Apports', text: '', contributions: [] }; state.strategiePillars[section].push(p); }
  p.contributions = p.contributions || [];
  p.contributions.push({ id: uid(), title: note.title, body: note.body || '', from: 'idée', date: shortDate() });
  state.notes = state.notes.filter(n => n.id !== noteId);
  state.notes.forEach(n => { if (n.links) n.links = n.links.filter(l => l !== noteId); });
  save(); render();
}

// ============ SYNTHÈSE PLATEFORME (seed JSON + roadmap.json dynamique) ============
// Décodage base64 UTF-8 propre (les contenus français contiennent des accents)
function b64ToUtf8(b64) {
  const bin = atob((b64 || '').replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
// Lit Plateforme-CPTS/roadmap.json via l'API GitHub (repo privé → token du backup)
async function fetchDynamicRoadmap() {
  const cfg = getGhConfig();
  if (!cfg.token) return { items: [], note: 'token GitHub non configuré' };
  const owner = cfg.owner || 'Evalita03';
  const url = `https://api.github.com/repos/${owner}/Plateforme-CPTS/contents/roadmap.json?ref=main&t=${Date.now()}`;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) return { items: [], note: 'roadmap.json pas encore créé côté Plateforme-CPTS' };
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); return { items: [], note: `API GitHub : ${e.message || resp.status}` }; }
    const data = await resp.json();
    const text = b64ToUtf8(data.content);
    const parsed = JSON.parse(text);
    return { items: Array.isArray(parsed.items) ? parsed.items : [], updated_at: parsed.updated_at };
  } catch (e) {
    return { items: [], note: 'lecture impossible : ' + e.message };
  }
}

async function loadStrategySeed() {
  if (!confirm('Charger / synchroniser depuis Plateforme-CPTS ?\n\n• Encarts Vision / Prise de marché / Tarification : remplacés par la synthèse (tes éventuelles modifs seront écrasées).\n• Roadmap : jalons historiques + étapes en cours/à venir lues en direct dans Plateforme-CPTS (via ton token GitHub).\n\nContinuer ?')) return;
  try {
    // 1. Seed statique (encarts + jalons historiques) servi par github.io
    const resp = await fetch('strategy-seed.json?t=' + Date.now());
    if (!resp.ok) throw new Error(`strategy-seed.json introuvable (${resp.status})`);
    const seed = await resp.json();

    // 2. Roadmap dynamique en direct depuis Plateforme-CPTS (API GitHub)
    const dyn = await fetchDynamicRoadmap();

    // Encarts
    if (seed.encarts) {
      ['vision', 'marche', 'pricing'].forEach(sec => {
        if (Array.isArray(seed.encarts[sec])) {
          state.strategiePillars[sec] = seed.encarts[sec].map(e => ({
            id: uid(), name: e.name, text: e.text || '',
            size: e.size === 'large' ? 'large' : 'normal',
            contributions: []
          }));
        }
      });
    }
    // Roadmap = historique du seed + items dynamiques (doing/planned/done)
    const seedItems = Array.isArray(seed.roadmap) ? seed.roadmap : [];
    state.roadmap = [...seedItems, ...dyn.items].map(r => ({
      id: uid(),
      title: r.title || '(sans titre)',
      month: r.month || null,
      status: ['done', 'doing', 'planned'].includes(r.status) ? r.status : 'planned',
      body: r.body || ''
    }));

    save(); closeModal(); render();
    let msg = `✓ Synthèse chargée.\n${seedItems.length} jalons historiques`;
    if (dyn.items.length) msg += ` + ${dyn.items.length} en cours / à venir (lus dans Plateforme-CPTS`;
    if (dyn.updated_at) msg += `, mis à jour le ${dyn.updated_at}`;
    if (dyn.items.length) msg += ')';
    if (!dyn.items.length && dyn.note) msg += `\n\nRoadmap dynamique : ${dyn.note}.`;
    alert(msg);
  } catch (e) {
    alert('Chargement impossible : ' + e.message);
  }
}
