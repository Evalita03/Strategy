let archExplorerOpen = false;
let archNav = { module: null, file: null, routeKey: null };
let archQuery = '';

function jss(s) { return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
function getArchModule(name) { return (archData && archData.modules || []).find(m => m.name === name); }
function archFilesOf(mod) {
  const map = {};
  (mod.routes || []).forEach(r => {
    const f = r.file || 'fichier non identifié';
    (map[f] = map[f] || []).push(r);
  });
  return Object.keys(map).map(f => ({ file: f, routes: map[f] })).sort((a, b) => b.routes.length - a.routes.length);
}

function openArchExplorer(moduleName) {
  archExplorerOpen = true;
  archQuery = '';
  archNav = { module: moduleName || null, file: null, routeKey: null };
  renderArchExplorer();
}
function closeArchExplorer() {
  archExplorerOpen = false;
  const mount = document.getElementById('arch-explorer-mount');
  if (mount) mount.innerHTML = '';
}
function archGoHome() { archNav = { module: null, file: null, routeKey: null }; renderArchExplorer(); }
function archGoModule(name) { archNav = { module: name, file: null, routeKey: null }; renderArchExplorer(); }
function archGoFile(file) { archNav.file = file; archNav.routeKey = null; renderArchExplorer(); }
function archOpenRoute(moduleName, file, key) {
  archNav = { module: moduleName, file: file, routeKey: key };
  archQuery = '';
  renderArchExplorer();
}
function archSetQuery(q) {
  archQuery = q;
  renderArchExplorerBody();
  renderArchCrumb();
}

function renderArchExplorer() {
  const mount = document.getElementById('arch-explorer-mount');
  if (!mount) return;
  if (!archExplorerOpen) { mount.innerHTML = ''; return; }
  mount.innerHTML = `
    <div class="arch-explorer">
      <div class="arch-exp-head">
        <div class="arch-exp-title">
          <h3>🧭 Explorateur du code</h3>
          <button class="close" onclick="closeArchExplorer()">×</button>
        </div>
        <div class="arch-search">
          <span class="ico">🔍</span>
          <input id="arch-search-input" placeholder="Rechercher une route, un fichier, un module…"
                 value="${esc(archQuery)}" oninput="archSetQuery(this.value)">
        </div>
      </div>
      <div class="arch-crumb" id="arch-crumb"></div>
      <div class="arch-exp-body" id="arch-exp-body"></div>
    </div>`;
  renderArchCrumb();
  renderArchExplorerBody();
}

function renderArchCrumb() {
  const el = document.getElementById('arch-crumb');
  if (!el) return;
  if (archQuery) { el.innerHTML = `<span class="here">Résultats pour « ${esc(archQuery)} »</span>`; return; }
  let parts = [`<a onclick="archGoHome()">Architecture</a>`];
  if (archNav.module) {
    if (archNav.file || archNav.routeKey) parts.push(`<span class="sep">›</span><a onclick="archGoModule('${jss(archNav.module)}')">${esc(archNav.module)}</a>`);
    else parts.push(`<span class="sep">›</span><span class="here">${esc(archNav.module)}</span>`);
  }
  if (archNav.file) {
    const short = archNav.file.split('/').pop();
    if (archNav.routeKey) parts.push(`<span class="sep">›</span><a onclick="archGoFile('${jss(archNav.file)}')">${esc(short)}</a>`);
    else parts.push(`<span class="sep">›</span><span class="here">${esc(short)}</span>`);
  }
  if (archNav.routeKey) parts.push(`<span class="sep">›</span><span class="here">détail</span>`);
  el.innerHTML = parts.join(' ');
}

function renderArchExplorerBody() {
  const el = document.getElementById('arch-exp-body');
  if (!el) return;
  if (!archData || !archData.modules) {
    el.innerHTML = `<div class="arch-empty">Aucune donnée d'architecture chargée.<br>Clique sur « ⟳ Recharger le code ».</div>`;
    return;
  }
  if (archQuery && archQuery.trim().length >= 1) { el.innerHTML = archSearchHtml(archQuery.trim()); return; }
  if (archNav.routeKey) { el.innerHTML = archRouteHtml(); return; }
  if (archNav.file) { el.innerHTML = archFileHtml(); return; }
  if (archNav.module) { el.innerHTML = archModuleHtml(); return; }
  el.innerHTML = archHomeHtml();
}

function archHomeHtml() {
  const s = archData.stats || {};
  let h = `<div class="arch-note">Ton application est découpée en <b>${(archData.modules||[]).length} modules</b> (${s.total_routes||0} routes au total). Un <b>module</b> est une grande zone fonctionnelle. Clique pour ouvrir ce qu'il contient.</div>`;
  const mods = [...archData.modules].sort((a, b) => (b.route_count||0) - (a.route_count||0));
  mods.forEach(m => {
    const desc = ARCH_MODULE_FR[m.name] || 'Module de l\'application.';
    h += `<div class="arch-row" onclick="archGoModule('${jss(m.name)}')">
      <span class="arch-dot" style="background:${m.color||'#64748B'}"></span>
      <div class="main"><div class="name">${esc(m.name)}</div><div class="sub">${esc(desc)}</div></div>
      <span class="count">${m.route_count||0}</span><span class="chev">›</span></div>`;
  });
  return h;
}

function archModuleHtml() {
  const mod = getArchModule(archNav.module);
  if (!mod) return `<div class="arch-empty">Module introuvable.</div>`;
  const files = archFilesOf(mod);
  const desc = ARCH_MODULE_FR[mod.name] || 'Module de l\'application.';
  let h = `<div class="arch-note"><b>${esc(mod.name)}</b> — ${esc(desc)}<br><br>Il contient <b>${files.length} fichier(s)</b> de code et <b>${mod.route_count||0} routes</b>. Un <b>fichier</b> regroupe des routes qui vont ensemble.</div>`;
  files.forEach(f => {
    const short = f.file.split('/').pop();
    h += `<div class="arch-row" onclick="archGoFile('${jss(f.file)}')">
      <span class="arch-dot" style="background:${mod.color||'#64748B'};border-radius:3px"></span>
      <div class="main"><div class="name">📄 ${esc(short)}</div><div class="sub">${esc(f.file)}</div></div>
      <span class="count">${f.routes.length}</span><span class="chev">›</span></div>`;
  });
  return h;
}

function archFileHtml() {
  const mod = getArchModule(archNav.module);
  if (!mod) return `<div class="arch-empty">Module introuvable.</div>`;
  const routes = (mod.routes || []).filter(r => (r.file || 'fichier non identifié') === archNav.file);
  const short = archNav.file.split('/').pop();
  let h = `<div class="arch-note"><b>${esc(short)}</b> contient <b>${routes.length} route(s)</b>. Une <b>route</b> est une adresse de l'application (une page ou une action). Clique pour voir ce qu'elle fait.</div>`;
  routes.forEach(r => {
    const key = (r.function || '') + '|' + (r.path || '');
    const methods = (r.methods || ['GET']).join(', ');
    const lock = (r.protections || []).length ? ' 🔒' : '';
    h += `<div class="arch-row" onclick="archOpenRoute('${jss(mod.name)}','${jss(archNav.file)}','${jss(key)}')">
      <span class="arch-dot" style="background:${mod.color||'#64748B'};border-radius:50%"></span>
      <div class="main"><div class="name"><code>${esc(r.path||'')}</code>${lock}</div><div class="sub">${esc(r.function||'')}() · ${esc(methods)}</div></div>
      <span class="chev">›</span></div>`;
  });
  return h;
}

function archRouteHtml() {
  const mod = getArchModule(archNav.module);
  if (!mod) return `<div class="arch-empty">Module introuvable.</div>`;
  const r = (mod.routes || []).find(x => ((x.function||'') + '|' + (x.path||'')) === archNav.routeKey
    && (x.file || 'fichier non identifié') === archNav.file);
  if (!r) return `<div class="arch-empty">Route introuvable.</div>`;
  const methods = r.methods || ['GET'];
  const protec = r.protections || [];
  let h = `<div class="arch-note">Voici en clair ce que fait cette route — son adresse, ce qu'elle permet de faire, et qui peut y accéder.</div>`;
  h += `<div class="arch-detail-block"><div class="lbl">Adresse (l'URL)</div><div class="val"><code>${esc(r.path||'')}</code></div></div>`;
  h += `<div class="arch-detail-block"><div class="lbl">Ce qu'elle permet</div><div class="val">`;
  methods.forEach(m => { h += `<div style="margin-bottom:4px"><span class="arch-chip method">${esc(m)}</span> ${esc(ARCH_METHOD_FR[m] || 'Action sur la route')}</div>`; });
  h += `</div></div>`;
  h += `<div class="arch-detail-block"><div class="lbl">Qui peut y accéder</div><div class="val">`;
  if (!protec.length) h += `Accès libre — aucune condition de sécurité détectée.`;
  else protec.forEach(p => { const x = archProtec(p); h += `<div style="margin-bottom:4px"><span class="arch-chip protec">🔒 ${esc(x.label)}</span> ${esc(x.desc)}</div>`; });
  h += `</div></div>`;
  h += `<div class="arch-detail-block"><div class="lbl">Le code qui s'exécute</div><div class="val">Fonction <code>${esc(r.function||'?')}()</code><br>dans le fichier <code>${esc(r.file||'?')}</code></div></div>`;
  return h;
}

function archSearchHtml(q) {
  const ql = q.toLowerCase();
  const modHits = [], routeHits = [];
  (archData.modules || []).forEach(m => {
    if (m.name.toLowerCase().includes(ql)) modHits.push(m);
    (m.routes || []).forEach(r => {
      if ((r.path||'').toLowerCase().includes(ql) || (r.function||'').toLowerCase().includes(ql) || (r.file||'').toLowerCase().includes(ql)) {
        routeHits.push({ m, r });
      }
    });
  });
  if (!modHits.length && !routeHits.length) return `<div class="arch-empty">Rien trouvé pour « ${esc(q)} ».</div>`;
  let h = '';
  if (modHits.length) {
    h += `<div class="arch-cat">Modules (${modHits.length})</div>`;
    modHits.forEach(m => {
      h += `<div class="arch-row" onclick="archGoModule('${jss(m.name)}')">
        <span class="arch-dot" style="background:${m.color||'#64748B'}"></span>
        <div class="main"><div class="name">${esc(m.name)}</div><div class="sub">${esc(ARCH_MODULE_FR[m.name]||'')}</div></div>
        <span class="count">${m.route_count||0}</span><span class="chev">›</span></div>`;
    });
  }
  const shown = routeHits.slice(0, 80);
  if (routeHits.length) {
    h += `<div class="arch-cat">Routes (${routeHits.length}${routeHits.length>80?' · 80 affichées':''})</div>`;
    shown.forEach(({ m, r }) => {
      const key = (r.function || '') + '|' + (r.path || '');
      const file = r.file || 'fichier non identifié';
      const lock = (r.protections || []).length ? ' 🔒' : '';
      h += `<div class="arch-row" onclick="archOpenRoute('${jss(m.name)}','${jss(file)}','${jss(key)}')">
        <span class="arch-dot" style="background:${m.color||'#64748B'};border-radius:50%"></span>
        <div class="main"><div class="name"><code>${esc(r.path||'')}</code>${lock}</div><div class="sub">${esc(m.name)} · ${esc(r.function||'')}()</div></div>
        <span class="chev">›</span></div>`;
    });
  }
  return h;
}

function openNodeModal(id) {
  const node = id ? state.nodes.find(n=>n.id===id) : null;
  const m = document.getElementById('modal');
  m.innerHTML = `
    <h2>${node?'Modifier':'Nouveau'} nœud</h2>
    <div class="field"><label>Nom</label><input id="n-label" value="${node?esc(node.label):''}" placeholder="Ex: Route /api/membres"></div>
    <div class="field"><label>Catégorie</label><select id="n-category">
      <option value="tech" ${node?.category==='tech'?'selected':''}>Technique</option>
      <option value="commercial" ${node?.category==='commercial'?'selected':''}>Commercial</option>
      <option value="strategie" ${node?.category==='strategie'?'selected':''}>Stratégie</option>
    </select></div>
    <div class="field"><label>Type</label><input id="n-type" value="${node?esc(node.type||''):''}" placeholder="Ex: Route, Module, Fonctionnalité, Composant"></div>
    <div class="field"><label>Description</label><textarea id="n-desc" placeholder="Détails techniques, rôle, dépendances...">${node?esc(node.description||''):''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveNode('${id||''}')">Enregistrer</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveNode(id) {
  const label = document.getElementById('n-label').value.trim();
  if (!label) return alert('Le nom est requis');
  const data = {
    label, category: document.getElementById('n-category').value,
    type: document.getElementById('n-type').value.trim(),
    description: document.getElementById('n-desc').value.trim()
  };
  if (id) { Object.assign(state.nodes.find(n=>n.id===id), data); }
  else { state.nodes.push({ id: uid(), ...data, x: 200+Math.random()*300, y: 150+Math.random()*200 }); }
  save(); closeModal();
  document.getElementById('node-detail').classList.remove('open');
  render();
}
function deleteNode(id) {
  if (!confirm('Supprimer ce nœud et ses liens ?')) return;
  state.nodes = state.nodes.filter(n=>n.id!==id);
  state.links = state.links.filter(l=>l.source!==id && l.target!==id);
  save(); document.getElementById('node-detail').classList.remove('open'); render();
}

function renderTodo(content, actions) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="openTaskModal()">+ Tâche</button>`;
  const cols = [
    { key:'todo', label:'À faire', dot:'var(--slate-300)' },
    { key:'doing', label:'En cours', dot:'var(--blue-500)' },
    { key:'done', label:'Terminé', dot:'var(--teal-600)' }
  ];
  const tasks = state.tasks.filter(t => matchSearch(t, [t.title, t.body]));
  if (searchQuery && tasks.length === 0) {
    content.innerHTML = `<div class="panel"><div class="search-empty">Aucune tâche ne contient <strong>« ${esc(searchQuery)} »</strong></div></div>`;
    return;
  }
  let html = '<div class="panel" style="max-width:none"><div class="task-board">';
  cols.forEach(col => {
    const colTasks = tasks.filter(t=>t.status===col.key);
    html += `<div class="task-column" ondragover="taskDragOver(event)" ondragleave="taskDragLeave(event)" ondrop="taskDrop(event,'${col.key}')"><h3><span class="dot-status" style="background:${col.dot}"></span>${col.label}<span class="task-count">${colTasks.length}</span></h3><div class="task-col">`;

let ideaLinkMode = false, ideaLinkSource = null;
let redrawIdeas = null;

function layoutIdeasIfNeeded() {
  const cx = 470, cy = 320;
  let placed = state.notes.filter(n => typeof n.x === 'number' && typeof n.y === 'number').length;
  let changed = false;
  state.notes.forEach(n => {
    if (typeof n.x === 'number' && typeof n.y === 'number') return;
    const k = placed++;
    const ring = 1 + Math.floor(k / 8);
    const ang = (k % 8) * (Math.PI / 4) + ring * 0.5;
    n.x = cx + Math.cos(ang) * 95 * ring;
    n.y = cy + Math.sin(ang) * 72 * ring;
    changed = true;
  });
  if (changed) save();
}

function ideaEdges() {
  const seen = new Set(), edges = [];
  state.notes.forEach(n => {
    (n.links||[]).forEach(tid => {
      if (!state.notes.find(x=>x.id===tid)) return;
      const key = [n.id, tid].sort().join('|');
      if (seen.has(key)) return; seen.add(key);
      edges.push({ source:n.id, target:tid });
    });
  });
  return edges;
}

function linkIdeas(aId, bId) {
  const a = state.notes.find(n=>n.id===aId), b = state.notes.find(n=>n.id===bId);
  if (!a || !b) return;
  a.links = a.links || []; b.links = b.links || [];
  if (!a.links.includes(bId) && !b.links.includes(aId)) { a.links.push(bId); save(); }
}

function setupIdeaGraph(canvas) {
  const ctx = canvas.getContext('2d');
  layoutIdeasIfNeeded();
  const gs = ideaGraphState;
  const R = 30;
  const byId = id => state.notes.find(n => n.id === id);
  function resize() { const r = canvas.parentElement.getBoundingClientRect(); canvas.width = r.width; canvas.height = r.height; draw(); }
  function w2s(x,y) { return { x: x*gs.scale+gs.offsetX, y: y*gs.scale+gs.offsetY }; }
  function s2w(x,y) { return { x: (x-gs.offsetX)/gs.scale, y: (y-gs.offsetY)/gs.scale }; }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth = 1.5*gs.scale; ctx.strokeStyle = 'rgba(148,163,184,0.55)';
    ideaEdges().forEach(e => {
      const s = byId(e.source), t = byId(e.target); if (!s||!t) return;
      const a = w2s(s.x,s.y), b = w2s(t.x,t.y);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    });
    state.notes.forEach(n => {
      const p = w2s(n.x,n.y), r = R*gs.scale;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle = '#3B82F6'; ctx.fill();
      if (ideaLinkSource===n.id) { ctx.lineWidth = 3; ctx.strokeStyle = '#0D9488'; ctx.stroke(); }
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `700 ${13*gs.scale}px Manrope, sans-serif`;
      ctx.fillText(((n.title||'').trim()[0]||'•').toUpperCase(), p.x, p.y);
      ctx.fillStyle = '#0F172A'; ctx.textBaseline = 'alphabetic';
      ctx.font = `600 ${12*gs.scale}px Manrope, sans-serif`;
      const label = (n.title||'').length>22 ? n.title.slice(0,21)+'…' : (n.title||'');
      ctx.fillText(label, p.x, p.y + r + 15*gs.scale);
    });
  }
  function nodeAt(sx,sy) {
    for (let i=state.notes.length-1; i>=0; i--) {
      const n = state.notes[i]; const p = w2s(n.x,n.y);
      if (Math.hypot(sx-p.x, sy-p.y) <= R*gs.scale) return n;
    }
    return null;
  }
  let downAt = 0;
  canvas.onmousedown = e => {
    downAt = Date.now();
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const node = nodeAt(mx,my);
    if (ideaLinkMode && node) {
      if (!ideaLinkSource) { ideaLinkSource = node.id; draw(); }
      else if (ideaLinkSource !== node.id) { linkIdeas(ideaLinkSource, node.id); ideaLinkSource = null; draw(); }
      return;
    }
    if (node) { gs.dragging = node; } else { gs.panning = true; gs.lastX = mx; gs.lastY = my; }
  };
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    if (gs.dragging) { const wld = s2w(mx,my); gs.dragging.x = wld.x; gs.dragging.y = wld.y; draw(); }
    else if (gs.panning) { gs.offsetX += mx-gs.lastX; gs.offsetY += my-gs.lastY; gs.lastX = mx; gs.lastY = my; draw(); }
  };
  canvas.onmouseup = () => { if (gs.dragging) save(); gs.dragging = null; gs.panning = false; };
  canvas.onclick = e => {
    if (Date.now()-downAt > 200 || ideaLinkMode) return;
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node) openNoteModal(node.id);
  };
  canvas.onwheel = e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = s2w(mx,my);
    gs.scale *= e.deltaY>0 ? 0.92 : 1.08; gs.scale = Math.max(0.4, Math.min(2.5, gs.scale));
    const after = s2w(mx,my);
    gs.offsetX += (after.x-before.x)*gs.scale; gs.offsetY += (after.y-before.y)*gs.scale;
    draw();
  };
  redrawIdeas = draw;
  resize();
}

// Drag-and-drop des tâches entre colonnes
function taskDragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}
function taskDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.task-column.drop-target').forEach(c => c.classList.remove('drop-target'));
}
function taskDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function taskDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-target');
  }
}
function taskDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const id = e.dataTransfer.getData('text/plain');
  if (!id) return;
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.status === newStatus) return;
  task.status = newStatus;
  save();
  render();
}

function saveTask(id) {

  pricing: { label:'Tarification',    accent:'rapport', fallback:'Notre rapport au prix, posé clair.',        prompt:'Ton modèle de prix : offres, paliers, logique tarifaire.' }
};
// Marque Mixer : 4 curseurs verticaux, handle 3 en cobalt (cf. docs/brand/README de Plateforme-CPTS)
function mixerMarkSvg() {
  return `<svg class="mixer-mark" viewBox="0 0 60 60" fill="none">
    <line class="track" x1="14" y1="8" x2="14" y2="52"/>
    <line class="track" x1="26" y1="8" x2="26" y2="52"/>
    <line class="track" x1="38" y1="8" x2="38" y2="52"/>
    <line class="track" x1="50" y1="8" x2="50" y2="52"/>
    <rect class="handle" x="10" y="18" width="8" height="8" rx="1.5"/>
    <rect class="handle" x="22" y="30" width="8" height="8" rx="1.5"/>
    <rect class="handle handle-cobalt" x="34" y="10" width="8" height="8" rx="1.5"/>
    <rect class="handle" x="46" y="38" width="8" height="8" rx="1.5"/>
  </svg>`;
}
function getStratTagline(section) {
  const encarts = state.strategiePillars[section] || [];
  const lead = encarts.find(e => e.size === 'large') || encarts[0];
  if (!lead || !lead.text) return stratMeta[section]?.fallback || '';
  const first = lead.text.replace(/«|»/g, '').split(/[.!?]\s/)[0].trim();
  return first.length > 130 ? first.slice(0, 127) + '…' : first;
}
function renderStratHero(section) {
  const meta = stratMeta[section] || {};
  const label = meta.label || '';
  const accent = meta.accent || '';
  // Met l'accent en italique cobalt sur le dernier mot reconnu
  let title = esc(label);
  if (accent) {
    const re = new RegExp('(' + accent.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'i');
    title = esc(label).replace(re, '<span class="accent">$1</span>');
  }
  return `<div class="strat-hero">
    ${mixerMarkSvg()}
    <div class="strat-hero-text">
      <div class="strat-hero-title">${title}</div>
      <div class="strat-hero-tagline">${esc(getStratTagline(section))}</div>
    </div>
  </div>`;
}
const sectionLabels = { vision:'Vision', marche:'Prise de marché', pricing:'Tarification' };
function findPillar(section, pid) { return (state.strategiePillars[section]||[]).find(p=>p.id===pid); }

let expandedGroups = { vision: new Set(), marche: new Set(), pricing: new Set() };

function renderStrategie(content, actions, section) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="addEncart('${section}')">+ Encart</button>`;
  const encarts = state.strategiePillars[section] || [];
  let html = '<div class="panel" style="max-width:1100px">';
  html += renderStratHero(section);
  if (encarts.length === 0) {
    html += `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="10" width="8" height="11" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/></svg>
      <p>Aucun encart. Clique « + Encart » pour composer cette section.</p></div>`;
    html += '</div>';
    content.innerHTML = html;
    return;
  }
  // Regroupement par champ "group" (ou « Sans catégorie » si absent), en préservant l'ordre d'apparition
  const order = [];
  const map = new Map();
  encarts.forEach(p => {
    const g = (p.group || '').trim() || 'Sans catégorie';
    if (!map.has(g)) { map.set(g, []); order.push(g); }
    map.get(g).push(p);
  });
  if (!expandedGroups[section]) expandedGroups[section] = new Set();
  const opened = expandedGroups[section];
  html += `<div class="hub-grid${opened.size?' has-focus':''}">`;
  order.forEach(g => {
    const items = map.get(g);
    const lead = items.find(p => p.size === 'large') || items[0];
    const preview = (lead.text || '').trim().slice(0, 200);
    const isExp = opened.has(g);
    html += `<div class="group-card ${isExp?'is-expanded':''}" data-section="${section}" data-group="${esc(g)}" onclick="toggleGroupFromEl(this)">
      <div class="group-card-head">${esc(g)}</div>
      <div class="group-card-lead">${esc(preview)}${(lead.text||'').length>200?'…':''}</div>
      <div class="group-card-count">${items.length} encart${items.length>1?'s':''} ${isExp?'▴':'▾'}</div>
    </div>`;
    if (isExp) {
      html += `<div class="group-expansion">
        <div class="group-expansion-grid">
          ${items.map(p => renderEncartCard(section, p)).join('')}
        </div>
        <div class="group-expansion-actions">
          <button class="btn btn-ghost btn-sm" data-section="${section}" data-group="${esc(g)}" onclick="event.stopPropagation();addEncartFromGroupEl(this)">+ Encart dans ce groupe</button>
        </div>
      </div>`;
    }
  });
  html += '</div></div>';
  content.innerHTML = html;
}
function renderEncartCard(section, p) {
  const n = (p.contributions||[]).length;

function toggleGroupFromEl(el) {

function mdToHtml(t) {
  let s = esc(t).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  const lines = s.split('\n'); const out = []; let inList = false;
  for (const line of lines) {
    const m = line.match(/^\s*[-•]\s+(.*)$/);
    if (m) { if (!inList) { out.push('<ul>'); inList = true; } out.push('<li>' + m[1] + '</li>'); }
    else { if (inList) { out.push('</ul>'); inList = false; } out.push(line); }
  }
  if (inList) out.push('</ul>');
  return out.join('\n').replace(/\n(?!<\/?(?:ul|li))/g, '<br>').replace(/\n/g, '');
}

function reportFreshness(dateStr) {
  if (!dateStr) return { days: null, label: 'aucune ronde', stale: true };

  if (isNaN(d.getTime())) return { days: null, label: dateStr, stale: false };
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  const label = days <= 0 ? "aujourd'hui" : days === 1 ? 'hier' : 'il y a ' + days + ' jours';
  return { days, label, stale: days > 7 };
}

const roadmapStatusLabel = { done: 'Livré', doing: 'En cours', planned: 'À venir' };
const roadmapStatusDot = { done: 'var(--teal-600)', doing: 'var(--blue-500)', planned: 'var(--slate-400)' };
const MONTH_FR = ['Janv.', 'Févr.', 'Mars', 'Avril', 'Mai', 'Juin', 'Juil.', 'Août', 'Sept.', 'Oct.', 'Nov.', 'Déc.'];
function monthLabel(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return MONTH_FR[parseInt(mo, 10) - 1] + ' ' + y.slice(2);
}
function expandMonths(start, end, extraFuture) {
  if (!start) return [];
  let [cy, cm] = start.split('-').map(Number);
  const [ey, em] = end.split('-').map(Number);
  const arr = [];
  let safety = 60;
  while (safety-- > 0) {
    arr.push(`${cy}-${String(cm).padStart(2, '0')}`);
    if (cy === ey && cm === em) break;
    cm++; if (cm > 12) { cm = 1; cy++; }
  }
  for (let i = 0; i < extraFuture; i++) {
    cm++; if (cm > 12) { cm = 1; cy++; }
    arr.push(`${cy}-${String(cm).padStart(2, '0')}`);
  }
  return arr;
}
function renderRoadmap(content, actions) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="openRoadmapItemModal()">+ Jalon</button>`;
  const items = (state.roadmap || []).slice();
  if (items.length === 0) {
    content.innerHTML = `<div class="panel"><div class="roadmap-empty">
      Aucun jalon. Clique « + Jalon » pour ajouter une étape — ou ouvre Réglages → « Charger la synthèse plateforme » pour pré-remplir depuis Plateforme-CPTS.
    </div></div>`;
    return;
  }
  const months = [...new Set(items.map(i => i.month).filter(Boolean))].sort();
  const today = new Date().toISOString().slice(0, 7);
  const start = months[0] || today;
  const end = months[months.length - 1] >= today ? months[months.length - 1] : today;
  const allMonths = expandMonths(start, end, 4);
  let html = '<div class="panel" style="max-width:none"><div class="roadmap-frise">';
  allMonths.forEach(m => {
    const colItems = items.filter(i => i.month === m);
    let klass = '';
    if (m === today) klass = 'is-current';
    else if (m > today) klass = 'is-future';
    html += `<div class="roadmap-col ${klass}">
      <div class="roadmap-col-head">${monthLabel(m)}</div>
      <div class="roadmap-items">`;
    colItems.forEach(i => {
      const st = i.status || 'planned';
      html += `<div class="roadmap-item is-${st}" onclick="openRoadmapDetail('${i.id}')" title="${roadmapStatusLabel[st] || ''}">
        <span class="roadmap-item-dot" style="background:${roadmapStatusDot[st]}"></span>${esc(i.title)}
      </div>`;
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  content.innerHTML = html;
}

// Encodage UTF-8 → base64 (gère les caractères accentués)
function utf8ToBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

async function backupToGithub(silent) {
  const cfg = getGhConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    if (!silent) alert('Backup non configuré. Clique sur "Backup Github" pour le configurer.');
    return false;
  }
  const branch = cfg.branch || 'main';
  const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${BACKUP_PATH}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  try {
    // 1. Récupère le SHA actuel (si le fichier existe déjà)
    let sha = null;
    const getResp = await fetch(`${apiUrl}?ref=${branch}`, { headers });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
    } else if (getResp.status !== 404) {
      const err = await getResp.json().catch(() => ({}));
      throw new Error(err.message || `Lecture impossible (${getResp.status})`);
    }
    // 2. Prépare le snapshot
    const snapshot = {
      version: 1,
      exportedAt: new Date().toISOString(),
      origin: silent ? 'auto-backup' : 'manual-backup',
      data: state
    };
    const body = {
      message: `Backup cockpit ${new Date().toLocaleString('fr-FR')}`,
      content: utf8ToBase64(JSON.stringify(snapshot, null, 2)),
      branch
    };
    if (sha) body.sha = sha;
    // 3. PUT
    const putResp = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({}));
      throw new Error(err.message || `Échec (${putResp.status})`);
    }
    cfg.lastBackup = new Date().toISOString();
    cfg.lastError = null;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('✓ Backup réussi sur Github');
    return true;
  } catch (e) {
    cfg.lastError = e.message;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('Erreur backup : ' + e.message);
    return false;
  }
}

// Appel direct à l'API Claude depuis le navigateur. Sortie JSON garantie par structured output.
async function classifyIdea(note, cfgOverride) {
  const cfg = cfgOverride || getAiConfig();
  if (!cfg.key) throw new Error('Assistant IA non configuré');
  const SYSTEM = `Tu es l'assistant de classement du cockpit de pilotage de CPTS Pilot (un logiciel pour les CPTS — Communautés Professionnelles Territoriales de Santé). On te donne une « idée » (note libre). Choisis sa destination.
Deux chemins :
- Si l'idée est une ACTION concrète à réaliser → destination "tache" (elle ira dans le tableau To do).
- Si l'idée est une INTUITION / orientation stratégique déjà mûre → range-la directement dans la stratégie : "vision" (cap, raison d'être, long terme), "marche" (prise de marché : cibles, canaux, go-to-market), ou "pricing" (modèle de prix, offres).
- Si rien ne colle vraiment → "idee" (la garder en l'état).
reason : une phrase courte (max 15 mots) en français justifiant le choix.
Réponds uniquement via le schéma fourni.`;
  const SCHEMA = {
    type: 'object',
    properties: {
      destination: { type: 'string', enum: ['vision', 'marche', 'pricing', 'tache', 'idee'] },
      reason: { type: 'string' }
    },
    required: ['destination', 'reason'],
    additionalProperties: false
  };
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': cfg.key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: cfg.model || 'claude-haiku-4-5',
      max_tokens: 400,
      system: [{ type: 'text', text: SYSTEM, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: `Titre : ${note.title}\n\nContenu : ${note.body || '(vide)'}` }],
      output_config: { format: { type: 'json_schema', schema: SCHEMA } }
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erreur API (${resp.status})`);
  }
  const data = await resp.json();
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  try { return JSON.parse(txt); }
  catch { throw new Error('Réponse de l\'IA illisible'); }
}

// ============ SYNTHÈSE PLATEFORME (seed JSON + roadmap.json dynamique) ============
// Décodage base64 UTF-8 propre (les contenus français contiennent des accents)
function b64ToUtf8(b64) {
  const bin = atob((b64 || '').replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
// Lit Plateforme-CPTS/roadmap.json via l'API GitHub (repo privé → token du backup)
async function fetchDynamicRoadmap() {
  const cfg = getGhConfig();
  if (!cfg.token) return { items: [], note: 'token GitHub non configuré' };
  const owner = cfg.owner || 'Evalita03';
  const url = `https://api.github.com/repos/${owner}/Plateforme-CPTS/contents/roadmap.json?ref=main&t=${Date.now()}`;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) return { items: [], note: 'roadmap.json pas encore créé côté Plateforme-CPTS' };
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); return { items: [], note: `API GitHub : ${e.message || resp.status}` }; }
    const data = await resp.json();
    const text = b64ToUtf8(data.content);
    const parsed = JSON.parse(text);
    return { items: Array.isArray(parsed.items) ? parsed.items : [], updated_at: parsed.updated_at };
  } catch (e) {
    return { items: [], note: 'lecture impossible : ' + e.message };
  }
}

// Lit Plateforme-CPTS/strategy.json (encarts Vision/Marché/Tarification, idem roadmap)
async function fetchDynamicStrategy() {
  const cfg = getGhConfig();
  if (!cfg.token) return { encarts: null, note: 'token GitHub non configuré' };
  const owner = cfg.owner || 'Evalita03';
  const url = `https://api.github.com/repos/${owner}/Plateforme-CPTS/contents/strategy.json?ref=main&t=${Date.now()}`;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) return { encarts: null, note: 'strategy.json pas encore créé côté Plateforme-CPTS' };
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); return { encarts: null, note: `API GitHub : ${e.message || resp.status}` }; }
    const data = await resp.json();
    const text = b64ToUtf8(data.content);
    const parsed = JSON.parse(text);
    return { encarts: parsed.encarts || null, updated_at: parsed.updated_at };
  } catch (e) {
    return { encarts: null, note: 'lecture impossible : ' + e.message };
  }
}

async function loadStrategySeed() {
  if (!confirm('Charger / synchroniser depuis Plateforme-CPTS ?\n\n• Encarts Vision / Prise de marché / Tarification : remplacés par la version la plus récente (strategy.json sur Plateforme-CPTS si présent, sinon mon seed statique). Tes éventuelles modifs locales seront écrasées.\n• Roadmap : jalons historiques + étapes en cours/à venir lues en direct dans Plateforme-CPTS.\n\nContinuer ?')) return;
  try {
    // 1. Seed statique (fallback encarts + jalons historiques)
    const resp = await fetch('strategy-seed.json?t=' + Date.now());
    if (!resp.ok) throw new Error(`strategy-seed.json introuvable (${resp.status})`);
    const seed = await resp.json();

    // 2. Lectures dynamiques en parallèle (API GitHub sur Plateforme-CPTS)
    const [dynRoad, dynStrat] = await Promise.all([
      fetchDynamicRoadmap(),
      fetchDynamicStrategy()
    ]);

    // Encarts : strategy.json (live) si dispo, sinon fallback seed
    let dynEncartsCount = 0;
    ['vision', 'marche', 'pricing'].forEach(sec => {
      const live = dynStrat.encarts && Array.isArray(dynStrat.encarts[sec]) ? dynStrat.encarts[sec] : null;
      const fallback = seed.encarts && Array.isArray(seed.encarts[sec]) ? seed.encarts[sec] : null;
      const source = live || fallback;
      if (Array.isArray(source)) {
        state.strategiePillars[sec] = source.map(e => ({
          id: uid(),
          name: e.name,
          text: e.text || '',
          size: e.size === 'large' ? 'large' : 'normal',
          group: (e.group || '').trim(),
          contributions: []
        }));
      }
      if (live) dynEncartsCount += live.length;
    });

    // Roadmap = historique du seed + items dynamiques
    const seedItems = Array.isArray(seed.roadmap) ? seed.roadmap : [];
    state.roadmap = [...seedItems, ...dynRoad.items].map(r => ({
      id: uid(),
      title: r.title || '(sans titre)',
      month: r.month || null,
      status: ['done', 'doing', 'planned'].includes(r.status) ? r.status : 'planned',
      body: r.body || ''
    }));

    save(); closeModal(); render();
    // Message récap : encarts + roadmap, source par source
    let msg = '✓ Synthèse chargée.\n\n';
    msg += 'ENCARTS — ';
    if (dynEncartsCount) {
      msg += `${dynEncartsCount} en direct depuis Plateforme-CPTS`;
      if (dynStrat.updated_at) msg += ` (maj ${dynStrat.updated_at})`;
      msg += '.';
    } else {
      msg += `seed statique (${dynStrat.note || 'fallback'}).`;
    }
    msg += '\nROADMAP — ';
    msg += `${seedItems.length} jalons historiques`;
    if (dynRoad.items.length) {
      msg += ` + ${dynRoad.items.length} en cours/à venir (Plateforme-CPTS`;
      if (dynRoad.updated_at) msg += `, maj ${dynRoad.updated_at}`;
      msg += ').';
    } else if (dynRoad.note) {
      msg += `.\n(roadmap dynamique : ${dynRoad.note})`;
    } else msg += '.';
    alert(msg);
  } catch (e) {
    alert('Chargement impossible : ' + e.message);
  }
}

    if (resp.ok) {
      archData = await resp.json();
      buildNodesFromArch();
      if (currentView === 'today') render();

})();
