<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPTS Pilot — Cockpit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
:root {
  --blue-900: #1E3A8A;
  --blue-700: #1D4ED8;
  --blue-600: #2563EB;
  --blue-500: #3B82F6;
  --blue-100: #DBEAFE;
  --blue-50: #EFF6FF;
  --teal-700: #0F766E;
  --teal-600: #0D9488;
  --teal-100: #CCFBF1;
  --slate-900: #0F172A;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748B;
  --slate-400: #94A3B8;
  --slate-300: #CBD5E1;
  --slate-200: #E2E8F0;
  --slate-100: #F1F5F9;
  --slate-50: #F8FAFC;
  --orange-600: #EA580C;
  --orange-100: #FFEDD5;
  --red-600: #DC2626;
  --white: #FFFFFF;
  --tech: #2563EB;
  --commercial: #0D9488;
  --strategie: #7C3AED;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--slate-50);
  color: var(--slate-900);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--slate-900);
  color: var(--white);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.logo {
  padding: 20px 20px 16px;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.025em;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo .dot { color: var(--blue-500); }
.logo .sub { display:block; font-size: 11px; font-weight: 500; color: var(--slate-400); letter-spacing: 0.04em; margin-top: 4px; text-transform: uppercase;}
.nav { flex: 1; padding: 12px 0; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--slate-300);
  border-left: 3px solid transparent; transition: all .15s;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.nav-item.active { background: rgba(59,130,246,0.12); border-left-color: var(--blue-500); color: var(--white); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--slate-500); }
.nav-footer button {
  width: 100%; margin-bottom: 6px; padding: 8px 10px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12); background: transparent;
  color: var(--slate-300); font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s;
}
.nav-footer button:hover { background: rgba(255,255,255,0.06); color: var(--white); border-color: rgba(255,255,255,0.2); }
.nav-footer .backup-status {
  font-size: 10.5px; color: var(--slate-400); padding: 8px 4px 4px;
  display: flex; align-items: center; gap: 6px; line-height: 1.3;
}
.nav-footer .backup-status .status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.nav-footer .footer-divider {
  height: 1px; background: rgba(255,255,255,0.06); margin: 10px 0;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 60px; background: var(--white); border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0;
}
.topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.topbar .actions { display: flex; gap: 10px; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--blue-700); color: var(--white); }
.btn-primary:hover { background: var(--blue-600); }
.btn-ghost { background: var(--slate-100); color: var(--slate-700); }
.btn-ghost:hover { background: var(--slate-200); }
.content { flex: 1; overflow: auto; position: relative; }

/* Graph view */
#graph-canvas { width: 100%; height: 100%; display: block; cursor: grab; background:
  radial-gradient(circle at 1px 1px, var(--slate-200) 1px, transparent 0); background-size: 24px 24px; }
#graph-canvas:active { cursor: grabbing; }
.graph-legend {
  position: absolute; bottom: 20px; left: 20px; background: var(--white);
  border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.08); font-size: 12px;
}
.graph-legend h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); margin-bottom: 10px; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: var(--slate-700); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Panels (notes, tasks, etc) */
.panel { padding: 24px; max-width: 1100px; margin: 0 auto; }
.panel-grid { display: grid; gap: 16px; }
.card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px;
  padding: 18px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); transition: all .15s;
}
.card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.08); }
.card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 13px; color: var(--slate-600); line-height: 1.6; }
.card .meta { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.tag {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.tag-tech { background: var(--blue-100); color: var(--blue-700); }
.tag-commercial { background: var(--teal-100); color: var(--teal-700); }
.tag-strategie { background: #EDE9FE; color: #7C3AED; }

/* Tasks */
.task-col { display: flex; flex-direction: column; gap: 10px; }
.task-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.task-column { background: var(--slate-100); border-radius: 12px; padding: 14px; }
.task-column h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--slate-500); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.task-count { background: var(--slate-300); color: var(--slate-700); border-radius: 20px; padding: 1px 8px; font-size: 11px; }
.task-card {
  background: var(--white); border: 1px solid var(--slate-200); border-radius: 8px;
  padding: 12px; font-size: 13px; cursor: pointer; box-shadow: 0 1px 2px rgba(15,23,42,0.04);
}
.task-card:hover { border-color: var(--blue-500); cursor: grab; }
.task-card { user-select: none; transition: opacity .15s, transform .1s, border-color .15s; }
.task-card:active { cursor: grabbing; }
.task-card.dragging { opacity: 0.4; transform: scale(0.97); cursor: grabbing; }
.task-column { transition: background-color .15s, outline .15s; }
.task-column.drop-target { background: var(--blue-50); outline: 2px dashed var(--blue-500); outline-offset: -4px; }
.task-card .task-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.dot-status { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

/* Prospects table */
table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; border: 1px solid var(--slate-200); }
th { background: var(--blue-700); color: var(--white); text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; }
td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--slate-100); color: var(--slate-700); }
tr:hover td { background: var(--blue-50); }
.status-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.status-contact { background: var(--blue-100); color: var(--blue-700); }
.status-demo { background: var(--orange-100); color: var(--orange-600); }
.status-nego { background: #EDE9FE; color: #7C3AED; }
.status-client { background: var(--teal-100); color: var(--teal-700); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none;
  align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 16px; padding: 24px; width: 480px; max-width: 90vw;
  max-height: 85vh; overflow: auto; box-shadow: 0 24px 48px rgba(15,23,42,0.2);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--slate-600); margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--slate-200); border-radius: 8px;
  font-family: inherit; font-size: 13px; color: var(--slate-900);
}
.field textarea { resize: vertical; min-height: 80px; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue-500); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.empty { text-align: center; padding: 60px 20px; color: var(--slate-400); }
.empty svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); margin: 24px 0 12px; font-weight: 600; }
.node-detail { position: absolute; top: 20px; right: 20px; width: 300px; background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px; padding: 18px; box-shadow: 0 8px 24px rgba(15,23,42,0.12); display: none; }
.node-detail.open { display: block; }
.node-detail h3 { font-size: 16px; margin-bottom: 8px; }
.node-detail .close { position: absolute; top: 12px; right: 12px; cursor: pointer; color: var(--slate-400); border:none; background:none; font-size: 18px; }

/* Vue Aujourd'hui */
.today-header { padding: 12px 0 28px; }
.today-eyebrow {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--blue-700); margin-bottom: 10px;
  display: inline-flex; align-items: center; gap: 8px;
}
.today-eyebrow::before {
  content: ''; display: inline-block; width: 18px; height: 1px; background: var(--blue-500);
}
.today-greet { font-size: 34px; font-weight: 800; letter-spacing: -0.035em; margin-bottom: 6px; color: var(--slate-900); line-height: 1.1; }
.today-greet .dot { color: var(--blue-500); }
.today-date { font-size: 14px; color: var(--slate-500); margin-bottom: 24px; }
.today-date .day { color: var(--slate-700); font-weight: 600; }
.today-intention {
  position: relative;
  display: flex; align-items: center; gap: 16px;
  background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 14px; padding: 18px 22px 18px 26px;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  transition: border-color .2s, box-shadow .2s;
  overflow: hidden;
}
.today-intention::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--blue-500), var(--teal-600));
}
.today-intention:focus-within { border-color: var(--blue-500); box-shadow: 0 4px 16px rgba(29,78,216,0.08); }
.today-intention label { font-size: 11px; font-weight: 700; color: var(--blue-700); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
.today-intention input {
  flex: 1; border: none; outline: none;
  font-family: inherit; font-size: 15px; font-weight: 500; color: var(--slate-900);
  background: transparent;
}
.today-intention input::placeholder { color: var(--slate-400); font-style: italic; font-weight: 400; }

.today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 32px; }
.today-section h3 {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--slate-700); margin-bottom: 16px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.today-section h3 .count-pill {
  font-size: 11px; font-weight: 700; color: var(--slate-600);
  background: var(--slate-100); border-radius: 20px; padding: 2px 9px;
  letter-spacing: 0.02em;
}
.today-list { display: flex; flex-direction: column; gap: 6px; }
.today-item {
  position: relative; background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; color: var(--slate-700);
  cursor: pointer; transition: all .18s ease;
  display: flex; align-items: center; gap: 12px;
  overflow: hidden;
}
.today-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--blue-500); transform: scaleY(0); transform-origin: center;
  transition: transform .2s ease;
}
.today-item:hover {
  border-color: var(--blue-500); transform: translateX(3px);
  box-shadow: 0 4px 12px rgba(15,23,42,0.06);
}
.today-item:hover::before { transform: scaleY(1); }
.today-item:active { transform: translateX(3px) scale(0.99); }
.today-item .item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px currentColor; opacity: 1; }
.today-item .item-dot { box-shadow: none; }
.today-item .item-meta { margin-left: auto; font-size: 11px; color: var(--slate-400); white-space: nowrap; font-weight: 500; }
.today-item .item-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; color: var(--slate-900); }

.today-subgroup {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--slate-500); margin: 16px 0 8px; font-weight: 700;
  display: flex; align-items: center; gap: 9px;
}
.today-subgroup:first-child { margin-top: 0; }
.today-subgroup .sub-dot { width: 8px; height: 8px; border-radius: 50%; }
.today-subgroup .sub-count { color: var(--slate-400); font-weight: 600; }

.today-pulse {
  margin-top: 32px; background: var(--white);
  border: 1px solid var(--slate-200); border-radius: 14px;
  padding: 22px 28px;
  display: flex; gap: 0; flex-wrap: wrap; align-items: center;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
}
.pulse-item {
  display: flex; flex-direction: column; padding: 0 28px;
  border-left: 1px solid var(--slate-200);
}
.pulse-item:first-child { border-left: none; padding-left: 0; }
.pulse-value {
  font-size: 28px; font-weight: 800; color: var(--slate-900);
  letter-spacing: -0.03em; line-height: 1;
}
.pulse-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--slate-500); margin-top: 6px; font-weight: 700;
}
.today-pulse .scan-info {
  margin-left: auto; font-size: 11px; color: var(--slate-400);
  text-align: right; font-weight: 500; padding-left: 20px;
}
.today-empty-mini {
  font-size: 13px; color: var(--slate-500); padding: 24px 16px;
  background: var(--slate-50); border: 1px dashed var(--slate-200);
  border-radius: 10px; text-align: center; line-height: 1.6;
}
.today-empty-mini a { color: var(--blue-700); cursor: pointer; font-weight: 600; }
.today-empty-mini a:hover { text-decoration: underline; }

/* Recherche topbar */
.topbar { gap: 20px; }
.search-bar {
  position: relative; flex: 0 1 360px; max-width: 360px;
  display: none; align-items: center;
}
.search-bar.visible { display: flex; }
.search-bar input {
  width: 100%; padding: 9px 36px 9px 36px;
  border: 1px solid var(--slate-200); border-radius: 8px;
  background: var(--slate-50); font-family: inherit; font-size: 13px;
  color: var(--slate-900); outline: none;
  transition: all .15s;
}
.search-bar input::placeholder { color: var(--slate-400); }
.search-bar input:focus, .search-bar input:hover { background: var(--white); border-color: var(--slate-300); }
.search-bar input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.search-bar .search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--slate-400); pointer-events: none;
}
.search-bar .search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border: none; background: var(--slate-200);
  color: var(--slate-600); border-radius: 50%;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1; font-family: inherit; padding: 0;
}
.search-bar.has-value .search-clear { display: flex; }
.search-bar .search-clear:hover { background: var(--slate-300); color: var(--slate-900); }
.search-bar .search-kbd {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--slate-400); pointer-events: none;
  background: var(--white); border: 1px solid var(--slate-200);
  padding: 2px 6px; border-radius: 4px; font-weight: 600;
  letter-spacing: 0.02em;
}
.search-bar.has-value .search-kbd,
.search-bar:focus-within .search-kbd { display: none; }
.search-empty {
  text-align: center; padding: 40px 20px; color: var(--slate-400);
  font-size: 13px;
}
.search-empty strong { color: var(--slate-600); }

/* Capture rapide */
.sidebar-capture {
  margin: 14px 16px 4px; padding: 11px 14px;
  background: linear-gradient(135deg, var(--blue-700), var(--blue-600));
  color: var(--white); border: none; border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .2s;
  box-shadow: 0 4px 12px rgba(29,78,216,0.3);
  letter-spacing: -0.005em;
}
.sidebar-capture:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(29,78,216,0.4);
}
.sidebar-capture svg { width: 16px; height: 16px; }
.sidebar-capture .kbd {
  font-size: 10px; background: rgba(255,255,255,0.2);
  padding: 2px 7px; border-radius: 5px; font-weight: 700;
  margin-left: 4px; letter-spacing: 0.02em;
}

.modal.qc-mode { padding: 0; width: 560px; max-height: none; overflow: hidden; }
.qc-input-wrap { padding: 22px 24px 14px; }
.qc-input {
  width: 100%; border: none; outline: none;
  font-family: inherit; font-size: 18px; font-weight: 500;
  color: var(--slate-900); background: transparent;
}
.qc-input::placeholder { color: var(--slate-400); font-weight: 400; }
.qc-hint {
  font-size: 11px; color: var(--slate-500); margin-top: 10px;
  font-weight: 500; letter-spacing: 0.01em;
}
.qc-hint kbd {
  background: var(--slate-100); border: 1px solid var(--slate-200);
  padding: 1px 6px; border-radius: 4px; font-family: inherit;
  font-size: 10px; font-weight: 700; color: var(--slate-700);
}
.qc-types {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; padding: 14px 24px 22px;
  border-top: 1px solid var(--slate-100);
  background: var(--slate-50);
}
.qc-type {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 14px 8px;
  background: var(--white); border: 1px solid var(--slate-200);
  border-radius: 10px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
  color: var(--slate-700);
  transition: all .15s;
}
.qc-type:hover { border-color: var(--blue-500); background: var(--blue-50); color: var(--blue-700); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
.qc-type svg { width: 20px; height: 20px; }
.qc-type .qc-type-hotkey {
  font-size: 9px; color: var(--slate-400); margin-top: -2px;
  letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600;
}

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">CPTS Pilot<span class="dot">.</span><span class="sub">Cockpit</span></div>
    <button class="sidebar-capture" onclick="openQuickCapture()" title="Capture rapide (N)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Capture rapide
      <span class="kbd">N</span>
    </button>
    <nav class="nav">
      <div class="nav-item active" data-view="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        Aujourd'hui
      </div>
      <div class="nav-item" data-view="graph">

      </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 100 8 4 4 0 000-8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>

      <div class="backup-status" id="backup-status"></div>

      <button onclick="document.getElementById('import-file').click()">⬆ Importer</button>

  <main class="main">
    <div class="topbar">
      <h1 id="view-title">Architecture du code</h1>
      <div class="search-bar" id="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input type="text" id="search-input" oninput="updateSearch(this.value)" autocomplete="off">
        <span class="search-kbd">/</span>
        <button class="search-clear" onclick="clearSearch()" title="Effacer (Esc)">×</button>

  <div class="modal" id="modal"></div>

<script>
// ============ ÉTAT & PERSISTANCE ============
const STORE_KEY = 'cpts_pilot_cockpit_v1';
let state = {
  nodes: [],      // {id, label, category, type, description, x, y}
  links: [],      // {source, target}
  notes: [],      // {id, title, body, category, links:[noteIds]}
  tasks: [],      // {id, title, category, status}
  strategie: [],  // {id, title, body}
  prospects: [],  // {id, nom, contact, statut, notes}
  today: { intention: '', date: '' }  // intention du jour + date à laquelle elle a été posée
};

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { console.warn('Pas de données sauvegardées'); }
  if (!state.nodes) state.nodes = [];
  if (!state.links) state.links = [];
  if (!state.notes) state.notes = [];
  if (!state.tasks) state.tasks = [];
  if (!state.strategie) state.strategie = [];
  if (!state.prospects) state.prospects = [];
  if (!state.today) state.today = { intention: '', date: '' };
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e) { alert('Erreur de sauvegarde'); }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ============ NAVIGATION ============
let currentView = 'today';
const titles = { today:'Aujourd\'hui', graph:'Architecture du code', notes:'Notes thématiques', tasks:'Gestion des tâches', strategie:'Stratégie commerciale', prospects:'Prospects CPTS' };

// Recherche : vues filtrables + placeholders
let searchQuery = '';
const searchPlaceholders = {
  notes: 'Rechercher dans les notes…',
  tasks: 'Rechercher une tâche…',
  strategie: 'Rechercher dans la stratégie…',
  prospects: 'Rechercher une CPTS, un contact…'
};

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => goTo(item.dataset.view));
});

function updateSearch(value) {
  searchQuery = value;
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('has-value', !!value);
  render();
  const input = document.getElementById('search-input');
  if (input && document.activeElement !== input) {
    input.focus();
    input.setSelectionRange(value.length, value.length);
  }
}

function clearSearch() {
  searchQuery = '';
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  document.getElementById('search-bar').classList.remove('has-value');
  render();
}

// Raccourcis clavier : "/" pour focus la recherche, "N" pour capture rapide, "Esc" pour fermer/vider
document.addEventListener('keydown', e => {
  const isTyping = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  const modalOpen = document.getElementById('modal-overlay').classList.contains('open');
  if (e.key === '/' && !isTyping && searchPlaceholders[currentView]) {
    e.preventDefault();
    const input = document.getElementById('search-input');
    if (input) input.focus();
  } else if ((e.key === 'n' || e.key === 'N') && !isTyping && !modalOpen) {
    e.preventDefault();
    openQuickCapture();
  } else if (e.key === 'Escape') {
    if (modalOpen) { closeModal(); return; }
    const input = document.getElementById('search-input');
    if (document.activeElement === input) {
      if (searchQuery) clearSearch();
      else input.blur();
    }
  }
});

const catLabel = { tech:'Technique', commercial:'Commercial', strategie:'Stratégie' };
const catClass = { tech:'tag-tech', commercial:'tag-commercial', strategie:'tag-strategie' };

function render() {
  const content = document.getElementById('content');
  const actions = document.getElementById('view-actions');
  content.innerHTML = '';
  actions.innerHTML = '';

  // Sync la barre de recherche selon la vue
  const searchBar = document.getElementById('search-bar');
  const searchInput = document.getElementById('search-input');
  if (searchPlaceholders[currentView]) {
    searchBar.classList.add('visible');
    searchInput.placeholder = searchPlaceholders[currentView];
    if (searchInput.value !== searchQuery) searchInput.value = searchQuery;
    searchBar.classList.toggle('has-value', !!searchQuery);
  } else {
    searchBar.classList.remove('visible', 'has-value');
    searchInput.value = '';
  }

  if (currentView === 'today') renderToday(content, actions);
  else if (currentView === 'graph') renderGraph(content, actions);
  else if (currentView === 'notes') renderNotes(content, actions);
  else if (currentView === 'tasks') renderTasks(content, actions);
  else if (currentView === 'strategie') renderStrategie(content, actions);
  else if (currentView === 'prospects') renderProspects(content, actions);
}

function goTo(view) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.view === view));
  currentView = view;
  searchQuery = '';  // reset à chaque changement de vue
  document.getElementById('view-title').textContent = titles[view];
  render();
}

// Helper : filtre une liste sur plusieurs champs
function matchSearch(item, fields) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return fields.some(f => (f||'').toString().toLowerCase().includes(q));
}

// ============ VUE AUJOURD'HUI ============
function renderToday(content, actions) {
  actions.innerHTML = '';
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const todayKey = now.toISOString().slice(0, 10);
  const intentionValue = (state.today.date === todayKey) ? state.today.intention : '';

  const doing = state.tasks.filter(t => t.status === 'doing');
  const todo = state.tasks.filter(t => t.status === 'todo').slice(0, 3);
  const demo = state.prospects.filter(p => p.statut === 'demo');
  const nego = state.prospects.filter(p => p.statut === 'nego');

  const totalRoutes = archData?.stats?.total_routes ?? '—';
  const totalModules = archData?.stats?.total_modules ?? '—';
  const scanInfo = archData?.generated_at ? 'Dernier scan ' + formatRelativeDate(archData.generated_at) : 'Aucun scan';
  const activeProspects = state.prospects.filter(p => p.statut !== 'client').length;
  const activeTasks = state.tasks.filter(t => t.status !== 'done').length;

  let html = '<div class="panel" style="max-width:1100px">';

  const parts = dateStr.split(' ');
  const dayName = capitalize(parts[0]);
  const restDate = parts.slice(1).join(' ');

  html += `
    <div class="today-header">
      <div class="today-eyebrow">Pilotage du jour</div>
      <div class="today-greet">Bonjour Eva<span class="dot">.</span></div>
      <div class="today-date"><span class="day">${dayName}</span> ${restDate}</div>
      <div class="today-intention">
        <label>Mon intention</label>
        <input id="today-intention" type="text" placeholder="Sur quoi je veux concentrer mon énergie aujourd'hui ?" value="${esc(intentionValue)}" oninput="saveIntention(this.value)">
      </div>
    </div>`;

  html += '<div class="today-grid">';

  // Tâches actives
  const tasksCount = doing.length + todo.length;
  html += `<div class="today-section"><h3>Tâches actives${tasksCount?`<span class="count-pill">${tasksCount}</span>`:''}</h3>`;
  if (doing.length === 0 && todo.length === 0) {
    html += `<div class="today-empty-mini">Aucune tâche active.<br><a onclick="goTo('tasks')">Créer une tâche →</a></div>`;
  } else {
    if (doing.length > 0) {
      html += `<div class="today-subgroup"><span class="sub-dot" style="background:var(--blue-500)"></span>En cours <span class="sub-count">· ${doing.length}</span></div><div class="today-list">`;
      doing.forEach(t => {
        html += `<div class="today-item" onclick="goToTaskFromToday('${t.id}')"><span class="item-dot" style="background:${catColors[t.category]||'var(--slate-400)'}"></span><span class="item-label">${esc(t.title)}</span><span class="item-meta">${catLabel[t.category]||''}</span></div>`;
      });
      html += '</div>';
    }
    if (todo.length > 0) {
      html += `<div class="today-subgroup"><span class="sub-dot" style="background:var(--slate-300)"></span>À attaquer <span class="sub-count">· ${todo.length}</span></div><div class="today-list">`;
      todo.forEach(t => {
        html += `<div class="today-item" onclick="goToTaskFromToday('${t.id}')"><span class="item-dot" style="background:${catColors[t.category]||'var(--slate-400)'}"></span><span class="item-label">${esc(t.title)}</span><span class="item-meta">${catLabel[t.category]||''}</span></div>`;
      });
      html += '</div>';
    }
  }
  html += '</div>';

  // Prospects chauds
  const prospectsCount = demo.length + nego.length;
  html += `<div class="today-section"><h3>Prospects chauds${prospectsCount?`<span class="count-pill">${prospectsCount}</span>`:''}</h3>`;
  if (demo.length === 0 && nego.length === 0) {
    html += `<div class="today-empty-mini">Aucun prospect en démo ou négo.<br><a onclick="goTo('prospects')">Ajouter un prospect →</a></div>`;
  } else {
    if (nego.length > 0) {
      html += `<div class="today-subgroup"><span class="sub-dot" style="background:#7C3AED"></span>En négo <span class="sub-count">· ${nego.length}</span></div><div class="today-list">`;
      nego.forEach(p => {
        html += `<div class="today-item" onclick="goToProspectFromToday('${p.id}')"><span class="item-label">${esc(p.nom)}</span>${p.contact?`<span class="item-meta">${esc(p.contact)}</span>`:''}</div>`;
      });
      html += '</div>';
    }
    if (demo.length > 0) {
      html += `<div class="today-subgroup"><span class="sub-dot" style="background:var(--orange-600)"></span>Démo planifiée <span class="sub-count">· ${demo.length}</span></div><div class="today-list">`;
      demo.forEach(p => {
        html += `<div class="today-item" onclick="goToProspectFromToday('${p.id}')"><span class="item-label">${esc(p.nom)}</span>${p.contact?`<span class="item-meta">${esc(p.contact)}</span>`:''}</div>`;
      });
      html += '</div>';
    }
  }
  html += '</div>';

  html += '</div>'; // close today-grid

  // Pouls projet
  html += `<div class="today-pulse">
    <div class="pulse-item"><span class="pulse-value">${totalRoutes}</span><span class="pulse-label">Routes</span></div>
    <div class="pulse-item"><span class="pulse-value">${totalModules}</span><span class="pulse-label">Modules</span></div>
    <div class="pulse-item"><span class="pulse-value">${activeTasks}</span><span class="pulse-label">Tâches actives</span></div>
    <div class="pulse-item"><span class="pulse-value">${activeProspects}</span><span class="pulse-label">Prospects actifs</span></div>
    <div class="scan-info">${scanInfo}</div>
  </div>`;

  html += '</div>';
  content.innerHTML = html;
}

function saveIntention(value) {
  state.today.intention = value;
  state.today.date = new Date().toISOString().slice(0, 10);
  save();
}

function goToTaskFromToday(id) { goTo('tasks'); openTaskModal(id); }
function goToProspectFromToday(id) { goTo('prospects'); openProspectModal(id); }

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function formatRelativeDate(iso) {
  const d = new Date(iso);
  const diffH = Math.floor((Date.now() - d.getTime()) / 3600000);
  if (diffH < 1) return 'il y a moins d\'1h';
  if (diffH < 24) return 'il y a ' + diffH + 'h';
  const diffD = Math.floor(diffH / 24);
  if (diffD < 7) return 'il y a ' + diffD + 'j';
  return 'le ' + d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

// ============ VUE GRAPHE (ARCHITECTURE) ============
let graphState = { offsetX: 0, offsetY: 0, scale: 1, dragging: null, panning: false, lastX: 0, lastY: 0 };

let archData = null;
function renderGraph(content, actions) {
  actions.innerHTML = `
    <button class="btn btn-ghost" onclick="reloadArch()">⟳ Recharger le code</button>
    <button class="btn btn-ghost" onclick="openNodeModal()">+ Nœud manuel</button>
    <button class="btn btn-primary" onclick="toggleLinkMode()" id="link-btn">↔ Relier</button>`;
  content.innerHTML = `
    <canvas id="graph-canvas"></canvas>
    <div class="graph-legend">
      <h4>Architecture du code</h4>
      <div id="legend-content" style="font-size:11px;color:var(--slate-400)">Chargement...</div>
    </div>
    <div class="node-detail" id="node-detail"></div>`;
  const canvas = document.getElementById('graph-canvas');
  loadArch(canvas);
}
function reloadArch() { archData = null; render(); }
async function loadArch(canvas) {
  if (!archData) {
    try {
      const resp = await fetch('architecture.json?t=' + Date.now());
      if (resp.ok) { archData = await resp.json(); buildNodesFromArch(); }
    } catch(e) { console.log('Pas de architecture.json'); }
  }
  updateLegend();
  setupGraph(canvas);
}
function buildNodesFromArch() {
  if (!archData || !archData.modules) return;
  const manual = state.nodes.filter(n => !n.fromArch);
  const arch = [];
  const cx = 480, cy = 340, R = 250, n = archData.modules.length;
  archData.modules.forEach((mod, i) => {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    const size = Math.min(58, 24 + mod.route_count*0.3);
    arch.push({ id:'arch_'+mod.name, label:mod.name, category:mod.category,
      type:mod.route_count+' routes', color:mod.color, radius:size,
      x:cx+Math.cos(a)*R, y:cy+Math.sin(a)*R, fromArch:true,
      routes:mod.routes||[], routeCount:mod.route_count, fileCount:mod.file_count });
  });
  state.nodes = [...arch, ...manual];
}
function updateLegend() {
  const el = document.getElementById('legend-content');
  if (!el) return;
  if (archData && archData.stats) {
    const s = archData.stats;
    const d = new Date(archData.generated_at).toLocaleString('fr-FR');
    el.innerHTML = '<div style="color:var(--slate-700);font-weight:600;margin-bottom:6px">'+s.total_routes+' routes · '+s.total_modules+' modules</div><div style="margin-bottom:8px">'+s.files_scanned+' fichiers scannés</div><div style="color:var(--slate-400);font-size:10px">Généré le '+d+'</div><div style="margin-top:10px;color:var(--slate-400);font-size:10px">Clic sur un module → ses routes<br>Glisser · Molette pour zoomer</div>';
  } else {
    el.innerHTML = '<div style="color:var(--slate-500)">Aucun architecture.json trouvé.<br><br>Lance le script de scan dans ta plateforme et place architecture.json à la racine de Strategy.</div>';
  }
}

let linkMode = false, linkSource = null;
function toggleLinkMode() {
  linkMode = !linkMode; linkSource = null;
  const btn = document.getElementById('link-btn');
  btn.style.background = linkMode ? 'var(--teal-600)' : '';
  btn.style.color = linkMode ? '#fff' : '';
  btn.textContent = linkMode ? '✓ Mode liaison' : '↔ Relier';
}

const catColors = { tech:'#2563EB', commercial:'#0D9488', strategie:'#7C3AED' };

function setupGraph(canvas) {
  const ctx = canvas.getContext('2d');
  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
    draw();
  }
  window.addEventListener('resize', resize);

  function worldToScreen(x, y) {
    return { x: x * graphState.scale + graphState.offsetX, y: y * graphState.scale + graphState.offsetY };
  }
  function screenToWorld(x, y) {
    return { x: (x - graphState.offsetX) / graphState.scale, y: (y - graphState.offsetY) / graphState.scale };
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // Links
    ctx.lineWidth = 1.5 * graphState.scale;
    state.links.forEach(l => {
      const s = state.nodes.find(n => n.id === l.source);
      const t = state.nodes.find(n => n.id === l.target);
      if (!s || !t) return;
      const ss = worldToScreen(s.x, s.y), ts = worldToScreen(t.x, t.y);
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y); ctx.lineTo(ts.x, ts.y);
      ctx.strokeStyle = 'rgba(148,163,184,0.5)';
      ctx.stroke();
    });
    // Nodes
    state.nodes.forEach(n => {
      const p = worldToScreen(n.x, n.y);
      const r = (n.radius || 26) * graphState.scale;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.fillStyle = n.color || catColors[n.category] || '#64748B';
      ctx.fill();
      if (linkSource === n.id) { ctx.lineWidth = 3; ctx.strokeStyle = '#0D9488'; ctx.stroke(); }
      ctx.fillStyle = '#0F172A';
      ctx.font = `600 ${13*graphState.scale}px Manrope, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.label, p.x, p.y + r + 16*graphState.scale);
      ctx.fillStyle = '#fff';
      if (n.fromArch) {
        ctx.font = `700 ${Math.max(11,14*graphState.scale)}px Manrope, sans-serif`;
        ctx.fillText(n.routeCount, p.x, p.y + 5*graphState.scale);
      } else {
        ctx.font = `600 ${12*graphState.scale}px Manrope, sans-serif`;
        ctx.fillText((n.type||'+').charAt(0).toUpperCase(), p.x, p.y + 4*graphState.scale);
      }
    });
  }

  function nodeAt(sx, sy) {
    for (let i = state.nodes.length-1; i>=0; i--) {
      const n = state.nodes[i];
      const p = worldToScreen(n.x, n.y);
      const r = (n.radius || 26) * graphState.scale;
      if (Math.hypot(sx-p.x, sy-p.y) <= r) return n;
    }
    return null;
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const node = nodeAt(mx, my);
    if (linkMode && node) {
      if (!linkSource) { linkSource = node.id; draw(); }
      else if (linkSource !== node.id) {
        const exists = state.links.some(l => (l.source===linkSource&&l.target===node.id)||(l.source===node.id&&l.target===linkSource));
        if (!exists) { state.links.push({source:linkSource, target:node.id}); save(); }
        linkSource = null; draw();
      }
      return;
    }
    if (node) { graphState.dragging = node; }
    else { graphState.panning = true; graphState.lastX = mx; graphState.lastY = my; }
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (graphState.dragging) {
      const w = screenToWorld(mx, my);
      graphState.dragging.x = w.x; graphState.dragging.y = w.y; draw();
    } else if (graphState.panning) {
      graphState.offsetX += mx - graphState.lastX;
      graphState.offsetY += my - graphState.lastY;
      graphState.lastX = mx; graphState.lastY = my; draw();
    }
  });
  canvas.addEventListener('mouseup', e => {
    if (graphState.dragging) { save(); }
    graphState.dragging = null; graphState.panning = false;
  });
  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node) showNodeDetail(node);
  });
  let cs = 0;
  canvas.addEventListener('mousedown', () => { cs = Date.now(); });
  canvas.addEventListener('click', e => {
    if (Date.now() - cs > 200) return;
    const rect = canvas.getBoundingClientRect();
    const node = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    if (node && node.fromArch && !linkMode) showNodeDetail(node);
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = screenToWorld(mx, my);
    graphState.scale *= e.deltaY > 0 ? 0.92 : 1.08;
    graphState.scale = Math.max(0.3, Math.min(3, graphState.scale));
    const after = screenToWorld(mx, my);
    graphState.offsetX += (after.x - before.x) * graphState.scale;
    graphState.offsetY += (after.y - before.y) * graphState.scale;
    draw();
  });
  resize();
}

function showNodeDetail(node) {
  const d = document.getElementById('node-detail');
  if (node.fromArch) {
    let rh = '';
    (node.routes||[]).slice(0,40).forEach(r => {

// Drag-and-drop des tâches entre colonnes
function taskDragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}
function taskDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.task-column.drop-target').forEach(c => c.classList.remove('drop-target'));
}
function taskDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function taskDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-target');
  }
}
function taskDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const id = e.dataTransfer.getData('text/plain');
  if (!id) return;
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.status === newStatus) return;
  task.status = newStatus;
  save();
  render();
}
function openTaskModal(id) {
  const task = id ? state.tasks.find(t=>t.id===id) : null;
  const m = document.getElementById('modal');

// Ouvre le formulaire de création standard du type choisi, pré-rempli si du texte a été saisi
function quickOpen(type) {
  const input = document.getElementById('qc-input');
  const text = input ? input.value.trim() : '';
  closeModal();
  // Petit délai pour laisser le modal-overlay se réinitialiser proprement
  setTimeout(() => {
    if (type === 'task') {
      openTaskModal();
      if (text) document.getElementById('task-title').value = text;
    } else if (type === 'note') {
      openNoteModal();
      if (text) {
        const lines = text.split('\n');
        document.getElementById('note-title').value = lines[0].slice(0, 80);
        if (lines.length > 1) document.getElementById('note-body').value = lines.slice(1).join('\n').trim();
      }
    } else if (type === 'prospect') {
      openProspectModal();
      if (text) document.getElementById('prosp-nom').value = text;
    } else if (type === 'strat') {
      openStratModal();
      if (text) document.getElementById('strat-title').value = text;
    }
  }, 30);
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cpts-pilot-cockpit-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { state = JSON.parse(ev.target.result); save(); render(); alert('Données importées !'); }
    catch(err) { alert('Fichier invalide'); }
  };
  reader.readAsText(file);
}

// ============ BACKUP GITHUB ============
const GH_CONFIG_KEY = 'cpts_github_config';
const BACKUP_INTERVAL_MS = 6 * 3600 * 1000;  // 6h
const BACKUP_PATH = 'backups/cockpit-latest.json';
let backupInterval = null;

function getGhConfig() {
  try { return JSON.parse(localStorage.getItem(GH_CONFIG_KEY) || '{}'); }
  catch { return {}; }
}
function setGhConfig(c) { localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(c)); }

// Encodage UTF-8 → base64 (gère les caractères accentués)
function utf8ToBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

async function backupToGithub(silent) {
  const cfg = getGhConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    if (!silent) alert('Backup non configuré. Clique sur "Backup Github" pour le configurer.');
    return false;
  }
  const branch = cfg.branch || 'main';
  const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${BACKUP_PATH}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  try {
    // 1. Récupère le SHA actuel (si le fichier existe déjà)
    let sha = null;
    const getResp = await fetch(`${apiUrl}?ref=${branch}`, { headers });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
    } else if (getResp.status !== 404) {
      const err = await getResp.json().catch(() => ({}));
      throw new Error(err.message || `Lecture impossible (${getResp.status})`);
    }
    // 2. Prépare le snapshot
    const snapshot = {
      version: 1,
      exportedAt: new Date().toISOString(),
      origin: silent ? 'auto-backup' : 'manual-backup',
      data: state
    };
    const body = {
      message: `Backup cockpit ${new Date().toLocaleString('fr-FR')}`,
      content: utf8ToBase64(JSON.stringify(snapshot, null, 2)),
      branch
    };
    if (sha) body.sha = sha;
    // 3. PUT
    const putResp = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({}));
      throw new Error(err.message || `Échec (${putResp.status})`);
    }
    cfg.lastBackup = new Date().toISOString();
    cfg.lastError = null;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('✓ Backup réussi sur Github');
    return true;
  } catch (e) {
    cfg.lastError = e.message;
    setGhConfig(cfg);
    updateBackupStatus();
    if (!silent) alert('Erreur backup : ' + e.message);
    return false;
  }
}

async function doManualBackup() {
  const cfg = getGhConfig();
  if (!cfg.token) { openGhConfigModal(); return; }
  const btn = document.getElementById('manual-backup-btn');
  if (btn) { btn.disabled = true; btn.textContent = '… sauvegarde en cours'; }
  await backupToGithub(false);
  if (btn) { btn.disabled = false; btn.textContent = '↑ Sauvegarder maintenant'; }
}

function startAutoBackup() {
  if (backupInterval) clearInterval(backupInterval);
  const cfg = getGhConfig();
  if (!cfg.token) return;
  backupInterval = setInterval(() => backupToGithub(true), BACKUP_INTERVAL_MS);
}

function updateBackupStatus() {
  const el = document.getElementById('backup-status');
  if (!el) return;
  const cfg = getGhConfig();
  if (!cfg.token) {
    el.innerHTML = '<span class="status-dot" style="background:var(--slate-600)"></span>Backup non configuré';
    el.title = '';
    return;
  }
  if (cfg.lastError) {
    el.innerHTML = '<span class="status-dot" style="background:var(--red-600)"></span>Erreur — clique pour reconfigurer';
    el.title = cfg.lastError;
    el.style.cursor = 'pointer';
    el.onclick = openGhConfigModal;
    return;
  }
  if (cfg.lastBackup) {
    el.innerHTML = `<span class="status-dot" style="background:var(--teal-600)"></span>Sauvegardé ${formatRelativeDate(cfg.lastBackup)}`;
    el.title = 'Dernier backup : ' + new Date(cfg.lastBackup).toLocaleString('fr-FR') + '\nProchain backup auto dans 6h';
    el.style.cursor = 'default';
    el.onclick = null;
  } else {
    el.innerHTML = '<span class="status-dot" style="background:var(--orange-600)"></span>En attente du premier backup';
    el.title = '';
  }
}

function openGhConfigModal() {
  const cfg = getGhConfig();
  const hasToken = !!cfg.token;
  const m = document.getElementById('modal');
  m.classList.remove('qc-mode');
  m.innerHTML = `
    <h2>Backup auto vers Github</h2>
    <p style="font-size:13px;color:var(--slate-600);line-height:1.6;margin-bottom:16px;">
      Sauvegarde automatique de ton cockpit dans un fichier <code style="background:var(--slate-100);padding:1px 6px;border-radius:4px;font-size:12px">backups/cockpit-latest.json</code> de ton repo Github, toutes les 6h tant que le cockpit est ouvert.<br><br>
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=CPTS%20Pilot%20Cockpit" target="_blank" rel="noopener" style="color:var(--blue-700);font-weight:600;">Générer un token Github →</a> (cocher le scope <strong>repo</strong>)
    </p>
    <div class="field"><label>Token Github (PAT)</label><input id="gh-token" type="password" placeholder="${hasToken?'Laisse vide pour conserver le token actuel':'ghp_xxxxxxxxxxxx'}" autocomplete="off"></div>
    <div class="field"><label>Owner (ton username Github)</label><input id="gh-owner" placeholder="Evalita03" value="${esc(cfg.owner || 'Evalita03')}"></div>
    <div class="field"><label>Repo</label><input id="gh-repo" placeholder="Strategy" value="${esc(cfg.repo || 'Strategy')}"></div>
    <div class="field"><label>Branche</label><input id="gh-branch" placeholder="main" value="${esc(cfg.branch || 'main')}"></div>
    <div id="gh-status" style="font-size:12px;color:var(--slate-600);padding:10px 12px;background:var(--slate-50);border-radius:8px;display:none;margin-bottom:12px;border:1px solid var(--slate-200);"></div>
    <div class="modal-actions">
      ${hasToken ? `<button class="btn btn-ghost" style="color:var(--red-600);margin-right:auto" onclick="disableGhBackup()">Désactiver</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveGhConfig()" id="gh-save-btn">Tester et activer</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('gh-token')?.focus(), 30);
}

async function saveGhConfig() {
  const tokenInput = document.getElementById('gh-token').value.trim();
  const existing = getGhConfig();
  const cfg = {
    token: tokenInput || existing.token || '',
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim() || 'main',
    lastBackup: existing.lastBackup,
    lastError: null
  };
  const status = document.getElementById('gh-status');
  const saveBtn = document.getElementById('gh-save-btn');
  status.style.display = 'block';
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    status.textContent = 'Tous les champs sont requis (token + owner + repo).';
    status.style.color = 'var(--red-600)';
    return;
  }
  status.style.color = 'var(--slate-600)';
  status.textContent = 'Test de la connexion Github…';
  saveBtn.disabled = true;
  try {
    const resp = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {
      headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `Repo introuvable ou token invalide (${resp.status})`);
    }
    setGhConfig(cfg);
    status.textContent = 'Connexion OK. Premier backup en cours…';
    const ok = await backupToGithub(true);
    if (ok) {
      status.style.color = 'var(--teal-700)';
      status.textContent = '✓ Backup activé. Sauvegarde auto toutes les 6h.';
      startAutoBackup();
      setTimeout(() => { closeModal(); updateBackupStatus(); }, 1500);
    } else {
      const c = getGhConfig();
      status.style.color = 'var(--red-600)';
      status.textContent = '✗ ' + (c.lastError || 'Erreur lors du premier backup');
    }
  } catch (e) {
    status.style.color = 'var(--red-600)';
    status.textContent = '✗ ' + e.message;
  } finally {
    saveBtn.disabled = false;
  }
}

function disableGhBackup() {
  if (!confirm('Désactiver le backup auto et supprimer le token stocké ?')) return;
  localStorage.removeItem(GH_CONFIG_KEY);
  if (backupInterval) { clearInterval(backupInterval); backupInterval = null; }
  closeModal();
  updateBackupStatus();
}

// ============ INIT ============
load();
render();
updateBackupStatus();
startAutoBackup();

// Charge architecture.json en arrière-plan pour alimenter le pouls projet

(async () => {
  if (archData) return;
  try {
    const resp = await fetch('architecture.json?t=' + Date.now());
    if (resp.ok) {
      archData = await resp.json();
      buildNodesFromArch();
      if (currentView === 'today') render();
    }
  } catch(e) {}
})();
</script>
